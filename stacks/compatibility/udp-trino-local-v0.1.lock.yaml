       backend/runner.py `_STUDIO_TRINO_BOOTSTRAP_SH`. Writes
       /etc/trino/catalog/iceberg.properties, restarts trino, seeds raw
       + curated tables via Trino SQL, then wires StarRocks REST catalog.
    2. ~~`scripts/lhs-trino-smoke.sh`~~ — DONE 2026-05-16. Ships via
       backend/runner.py `_STUDIO_TRINO_SMOKE_SH`. Round-trips a SELECT
       through Trino then queries the same curated table from StarRocks
