    4. STILL OPEN — at least one passing install on Windows Docker Desktop
       AND one on Linux Docker, both captured as `evidence[]` entries
       below. This is the only remaining gate for pilot-stable.
    5. ~~Documented decision on Trino's heap config~~ — DONE 2026-05-17.
       Defaults landed in `env_defaults` of the manifest:
         TRINO_JAVA_OPTS = "-Xms3G -Xmx3G -XX:+UseG1GC ..."
         TRINO_QUERY_MAX_MEMORY_PER_NODE = "1.5GB"
         TRINO_QUERY_MAX_MEMORY = "1.5GB"
