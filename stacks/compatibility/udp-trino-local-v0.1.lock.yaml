# ---------------------------------------------------------------------------
# Known-incompatible — combinations we know DO NOT work. Carried over from
# v0.2 where the constraint still applies, plus Trino-specific entries.
# ---------------------------------------------------------------------------
incompatible:
  - combination: [trino:latest]
    reason: "Floating `latest` tag changes whenever Trino ships (currently 481, was 475 last week, will be 482+ next week). The lock-file contract requires a stable tag — use a numeric pin like `475`."
    discovered: "2026-05-16"
    workaround: "Pin to the numeric Trino tag that matches the lock (currently 475)."

  - combination: [starrocks-fe:3.3-latest, starrocks-be:3.3-latest]
    reason: "Floating tag has historically resolved to 3.3.10 (pre-3.3.12) which has the Iceberg REST FileIO propagation bug fixed by PR #55416. Same caveat as udp-local-v0.2."
    discovered: "2026-05-16"
    workaround: "Pin to exact 3.3.12 or newer."

  - combination: [trino:475, "iceberg-rest:<1.5.0"]
    reason: "Trino 475's Iceberg connector exercises REST spec endpoints (table listing, snapshot updates) that older iceberg-rest images do not implement consistently. Not runtime-observed in this candidate — derived from Trino release notes referencing minimum spec expectations."
    discovered: "2026-05-16"
    workaround: "Stay on tabulario/iceberg-rest:1.6.0 or bump to a newer pinned tag and re-verify."
