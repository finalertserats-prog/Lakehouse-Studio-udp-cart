  - id: minio-client
    name: MinIO Client (mc)
    role: object_storage_bootstrap
    image: minio/mc
    tag: "RELEASE.2025-04-16T18-13-26Z"
    registry_url: https://hub.docker.com/r/minio/mc/tags
    upstream_url: https://github.com/minio/mc
    notes: One-shot bootstrap — creates the `datalake` bucket on MinIO startup. Same as v0.2.

  - id: mysql-hms
    name: MySQL 8 (Hive Metastore backing DB)
    role: db_backing
    image: mysql
    tag: "8.0"
    registry_url: https://hub.docker.com/_/mysql/tags
    upstream_url: https://dev.mysql.com/
    notes: |
      Backing store for the Hive Metastore's relational schema (DBS,
      TBLS, SDS, PARTITIONS, etc.). MySQL 8.0 chosen for HMS JDBC driver
      compatibility; HMS's schema initialization runs against it at first
      start. Do not use the floating `mysql:latest` tag — the schema-init
      step is sensitive to major-version bumps and must be re-verified on bump.

  - id: hive-metastore
    name: Hive Metastore (standalone)
    role: metastore
    image: bitsondatadev/hive-metastore
    tag: "latest"
    registry_url: https://hub.docker.com/r/bitsondatadev/hive-metastore/tags
    upstream_url: https://github.com/bitsondatadev/docker-hive-metastore
    notes: |
      NEEDS SHA PINNING before pilot-stable promotion. `latest` is
      acceptable in the candidate window only because there is no
      installable combination yet. The moment GATE 1 (Studio-built
      spark-hudi image) closes, this tag MUST be replaced with the
      digest SHA `latest` resolves to on the verifying host.
      Hive Metastore 3.x is the supported line for Hudi 0.15 sync;
      DO NOT bump to Hive Metastore 4.x (see incompatible[] below).

  - id: spark-hudi
    name: Apache Spark + Apache Hudi (Studio-built)
    role: processing
    image: lakehousestudio/spark-hudi
    tag: "3.5.5_1.2.0"
    registry_url: https://hub.docker.com/r/lakehousestudio/spark-hudi/tags
    upstream_url: https://hudi.apache.org/
    notes: |
      NOT YET BUILT — see status_notes GATE 1. The image must be baked
      by Studio's release pipeline from `scripts/images/Dockerfile.spark-hudi`
      (followup work — Dockerfile not yet committed). Pinned tag scheme
      mirrors the upstream tabulario convention: `{spark}_{hudi}` so
      `3.5.0_0.15.0` means Spark 3.5.0 + Hudi 0.15.0. Hudi 0.15 is the
      last 0.x line before the planned 1.0 cut and is the only Hudi
      version known to sync cleanly against Hive Metastore 3.x via
      `hms-sync` (see constraints[]).

# ---------------------------------------------------------------------------
# Compatibility constraints — pairs that MUST hold for this stack to work.
# CANDIDATE: rules below are grounded in upstream docs (hudi.apache.org,
# hive.apache.org, Spark docs) but `verified` strings are documentation
# citations, NOT runtime evidence. Bumping any tag in this lock requires
# re-checking every constraint against the new combination.
# ---------------------------------------------------------------------------
constraints:
  - between: [hive-metastore, postgres]
    rule: "Hive Metastore must connect to a running Postgres BEFORE its schema-init step; HMS dies on startup if the JDBC connection refuses on first try (no schema-init retry loop in the bitsondatadev image)"
    verified: "Per bitsondatadev/docker-hive-metastore README (fetched 2026-05-17): `depends_on: { postgres: { condition: service_healthy } }` is the documented pattern. The compose file (TBD) must encode this dependency."

  - between: [spark-hudi, hive-metastore]
    rule: "Spark+Hudi connects to HMS via Thrift on port 9083; the Hudi `hoodie.datasource.hive_sync.metastore.uris=thrift://hive-metastore:9083` option must be set on every write that should appear in the HMS-backed catalog"
    verified: "Per hudi.apache.org/docs/syncing_metastore (fetched 2026-05-17): the Hudi → HMS sync requires the metastore Thrift URI and a Hudi-supported HMS Thrift schema. Hudi 0.15 documents Hive Metastore 3.x as the supported target."

  - between: [spark-hudi, hive-metastore, postgres]
    rule: "Triangle dependency: postgres up → hive-metastore up (and schema-init complete) → spark-hudi can issue `pyspark CREATE TABLE … USING HUDI` writes that sync to HMS. Breaking any link in that chain produces a write that succeeds on MinIO but is invisible in the catalog."
    verified: "Composition of the two constraints above. Bootstrap (TBD) must enforce strict dependency ordering via compose `depends_on: { condition: service_healthy }` on all three legs."

  - between: [spark-hudi, minio]
    rule: "Spark+Hudi must use path-style S3 addressing (spark.hadoop.fs.s3a.path.style.access=true) and the s3a endpoint must point at MinIO (spark.hadoop.fs.s3a.endpoint=http://minio:9000)"
    verified: "Same constraint as udp-local-v0.2 — MinIO on plain HTTP does not implement virtual-hosted-style bucket addressing. The Studio-built spark-hudi image's `spark-defaults.conf` must ship these settings."

  - between: [hive-metastore, minio]
    rule: "HMS itself does not talk to MinIO — it only stores table-level pointers in Postgres. The s3:// URIs HMS records must be the same Spark+Hudi uses on the write side, otherwise readers (Trino, StarRocks, etc.) attempting to use the HMS-recorded URI will hit the wrong endpoint."
    verified: "Documented behavior of HMS — it is a catalog, not a storage gateway. The bootstrap (TBD) must inject identical s3a:// warehouse paths into both Spark+Hudi's `spark.sql.warehouse.dir` and HMS's `hive.metastore.warehouse.dir` if HMS-default location semantics are used."

  - between: [spark-hudi, hive-metastore]
    rule: "TABLE FORMAT ⇄ CATALOG version range marriage: Hudi 0.15.0's `hms-sync` requires HMS Thrift schema in the 3.x range (specifically the `IMetaStoreClient` shape Hive 3.1.x exposes). The Hudi 0.15 docs explicitly list HMS 3.x as supported and HMS 4.x as not yet supported. Bumping Spark's Hudi jar above 0.15 may shift this floor — re-verify both ends together."
    verified: "source review 2026-05-17 — hudi.apache.org/docs/syncing_metastore release notes for 0.15 series. The bitsondatadev/hive-metastore image tracks the 3.x line."
    evidence: "TBD — needs install run"

  - between: [spark-hudi]
    rule: "JAR BUNDLE PARITY: the Hudi client jar baked into `lakehousestudio/spark-hudi:3.5.0_0.15.0` MUST match the Hudi spec version of any HMS-synced tables in the warehouse. Mismatched client→table spec versions can corrupt MERGE INTO operations because Hudi 0.x and the planned 1.0 cut use different timeline-instant formats. Pinning the image tag pins the jar pins the spec — break one link and data is at risk."
    verified: "source review 2026-05-17 — hudi.apache.org/docs/migration_guide for 0.x → 1.0. The image-build Dockerfile (TBD) must pin `hudi-spark3.5-bundle_2.12-0.15.0.jar` explicitly, not pull `latest`."
    evidence: "TBD — needs install run"
    known_issue: "If a different operator ever writes to the same warehouse with a Hudi 1.0+ client, MERGE INTO via this 0.15 image may silently produce corrupt commits. Cross-writer guard rails are a v0.2 followup."

  - between: [spark-hudi, hive-metastore]
    rule: "CATALOG ⇄ PROCESSING ENGINE wire compatibility: Spark+Hudi reaches HMS over Thrift on port 9083 with NO authentication (Kerberos disabled — local-dev posture). The `hoodie.datasource.hive_sync.use_jdbc=false` setting MUST be set so Hudi uses the Thrift client path rather than the JDBC fallback; the bitsondatadev image only exposes Thrift, no HiveServer2 JDBC."
    verified: "source review 2026-05-17 — bitsondatadev/docker-hive-metastore Dockerfile exposes 9083 only. Hudi docs document `hive_sync.use_jdbc=false` as the Thrift-only sync path."
    evidence: "TBD — needs install run"
    known_issue: "Production HMS deployments often gate Thrift behind SASL/Kerberos. This lock's compatibility claims do NOT extend to authenticated HMS — that's a different marriage."

  - between: [hive-metastore, postgres]
    rule: "BACKING DB ⇄ CATALOG driver/schema match: bitsondatadev/hive-metastore bundles the Postgres JDBC driver for MySQL 8.0. MySQL 9.x+ has not been verified with this image — the driver may load but schema-init queries may fail on Postgres 16 syntax changes (e.g., default `password_encryption=scram-sha-256` requires the driver version that supports SCRAM). Pinning mysql:8.0 sidesteps this entirely."
    verified: "source review 2026-05-17 — bitsondatadev image bundles postgresql-jdbc 42.x line; mysql:8.0 uses scram-sha-256 by default but is in the supported range."
    evidence: "TBD — needs install run"

  - between: [hive-metastore, spark-hudi]
    rule: "TLS/AUTH boundary: HMS Thrift on port 9083 in this stack carries NO encryption and NO authentication — it is a localhost-only trust zone. Spark+Hudi's `hoodie.datasource.hive_sync.metastore.uris=thrift://hive-metastore:9083` is a plain TCP connect inside the Docker network. ANY exposure of HMS:9083 to a non-loopback host MUST add SASL+TLS — but this lock does not cover that variant."
    verified: "source review 2026-05-17 — bitsondatadev/docker-hive-metastore default config has no SASL. Docker compose bind (TBD) MUST keep 9083 internal-only (no host port-publish for HMS) for the security claim to hold."
    evidence: "TBD — needs install run"

  - between: [spark-hudi, minio]
    rule: "PROCESSING ⇄ STORAGE credential propagation: Spark+Hudi must set `spark.hadoop.fs.s3a.access.key`, `spark.hadoop.fs.s3a.secret.key`, AND `spark.hadoop.fs.s3a.endpoint=http://minio:9000` so the s3a filesystem can complete the Hudi `.hoodie/` write-path (timeline files + commit metadata). MinIO's root credentials must be matched at the s3a layer — Hudi does not have a separate credential path."
    verified: "source review 2026-05-17 — Hudi configures S3 via Hadoop's standard s3a properties. Same shape as v0.2's Spark→MinIO marriage."
    evidence: "TBD — needs install run"

  - between: [spark-hudi, hive-metastore, postgres, minio]
    rule: "PORT BINDING uniqueness for the recommended overlay set: minio:9000+9001, hive-metastore-thrift:9083, postgres:5432, jupyter:8888. None of these collide with udp-local-v0.2's published-port set (8181, 8030, 9030) so the two stacks can coexist on the same host if launched on different compose project names. The recommended bootstrap MUST pre-flight that 9083 and 5432 are free, since the bitsondatadev HMS image will silently bind even if Postgres is already on 5432 elsewhere."
    verified: "source review 2026-05-17 — ports_required list in this lock vs v0.2. Host bootstrap (TBD) must pre-flight check."
    evidence: "TBD — needs install run"

  - between: [hive-metastore, postgres]
    rule: "VOLUME MOUNT contract: Postgres MUST mount a named volume (or bind-mount) for `/var/lib/postgresql/data` — without it, every container restart wipes the HMS schema and Hudi tables become unreferenced (data on MinIO survives but the catalog forgets them). The compose file (TBD) must declare a named volume like `hms_pgdata` to satisfy this."
    verified: "source review 2026-05-17 — mysql:8.0 image documents `/var/lib/postgresql/data` as the PGDATA path. HMS schema persistence is entirely dependent on this volume surviving restarts."
    evidence: "TBD — needs install run"
    known_issue: "On Windows Docker Desktop, bind-mounting Postgres data to a host path triggers permission warnings; named volumes are the recommended cross-OS pattern."

