# Maturity grades:
#   candidate       — tags verified present on registry; combination NOT installed end-to-end
#   pilot-stable    — install completes, lakehouse readable, smoke may need Skip on some OS
#   linux-stable    — verified end-to-end on a Linux VPS, smoke passes clean
#   production      — additional hardening (TLS, backups, RBAC) certified
status_notes: |
  PILOT-STABLE — first evidence-backed promotion of v0.6.2.

  Promoted from `candidate` on 2026-05-17 after a 14-attempt iteration
  loop on a Finalert VPS (Ubuntu 22.04, srv1541349) finally produced a
  clean end-to-end install (install_id `inst_806a879b2e`). The Lakehouse
  Studio v0.6.2 `install_harness.py` walked all 8 steps — prepare,
  clone, env, doctor, start, bootstrap, smoke, finalize — in 24.9
  seconds, with the Hudi → HMS Thrift → MinIO write path proven live
  by the pyspark smoke job (`scripts/lhs-hudi-smoke.sh`).

  The 12+ bug-fix journey that closed the gap to pilot-stable:
    1.  Studio-built `lakehousestudio/spark-hudi:3.5.0_0.15.0` image
        baked from `scripts/images/Dockerfile.spark-hudi` and pushed to
        Docker Hub — closed the original GATE 1 blocker (image missing
        from any registry).
    2.  Spark container forced to run as a non-root USER (`spark`) so
        the JVM doesn't crash on Java's "running as root" warning loop
        and so `/tmp/.ivy2` and `/opt/spark/work-dir` get the right
        ownership for jar caching.
    3.  HMS backing store switched from Postgres 15 to MySQL 8 — the
        bitsondatadev/hive-metastore image bundles a MySQL JDBC driver
        only (the Postgres assumption in the candidate lock was wrong;
        schema-init dies on Postgres without an extra driver mount).
        Lock file's `db_backing` component re-pointed accordingly.
    4.  HMS schema-init order tightened — Postgres → MySQL switch
        meant the `depends_on: condition: service_healthy` chain had
        to be re-validated; HMS otherwise raced past schema-init.
    5.  `profile.d` PATH injection for the spark container — the
        `spark-submit` binary lived at `/opt/spark/bin/spark-submit`
        but interactive `docker exec` shells were started without the
        Spark bin on PATH; the smoke probe was finding nothing.
    6.  Smoke script switched from bare `spark-submit` to full-path
        `/opt/spark/bin/spark-submit` invocation — closes the PATH
        race even if profile.d initialization is skipped.
    7.  `lhs-hudi-smoke.sh` now greps for the HMS Thrift "OK" line
        BEFORE attempting the Hudi write, so a broken HMS produces
        a precise error instead of an opaque pyspark trace.
    8.  Hudi `hms-sync` config wired with `hive_sync.use_jdbc=false`
        baked into the spark-hudi image's spark-defaults.conf — the
        bitsondatadev image exposes Thrift on 9083 only, no JDBC.
    9.  MinIO `create-bucket` extra service explicitly added to the
        `start` command's `extra_services` list in the manifest — the
        Hudi warehouse path `s3://datalake/warehouse` would otherwise
        404 on first write.
    10. `compose` fragment for hudi-hms-spark-local-v0.1 atomically
        rewritten via `stack_compose_fragments.write_fragment` so the
        runner can extend `docker compose up -d` with the HMS + MySQL
        services UDP's base compose doesn't ship.
    11. `pyspark` Ivy resolution slowness mitigated by pre-loading
        `ivy-2.5.1.jar` into `/opt/spark/jars/` at image-bake time
        rather than letting the runtime download it.
    12. Bootstrap script `lhs-hudi-bootstrap.sh` re-ordered to wait
        on HMS health before attempting bucket creation, sidestepping
        a startup-window race that flipped doctor → start green but
        bootstrap red on slower hosts.

  Evidence:
    - id `2026-05-17-srv1541349-806a879b2e` (install_id `inst_806a879b2e`)
    - host: Ubuntu 22.04 (Linux 5.15.0-177-generic), Docker 29.5.0,
      Docker Compose v5.1.3, 31.3 GB RAM, 8 cores
    - all 8 steps PASSED; smoke proof line `[studio-hudi-smoke] passed`
      captured in `proof[]` below

  Promotion checklist next:
    - Capture a second evidence record from a Windows + Docker Desktop
      install to fill the Win11 column in `docs/STABILITY_MATRIX.md`.
    - Once a clean (no-Skip) smoke is captured on a second Linux host,
      promote `pilot-stable → linux-stable`.

  Open items (not blockers — tracked as v0.2 work):
    - `bitsondatadev/hive-metastore:latest` still resolves at runtime
      rather than via a pinned digest SHA. Pinning is queued for
      v0.1.2 — the install host's resolved digest is in `evidence[0]`
      and should be lifted into the `tag:` field directly.

