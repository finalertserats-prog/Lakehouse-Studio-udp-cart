# ---------------------------------------------------------------------------
# Known-incompatible — combinations we know DO NOT work.
# ---------------------------------------------------------------------------
incompatible:
  - combination: ["hive-metastore:4.x", "spark-hudi:3.5.0_0.15.0"]
    reason: "Hive Metastore 4.x changed the Thrift schema in ways Hudi 0.15's `hms-sync` does not handle — sync writes fail with a Thrift-decode error and the table never registers in the catalog even though the data lands on MinIO. The supported Hive Metastore line for Hudi 0.15 is 3.x."
    discovered: "2026-05-17"
    workaround: "Stay on the Hive Metastore 3.x line (the bitsondatadev image tracks 3.x). Re-evaluate when Hudi ships a 0.16+ release with HMS 4 support."

  - combination: ["spark-hudi:3.5.0_0.15.0"]
    reason: "Image does not exist on any registry yet — `lakehousestudio/spark-hudi` is a Studio-built image (GATE 1 in status_notes). Any install attempt will fail at `docker compose up` with a pull error until the bake pipeline ships."
    discovered: "2026-05-17"
    workaround: "Bake the image from `scripts/images/Dockerfile.spark-hudi` (followup work) before attempting an install."

  - combination: ["postgres:latest"]
    reason: "Postgres major-version bumps occasionally change pg_dump/pg_restore output formats and minor SQL behaviors the HMS schema-init expects. The lock-file contract requires a stable tag."
    discovered: "2026-05-17"
    workaround: "Pin to `mysql:8.0` (the locked tag) or bump explicitly with re-verification against HMS schema-init."

  - combination: ["postgres:16-alpine", "bitsondatadev/hive-metastore:latest (Hive 3.x line)"]
    reason: "Postgres 16 changed default `password_encryption` and tightened some SCRAM behaviors. The Postgres JDBC driver baked into bitsondatadev/hive-metastore is in the 42.x line and works against Postgres 16 in most paths, but schema-init has not been runtime-verified. Until verified, pin to Postgres 15."
    discovered: "2026-05-17"
    workaround: "Stay on mysql:8.0 (the locked pin). If bumping is required, run schema-init end-to-end and capture evidence before promoting."

  - combination: ["spark-hudi:3.5.0_0.15.0", "hudi-1.0+ writer on the same warehouse"]
    reason: "If another process writes to the same MinIO warehouse with a Hudi 1.0+ client while this stack's 0.15.0 image also writes, the resulting commit timeline will be a mix of two timeline-instant formats. MERGE INTO from this 0.15 image can then produce corrupt data or read-skew. Cross-writer guard rails are NOT part of this lock."
    discovered: "2026-05-17"
    workaround: "Use a single Hudi-version writer per warehouse OR migrate the whole warehouse to Hudi 1.0 in a coordinated cutover. Track as a v0.2 followup."

  - combination: ["spark-hudi:3.5.0_0.15.0", "iceberg-rest:1.6.0 in the same stack"]
    reason: "Hudi tables and Iceberg tables are distinct table formats. Trying to surface both through a single HMS-style catalog produces tables that are visible by name but unreadable by the wrong-format engine (Spark+Iceberg won't read a Hudi table at all; Spark+Hudi won't read an Iceberg table). The two formats are NOT interoperable through HMS — they coexist only by warehouse-prefix discipline (e.g. s3://datalake/hudi/, s3://datalake/iceberg/), which this lock does not enforce."
    discovered: "2026-05-17"
    workaround: "Pick one table format per stack. This lock is Hudi-only; the iceberg-* stacks are Iceberg-only."

  - combination: ["spark-hudi:3.5.0_0.15.0 with hive_sync.use_jdbc=true"]
    reason: "The bitsondatadev/hive-metastore image exposes Thrift on 9083 only — there is no HiveServer2 JDBC endpoint. Hudi's JDBC sync path will fail to connect. Hudi must use `hoodie.datasource.hive_sync.use_jdbc=false` (Thrift sync) for this image."
    discovered: "2026-05-17"
    workaround: "Set `hoodie.datasource.hive_sync.use_jdbc=false` in the spark-defaults.conf baked into the Studio image."
