# ---------------------------------------------------------------------------
# Known-incompatible — combinations we know DO NOT work. Carried over from
# v0.2 where the constraint still applies, plus Nessie/Trino-specific.
# ---------------------------------------------------------------------------
incompatible:
  - combination: [trino:latest]
    reason: "Floating `latest` tag changes whenever Trino ships. The lock-file contract requires a stable tag — use a numeric pin like `475`."
    discovered: "2026-05-17"
    workaround: "Pin to the numeric Trino tag that matches the lock (currently 475)."

  - combination: ["nessie:latest"]
    reason: "Floating `latest` tag on Nessie moves with every release; the Iceberg-REST adapter has had behavior changes between minor versions (e.g. branch-URL casing). The lock-file contract requires a stable tag."
    discovered: "2026-05-17"
    workaround: "Pin to ghcr.io/projectnessie/nessie:0.99.0 or bump explicitly with re-verification."

  - combination: ["trino:<460", "nessie:0.99.0"]
    reason: "Nessie 0.99's Iceberg-REST adapter assumes spec endpoints that Trino prior to 460 did not implement consistently. Not runtime-observed in this candidate — derived from Trino release notes and Nessie's stated minimum-client expectations."
    discovered: "2026-05-17"
    workaround: "Stay on trinodb/trino:475 (the locked pin) or any newer numeric tag with re-verification."

  - combination: [starrocks-fe:3.3-latest, starrocks-be:3.3-latest]
    reason: "Floating tag has historically resolved to 3.3.10 (pre-3.3.12) which has the Iceberg REST FileIO propagation bug fixed by PR #55416. Same caveat as udp-local-v0.2."
    discovered: "2026-05-17"
    workaround: "Pin to exact 3.3.12 or newer."

  - combination: ["iceberg-rest:1.6.0", "nessie:0.99.0"]
    reason: "Running both Iceberg REST servers in the same stack is redundant and produces confusing behavior — clients pointed at one cannot see tables created via the other (they have separate catalog storage). The whole point of the Nessie variant is to REPLACE tabulario/iceberg-rest with Nessie's adapter, not run them side-by-side."
    discovered: "2026-05-17"
    workaround: "Pick one catalog server per stack. This lock chooses Nessie; udp-local-v0.2 chooses tabulario/iceberg-rest."

  - combination: ["nessie:0.99.0 (in-memory persistence)", "production posture"]
    reason: "Nessie 0.99 defaults to in-memory persistence when no `nessie.version.store.type` is set. A container restart drops all commits, branches, and table pointers — only the data on MinIO survives, but it becomes unreferenced. Fine for laptop dev, unusable for any shared host."
    discovered: "2026-05-17"
    workaround: "For pilot-stable on Linux: add a `nessie-postgres` component and pin `nessie.version.store.type=JDBC` with a JDBC URL. The lock will need a GATE 3 closure before promotion."

  - combination: ["trino:475", "nessie:0.99.0", "starrocks-fe:3.3.12 pointed at DIFFERENT Nessie branches"]
    reason: "Trino at `/iceberg/main` and StarRocks at `/iceberg/dev` see disjoint catalog trees. Bootstrap MUST wire both to the same branch URL — silent divergence (no error, just empty catalogs) is the failure mode."
    discovered: "2026-05-17"
    workaround: "Bootstrap injects a single NESSIE_BRANCH env var consumed by both engines."

  - combination: ["nessie:0.99.0", "iceberg-format-version=3"]
    reason: "Iceberg format-version 3 requires Iceberg client 1.9+ on every reader. StarRocks 3.3.12 ships Iceberg 1.5 client and Trino 475 ships Iceberg 1.6 client — both can read v2 cleanly but neither implements v3. A Spark writer using Iceberg 1.9+ at format-version=3 would produce tables Nessie tracks but neither engine can read."
    discovered: "2026-05-17"
    workaround: "Keep the writer on Iceberg 1.8.x (the tabulario/spark-iceberg:3.5.5_1.8.1 image ships this) and explicitly set `format-version=2` on table creation until both reader engines bump."
