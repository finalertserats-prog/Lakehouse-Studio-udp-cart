components:
  - id: minio
    name: MinIO
    role: object_storage
    image: minio/minio
    tag: "RELEASE.2025-04-22T22-12-26Z"
    registry_url: https://hub.docker.com/r/minio/minio/tags
    upstream_url: https://github.com/minio/minio
    notes: |
      Same MinIO release as udp-local-v0.2. Healthcheck uses `mc ready local`
      bundled in the image. No Nessie- or Trino-specific MinIO concerns —
      both engines speak the S3 API surface MinIO implements.

  - id: minio-client
    name: MinIO Client (mc)
    role: object_storage_bootstrap
    image: minio/mc
    tag: "RELEASE.2025-04-16T18-13-26Z"
    registry_url: https://hub.docker.com/r/minio/mc/tags
    upstream_url: https://github.com/minio/mc
    notes: One-shot bootstrap — creates the `datalake` bucket on MinIO startup. Same as v0.2.

  - id: nessie
    name: Project Nessie (Iceberg-REST catalog)
    role: catalog
    image: ghcr.io/projectnessie/nessie
    tag: "0.99.0"
    registry_url: https://github.com/projectnessie/nessie/pkgs/container/nessie
    upstream_url: https://projectnessie.org/
    notes: |
      Nessie 0.99 ships a stable Iceberg-REST adapter at
      `/iceberg/{branch}` — Trino and Spark both connect via
      `iceberg.rest-catalog.uri=http://nessie:19120/iceberg/main`. The
      branch path segment is the key to Nessie's git-style semantics:
      pointing two clients at `/iceberg/main` makes them share the same
      branch; pointing one at `/iceberg/dev` isolates a writer for safe
      experimentation. DO NOT use the `latest` tag — pin to `0.99.0` so
      the lock contract holds across registry drift.

  - id: trino
    name: Trino
    role: processing
    image: trinodb/trino
    tag: "475"
    registry_url: https://hub.docker.com/r/trinodb/trino/tags
    upstream_url: https://trino.io/docs/current/connector/iceberg.html
    notes: |
      Trino 475 picked for the same reasons as udp-trino-local-v0.1:
      in-market long enough for Iceberg-REST + MinIO bugs to surface, and
      numerically pinned so the lock contract holds against the moving
      `latest` tag. Trino's Iceberg connector targets the Iceberg REST
      spec — `iceberg.catalog.type=rest` plus `iceberg.rest-catalog.uri`
      is enough. DO NOT use `trinodb/trino:latest` here.

  - id: starrocks-fe
    name: StarRocks Frontend
    role: serving
    image: starrocks/fe-ubuntu
    tag: "3.3.12"
    registry_url: https://hub.docker.com/r/starrocks/fe-ubuntu/tags
    upstream_url: https://github.com/StarRocks/starrocks
    notes: |
      Same StarRocks release as udp-local-v0.2 — PR #55416 (Iceberg REST
      catalog property propagation to S3 FileIO) is required and shipped
      in 3.3.12. StarRocks treats Nessie's Iceberg-REST endpoint as a
      standard Iceberg REST catalog — point its external catalog at
      `http://nessie:19120/iceberg/main` with the same warehouse location
      Trino uses. Do not use the floating `3.3-latest` tag.

  - id: starrocks-be
    name: StarRocks Backend
    role: serving
    image: starrocks/be-ubuntu
    tag: "3.3.12"
    registry_url: https://hub.docker.com/r/starrocks/be-ubuntu/tags
    upstream_url: https://github.com/StarRocks/starrocks
    notes: Same version requirement as FE.

# ---------------------------------------------------------------------------
# Compatibility constraints — pairs that MUST hold for this stack to work.
# CANDIDATE: rules below are grounded in upstream docs (projectnessie.org,
# trino.io, iceberg.apache.org, StarRocks GitHub) but `verified` strings
# are documentation citations, NOT runtime evidence. Bumping any tag in
# this lock requires re-checking every constraint against the new combo.
# ---------------------------------------------------------------------------
constraints:
  - between: [trino, nessie]
    rule: "Trino's iceberg connector (iceberg.catalog.type=rest) must point iceberg.rest-catalog.uri at Nessie's branch-scoped Iceberg-REST endpoint (e.g. http://nessie:19120/iceberg/main) — the trailing `/iceberg/{branch}` segment is what selects the Nessie branch the session writes to"
    verified: "Per projectnessie.org/iceberg/iceberg-rest/ (fetched 2026-05-17): Nessie exposes the Iceberg REST spec at `/iceberg/{ref}` where `ref` is a Nessie branch or tag. Trino's iceberg-rest client treats this URL as the catalog root; branch selection is implicit in the URL path."

  - between: [nessie, trino]
    rule: "Nessie's Iceberg-REST adapter implements the Iceberg REST spec contract that Trino 460+ requires; Trino 475 clears this floor with margin"
    verified: "Per Nessie 0.99 release notes (fetched 2026-05-17): the Iceberg-REST adapter is marked stable and tracks Iceberg REST spec v1. Trino's iceberg connector docs list the REST catalog type with no version-specific caveats for 460+."

  - between: [spark_writer_external, nessie, trino]
    rule: "Any external Spark writer that creates Iceberg tables via Nessie MUST target the SAME branch URL Trino reads from, otherwise the snapshot Trino sees is the empty `main` branch while the writer's data lives on a different branch"
    verified: "Branch isolation is the documented behavior of Nessie's Iceberg-REST adapter — there is no implicit cross-branch read. The candidate's bootstrap (TBD) must wire both writer and reader to `/iceberg/main` unless an explicit branch is in use."

  - between: [trino, minio]
    rule: "Trino's native S3 filesystem must be enabled (fs.s3.enabled=true on the iceberg catalog) AND configured for path-style addressing (s3.path-style-access=true) when the endpoint is MinIO"
    verified: "Per trino.io/docs/current/object-storage/file-system-s3.html (fetched 2026-05-17): MinIO is listed alongside AWS S3 as an officially-tested S3-compatible store; path-style addressing is the documented mode on plain HTTP endpoints. Bootstrap (TBD) must write s3.path-style-access=true and s3.endpoint=http://minio:9000."

  - between: [starrocks-fe, nessie]
    rule: "StarRocks 3.3.x requires PR #55416 for Iceberg REST catalog FileIO propagation to non-AWS S3 endpoints; the rule applies identically whether the REST server is tabulario/iceberg-rest or Nessie's adapter"
    verified: "3.3.12 includes PR #55416 — same constraint as udp-local-v0.2.lock.yaml. The StarRocks side does not distinguish Nessie's Iceberg-REST adapter from any other compliant REST catalog."

  - between: [starrocks-fe, starrocks-be]
    rule: "FE and BE must run the same minor + patch version"
    verified: "both pinned to 3.3.12"

  - between: [minio, starrocks-fe, starrocks-be]
    rule: "StarRocks FE+BE must export AWS_REGION + AWS_ENDPOINT_URL_S3 + AWS_S3_US_EAST_1_REGIONAL_ENDPOINT=regional in startup, beyond catalog props"
    verified: "Same constraint as udp-local-v0.2 — the StarRocks-vs-MinIO contract is independent of which catalog server is in front. The Windows AWS-SDK→MinIO UnknownHostException caveat from v0.2 likely also applies here; not yet observed."

  - between: [trino, starrocks-fe, nessie]
    rule: "Both engines must connect to the SAME Nessie branch URL and the SAME warehouse location so that tables Trino writes are visible to StarRocks (and vice-versa) without snapshot drift"
    verified: "Both consume NESSIE_ICEBERG_REST_URI=http://nessie:19120/iceberg/main and ICEBERG_WAREHOUSE=s3://datalake/warehouse from env_defaults (TBD in the manifest). Runtime verification pending."

  - between: [nessie, trino, starrocks-fe]
    rule: "TABLE FORMAT ⇄ CATALOG version range marriage: Nessie 0.99.0's Iceberg-REST adapter implements Iceberg REST spec v1; both Trino's iceberg-rest client (Iceberg 1.6+ on Trino 460+) and StarRocks 3.3.12's external Iceberg REST client (Iceberg 1.5+ bundled) consume the same spec — so the version floors are: nessie >= 0.95 (for stable `/iceberg/{branch}` mount path), trino >= 460 (for spec v1 client), starrocks >= 3.3.12 (for PR #55416). Bumping Nessie above 0.99 requires re-checking all three clients."
    verified: "source review 2026-05-17 — projectnessie.org/iceberg/iceberg-rest/, Trino release notes for 460, StarRocks 3.3.12 changelog."
    evidence: "TBD — needs install run"

  - between: [nessie, trino]
    rule: "CATALOG ⇄ SERVING ENGINE wire compatibility: Trino's iceberg connector talks plain HTTP REST to Nessie on port 19120 (`http://nessie:19120/iceberg/main`), no TLS, no auth — this is the local-dev posture. Any production deployment must re-validate the constraint with Nessie behind a TLS terminator AND with Trino configured for `iceberg.rest-catalog.security=oauth2` (or similar), because Nessie 0.99 supports OAuth/OIDC but does not enforce it by default."
    verified: "source review 2026-05-17 — Nessie 0.99 server.yaml ships `authentication.enabled=false` by default; Trino's iceberg-rest client supports OAuth2 properties but does not require them. Local-dev marriage is the unauthenticated plain-HTTP one."
    evidence: "TBD — needs install run"
    known_issue: "Local-dev TLS-off + auth-off is fine for laptop; promotion to linux-stable on a shared host requires the OAuth2/TLS variant constraint to be re-codified."

  - between: [starrocks-fe, nessie]
    rule: "CATALOG ⇄ SERVING ENGINE wire compatibility: StarRocks 3.3.12 reaches Nessie at the same `/iceberg/main` endpoint over plain HTTP. StarRocks's external catalog property `iceberg.catalog.type=rest` + `iceberg.catalog.uri=http://nessie:19120/iceberg/main` is the marriage shape — distinct from `iceberg.catalog.type=hive` (which would point at HMS). Mis-pinning the catalog type silently produces an empty catalog instead of an auth error."
    verified: "source review 2026-05-17 — StarRocks 3.3 external-catalog docs. Same wire shape as the tabulario/iceberg-rest case verified in udp-local-v0.2."
    evidence: "TBD — needs install run"

  - between: [trino, minio]
    rule: "PROCESSING ⇄ STORAGE credential propagation: Trino's iceberg catalog must carry s3.aws-access-key + s3.aws-secret-key matching the MinIO root credentials (or a non-root MinIO user with bucket-level access to `datalake`). Without these the table-list call succeeds (Nessie returns metadata) but the SELECT fails at Parquet read with a 403 from MinIO."
    verified: "Same constraint as udp-trino-local-v0.1's trino↔minio credentials rule. The bootstrap (TBD) must inject the values from AWS_ACCESS_KEY_ID / AWS_SECRET_ACCESS_KEY into the iceberg catalog properties."
    evidence: "TBD — needs install run"

  - between: [starrocks-fe, minio]
    rule: "PROCESSING ⇄ STORAGE credential propagation: StarRocks's external Iceberg catalog must carry `aws.s3.access_key` + `aws.s3.secret_key` + `aws.s3.endpoint=http://minio:9000` + `aws.s3.enable_path_style_access=true` matching MinIO. The OS-level AWS_* env vars are a SEPARATE concern (see the FE+BE env-var constraint above) — both belt-and-suspenders are needed."
    verified: "source review 2026-05-17 — StarRocks Iceberg REST catalog property docs. Same shape as v0.2."
    evidence: "TBD — needs install run"

  - between: [nessie]
    rule: "BACKING DB ⇄ CATALOG durability: Nessie 0.99 defaults its persistence backend to in-memory when no `nessie.version.store.type` is configured. Restarting the Nessie container WILL drop all commits, branches, and tables — only the data on MinIO survives. A pilot-stable promotion must either (a) accept this dev-only behavior and document it, or (b) add a `nessie-postgres` component and pin `nessie.version.store.type=JDBC` with the matching JDBC URL."
    verified: "source review 2026-05-17 — Nessie 0.99 application.properties defaults. The lock currently does NOT include a persistence backend, so the in-memory default applies."
    evidence: "TBD — needs install run"
    known_issue: "This is a deliberate scope cut for v0.1 candidate. Track as GATE 3 for pilot-stable promotion: add a Nessie persistence backend pin."

  - between: [trino, minio, nessie]
    rule: "PORT BINDING uniqueness for the recommended overlay set: trino:8080, nessie:19120, minio:9000+9001, starrocks-fe:8030+9030 — these MUST be distinct on the host. No collision with v0.2's iceberg-rest:8181 because this stack does NOT include iceberg-rest. If a user runs udp-local-v0.2 and this stack side-by-side, Trino's 8080 will collide with udp-local-v0.2's Jupyter (which also defaults to 8888 NOT 8080 — but bootstrap must verify before binding)."
    verified: "source review 2026-05-17 — ports_required list in this lock + the v0.2 lock. Host bootstrap (TBD) must pre-flight check these are free."
    evidence: "TBD — needs install run"

  - between: [nessie, trino, starrocks-fe]
    rule: "VOLUME MOUNT contract: this stack does NOT require any host bind-mount for catalog data when Nessie runs with the default in-memory store. If pilot-stable promotion adds a Nessie JDBC backend (see Nessie durability constraint above), a bind-mount for the Postgres data volume becomes required and must be added here. Trino's catalog `.properties` files come in via the image's bake or a config bind-mount at `/etc/trino/catalog/` — the bootstrap (TBD) must materialize `iceberg.properties` and bind it in."
    verified: "source review 2026-05-17 — Trino image documents `/etc/trino/catalog/` as the catalog-config directory; the bootstrap (TBD) must write the iceberg.properties file with the Nessie URI + S3 props before `docker compose up`."
    evidence: "TBD — needs install run"

  - between: [trino, starrocks-fe, nessie]
    rule: "ENGINE ⇄ ENGINE PARITY (deeper than just URL): both Trino and StarRocks must agree on the warehouse path that Nessie hands back AND on the implicit Iceberg spec version they consume. Trino 475 + Iceberg 1.6 client and StarRocks 3.3.12 + Iceberg 1.5 client both speak Iceberg v2 table format, so a table Spark writes at format-version=2 is readable by both. A future Iceberg v3 writer (Iceberg 1.9+) would NOT be readable by StarRocks 3.3.12 even though the Nessie URL is identical."
    verified: "source review 2026-05-17 — Iceberg format-version compatibility matrix (iceberg.apache.org/spec). Table format version is an implicit marriage between writer (Spark+Iceberg client) and ALL readers."
    evidence: "TBD — needs install run"
    known_issue: "Any future stack that bumps to Iceberg 1.9+ on the writer must re-verify StarRocks read-side, not just the Nessie/Trino versions."

