status_notes: |
  CANDIDATE — NOT INSTALLABLE END-TO-END YET.

  Evidence classification (honest accounting per the "evidence-backed
  compatibility" principle):

  SOURCE-VERIFIED marriages (read from upstream docs / image manifests on
  2026-05-17 — no runtime evidence yet):
    - nessie:0.99.0 exposes Iceberg-REST at `/iceberg/{branch}` (Nessie
      release notes + projectnessie.org/iceberg/iceberg-rest/).
    - trino:475 ships the iceberg connector with `iceberg.catalog.type=rest`
      and Trino's native S3 filesystem with `s3.path-style-access` flag
      (trino.io/docs/current/connector/iceberg.html + file-system-s3.html).
    - starrocks-fe:3.3.12 contains PR #55416 — same axiom as v0.2
      (StarRocks changelog).
    - The path-style + http-endpoint axioms for MinIO are identical to
      v0.2's pilot-stable record (re-used, not re-proven).

  AXIOMATICALLY-CLAIMED marriages (need install evidence to prove):
    - That Nessie's `/iceberg/main` round-trips cleanly between a Spark
      writer and a Trino reader on this exact tag combination.
    - That StarRocks 3.3.12's external Iceberg REST catalog accepts
      Nessie's branch-scoped URI verbatim (same shape as a plain
      iceberg-rest URI, but never runtime-checked against Nessie).
    - That the Windows AWS-SDK→MinIO UnknownHostException from v0.2
      reproduces (or doesn't) in this stack — same StarRocks version,
      same MinIO, but Nessie in front instead of tabulario/iceberg-rest.
    - Nessie's persistence layer ships defaulted to in-memory (`MONGO`,
      `IN_MEMORY`, etc. per version); the lock does not yet pin which
      backend Nessie runs against, so durability across container
      restarts is NOT a guaranteed marriage of this lock.

  Why this stack matters:
    - Nessie's Iceberg-REST adapter (added in the 0.7x line, mature by 0.99)
      lets Trino's `iceberg.catalog.type=rest` connector talk straight to
      Nessie without a separate iceberg-rest sidecar. The reward is branch
      semantics on the catalog (Nessie's killer feature) reachable from
      stock Trino + stock StarRocks without bespoke client code.

  Promotion requirements to pilot-stable:
    1. Append at least one passing evidence[] entry where Trino executes
       a successful SELECT against an Iceberg table that was created via
       Spark on the SAME Nessie branch — proving the branch-scoped REST
       URI (`/iceberg/main`) round-trips cleanly between writer and
       reader.
    2. Nessie's Iceberg-REST adapter requires Trino 460+ for the REST
       endpoint contract that Nessie 0.99 implements; we pin Trino 475
       which clears that floor with margin, but the runtime verification
       still has to happen.
    3. Capture certified_on os/docker/docker_compose from the verified
       host once an install completes — current `TBD` placeholders block
       promotion on their own.

  Use udp-local-v0.2 for any real install today.

