# Postgres plus Trino's 3-4 GB heap budget pushes this floor in line
# with the udp-trino candidate.
# ---------------------------------------------------------------------------
host_requirements:
  docker_min: "28.0"
  docker_compose_min: "v2.30"
  bash_min: "5.0"
  os_verified: []  # CANDIDATE: nothing verified yet
  os_unverified_but_likely_works:
    - "Ubuntu 22.04+ (Linux)"
    - "Windows 11 + Docker Desktop"
    - "macOS + Docker Desktop"
  ram_min_gb: 14
  ram_recommended_gb: 20
  disk_min_gb: 50
  ports_required: [9000, 9001, 9083, 5432, 8080, 8888]

