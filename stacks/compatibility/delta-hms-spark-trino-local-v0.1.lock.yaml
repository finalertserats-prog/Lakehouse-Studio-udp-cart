status: "candidate"

# Maturity grades:
#   candidate       — tags verified present on registry; combination NOT installed end-to-end
#   pilot-stable    — install completes, lakehouse readable, smoke may need Skip on some OS
#   linux-stable    — verified end-to-end on a Linux VPS, smoke passes clean
#   production      — additional hardening (TLS, backups, RBAC) certified
status_notes: |
  CANDIDATE — NOT INSTALLABLE END-TO-END YET.

  Evidence classification (honest accounting per the "evidence-backed
  compatibility" principle):

  SOURCE-VERIFIED marriages (read from upstream docs / image manifests
  on 2026-05-17 — no runtime evidence yet):
    - Delta Lake 3.2.x documents Spark 3.5.x as a supported runtime
      (docs.delta.io/3.2.0/releases.html).
    - Trino 475's delta-lake connector documents Hive Metastore Thrift
      as a supported catalog source (trino.io/docs/current/connector/
      delta-lake.html).
    - bitsondatadev/hive-metastore image is the same one used in the
      hudi-hms-spark candidate; HMS 3.x line is documented as the
      supported Hive line for Trino's delta-lake connector when not
      using Glue or Unity Catalog.
    - postgres 15-alpine + MinIO path-style http-endpoint axioms are
      identical to v0.2.

  AXIOMATICALLY-CLAIMED marriages (need install evidence to prove):
    - That Spark 3.5.0 + Delta 3.2.1 bundled in the (NOT YET BUILT)
      `lakehousestudio/spark-delta:3.5.0_3.2.1` image creates Delta
      tables that Trino 475's delta-lake connector reads cleanly
      through the SAME HMS instance.
    - The exact set of `spark.sql.extensions` + Delta catalog impl
      properties (DeltaSparkSessionExtension, DeltaCatalog) required
      to produce HMS-syncable Delta tables has not been runtime-
      validated against this image combination.
    - Whether Trino's delta-lake connector's checkpointing assumptions
      match what Spark 3.5.0+Delta 3.2.1 writes by default (Delta
      protocol versions, deletion-vector support, etc.) — same writer/
      reader protocol versions are the implicit marriage that needs
      runtime proof.

  GATE-LEVEL blockers to promotion (mirroring the hudi-hms-spark candidate):

  GATE 1 — Studio-built image not yet baked.
    The `lakehousestudio/spark-delta:3.5.0_3.2.1` image listed in
    components[] does not exist on any registry yet. The Dockerfile
    that produces it lives at `scripts/images/Dockerfile.spark-delta`
    (followup work — file not yet committed). Promotion requires:
      (a) the Dockerfile is committed and reviewed,
      (b) the image is baked by Studio's release pipeline,
      (c) the image is pushed to a registry the install hosts can
          pull from (Docker Hub under the `lakehousestudio` org is
          the planned target),
      (d) the resulting tag's digest SHA is recorded in this lock
          file alongside the tag.

  GATE 2 — End-to-end install evidence missing.
    Even after the image is available, the combination of Spark
    writing Delta tables, syncing to Hive Metastore (HMS) backed by
    Postgres, AND Trino reading those tables via its `delta-lake`
    connector pointed at the same HMS has not been runtime-validated
    under Studio's installer. Promotion requires at least one passing
    evidence[] entry where Trino successfully runs a SELECT against
    a Delta table that Spark created via the SAME HMS in the same
    install.

  Other open items:
    - `bitsondatadev/hive-metastore:latest` is a floating tag. Before
      promotion, pin to a specific digest SHA. Same caveat as in the
      hudi-hms candidate.

  Use udp-local-v0.2 for any real install today.

# ---------------------------------------------------------------------------
# Component lock — every container image and tag in the candidate stack.
# All tags below verified present on their registries on 2026-05-17,
# EXCEPT lakehousestudio/spark-delta which is not yet built (see GATE 1).
# ---------------------------------------------------------------------------
components:
  - id: minio
    name: MinIO
    role: object_storage
    image: minio/minio
    tag: "RELEASE.2025-04-22T22-12-26Z"
    registry_url: https://hub.docker.com/r/minio/minio/tags
    upstream_url: https://github.com/minio/minio
    notes: |
      Same MinIO release as udp-local-v0.2. Healthcheck uses `mc ready local`
      bundled in the image. Spark writes Delta `_delta_log/` JSON +
      Parquet data files over the same S3 surface MinIO implements;
      Trino's delta-lake connector reads through the same surface.

  - id: minio-client
    name: MinIO Client (mc)
    role: object_storage_bootstrap
    image: minio/mc
    tag: "RELEASE.2025-04-16T18-13-26Z"
    registry_url: https://hub.docker.com/r/minio/mc/tags
    upstream_url: https://github.com/minio/mc
    notes: One-shot bootstrap — creates the `datalake` bucket on MinIO startup. Same as v0.2.

  - id: postgres
    name: PostgreSQL (Hive Metastore backing DB)
    role: db_backing
    image: postgres
    tag: "15-alpine"
    registry_url: https://hub.docker.com/_/postgres/tags
    upstream_url: https://www.postgresql.org/
    notes: |
      Backing store for the Hive Metastore's relational schema. Same
      pin as hudi-hms-spark-local-v0.1 — 15-alpine chosen for small
      footprint and stable schema-init behavior. Do not use the
      floating `postgres:latest` tag.

  - id: hive-metastore
    name: Hive Metastore (standalone)
    role: metastore
    image: bitsondatadev/hive-metastore
    tag: "latest"
    registry_url: https://hub.docker.com/r/bitsondatadev/hive-metastore/tags
    upstream_url: https://github.com/bitsondatadev/docker-hive-metastore
    notes: |
      NEEDS SHA PINNING before pilot-stable promotion. `latest` is
      acceptable in the candidate window only because there is no
      installable combination yet. Same caveat as in the hudi-hms
      candidate. Both Spark (writer) and Trino (reader) point at this
      single HMS instance over Thrift on port 9083 — HMS is the
      catalog source of truth for the Delta tables in this stack.

  - id: spark-delta
    name: Apache Spark + Delta Lake (Studio-built)
    role: processing
    image: lakehousestudio/spark-delta
    tag: "3.5.0_3.2.1"
    registry_url: https://hub.docker.com/r/lakehousestudio/spark-delta/tags
    upstream_url: https://docs.delta.io/latest/index.html
    notes: |
      NOT YET BUILT — see status_notes GATE 1. The image must be baked
      by Studio's release pipeline from `scripts/images/Dockerfile.spark-delta`
      (followup work — Dockerfile not yet committed). Pinned tag scheme
      mirrors the upstream tabulario convention: `{spark}_{delta}` so
      `3.5.0_3.2.1` means Spark 3.5.0 + Delta Lake 3.2.1. Delta 3.2 is
      the stable line known to interoperate cleanly with Trino's
      delta-lake connector through an HMS-backed catalog.

  - id: trino
    name: Trino
    role: processing
    image: trinodb/trino
    tag: "475"
    registry_url: https://hub.docker.com/r/trinodb/trino/tags
    upstream_url: https://trino.io/docs/current/connector/delta-lake.html
    notes: |
      Trino 475 picked for the same reasons as udp-trino-local-v0.1
      and iceberg-nessie-trino-local-v0.1: in-market long enough for
      delta-lake connector + MinIO bugs to surface, and numerically
      pinned so the lock contract holds against the moving `latest`
      tag. Trino's delta-lake connector connects to HMS over Thrift —
      `hive.metastore.uri=thrift://hive-metastore:9083` plus
      `delta.security=allow-all` (typical local-dev posture). DO NOT
      use `trinodb/trino:latest` here.

# ---------------------------------------------------------------------------
# Compatibility constraints — pairs that MUST hold for this stack to work.
# CANDIDATE: rules below are grounded in upstream docs (docs.delta.io,
# trino.io, hive.apache.org) but `verified` strings are documentation
# citations, NOT runtime evidence. Bumping any tag in this lock requires
# re-checking every constraint against the new combination.
# ---------------------------------------------------------------------------
constraints:
  - between: [hive-metastore, postgres]
    rule: "Hive Metastore must connect to a running Postgres BEFORE its schema-init step; HMS dies on startup if the JDBC connection refuses on first try"
    verified: "Per bitsondatadev/docker-hive-metastore README (fetched 2026-05-17): `depends_on: { postgres: { condition: service_healthy } }` is the documented pattern. Same constraint as hudi-hms-spark-local-v0.1."

  - between: [spark-delta, hive-metastore]
    rule: "Spark+Delta must register its tables with HMS via the Delta `_delta_log → external table` pattern: `CREATE TABLE … USING DELTA LOCATION 's3a://datalake/warehouse/…'` against a SparkSession configured with the Hive metastore catalog implementation"
    verified: "Per docs.delta.io/latest/delta-spark.html (fetched 2026-05-17): Delta tables register in HMS as external tables whose LOCATION is the Delta table root. The Studio-built spark-delta image's `spark-defaults.conf` must set `spark.sql.catalogImplementation=hive` and `spark.hadoop.hive.metastore.uris=thrift://hive-metastore:9083`."

  - between: [trino, hive-metastore]
    rule: "Trino's delta-lake connector requires `hive.metastore.uri=thrift://hive-metastore:9083` (same HMS Spark wrote to) and must be configured with the same s3.* properties as the iceberg connector in udp-trino-local-v0.1 because the delta-lake connector reuses Trino's native S3 filesystem"
    verified: "Per trino.io/docs/current/connector/delta-lake.html (fetched 2026-05-17): the delta-lake connector requires a Hive Metastore reference and reads through Trino's native S3 filesystem stack — the same fs.s3.enabled + s3.path-style-access + s3.endpoint properties as the iceberg connector apply."

  - between: [spark-delta, trino, hive-metastore]
    rule: "Triangle dependency: Spark writes Delta to MinIO AND registers in HMS → Trino reads HMS → Trino's delta-lake connector reads the Delta log + data from MinIO. If Spark forgets the HMS sync, Trino sees no table. If Trino's HMS URI differs from Spark's, Trino sees a different (empty) catalog."
    verified: "Composition of the two constraints above. Bootstrap (TBD) must wire both engines to the same HMS Thrift URI and the same warehouse path."

  - between: [spark-delta, minio]
    rule: "Spark+Delta must use path-style S3 addressing (spark.hadoop.fs.s3a.path.style.access=true) and the s3a endpoint must point at MinIO (spark.hadoop.fs.s3a.endpoint=http://minio:9000)"
    verified: "Same constraint as udp-local-v0.2 — MinIO on plain HTTP does not implement virtual-hosted-style bucket addressing. The Studio-built spark-delta image's `spark-defaults.conf` must ship these settings."

  - between: [trino, minio]
    rule: "Trino's delta-lake connector must enable fs.s3.enabled=true AND s3.path-style-access=true AND set s3.endpoint=http://minio:9000 — identical to the iceberg-connector contract in udp-trino-local-v0.1"
    verified: "Per trino.io/docs/current/object-storage/file-system-s3.html (fetched 2026-05-17): MinIO is the documented S3-compatible target; path-style is required on HTTP endpoints. Same constraint as udp-trino-local-v0.1's trino↔minio rule."

  - between: [trino, minio]
    rule: "Trino's delta-lake catalog must carry s3.aws-access-key + s3.aws-secret-key matching the MinIO root credentials, otherwise SELECT through the connector fails at Parquet read with a 403 from MinIO"
    verified: "Same constraint as udp-trino-local-v0.1's trino↔minio credentials rule. The bootstrap (TBD) must inject the values from AWS_ACCESS_KEY_ID / AWS_SECRET_ACCESS_KEY into the delta-lake catalog properties."

