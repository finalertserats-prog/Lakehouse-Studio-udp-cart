# ---------------------------------------------------------------------------
# Known-incompatible — combinations we know DO NOT work.
# ---------------------------------------------------------------------------
incompatible:
  - combination: ["spark-delta:3.5.0_3.2.1"]
    reason: "Image does not exist on any registry yet — `lakehousestudio/spark-delta` is a Studio-built image (GATE 1 in status_notes). Any install attempt will fail at `docker compose up` with a pull error until the bake pipeline ships."
    discovered: "2026-05-17"
    workaround: "Bake the image from `scripts/images/Dockerfile.spark-delta` (followup work) before attempting an install."

  - combination: [trino:latest]
    reason: "Floating `latest` tag changes whenever Trino ships. The lock-file contract requires a stable tag — use a numeric pin like `475`."
    discovered: "2026-05-17"
    workaround: "Pin to the numeric Trino tag that matches the lock (currently 475)."

  - combination: ["postgres:latest"]
    reason: "Postgres major-version bumps occasionally change pg_dump/pg_restore output formats and minor SQL behaviors the HMS schema-init expects. The lock-file contract requires a stable tag."
    discovered: "2026-05-17"
    workaround: "Pin to `mysql:8.0` (the locked tag) or bump explicitly with re-verification against HMS schema-init."

  - combination: ["hive-metastore:4.x", "trino:475 delta-lake connector"]
    reason: "Trino's delta-lake connector uses the same metastore client code path as the iceberg connector — both break on HMS 4.x Thrift schema changes (mirroring the hudi-hms candidate's HMS 3.x→4.x incompatibility). The supported HMS line for Trino's delta-lake connector at Trino 475 is HMS 3.x."
    discovered: "2026-05-17"
    workaround: "Stay on the bitsondatadev/hive-metastore image (Hive 3.x line). Re-evaluate when Trino ships HMS 4 support in the delta-lake connector."

  - combination: ["spark-delta:3.5.0_3.2.1 with delta.enableDeletionVectors=true", "trino:<442"]
    reason: "Delta deletion vectors require a reader implementation Trino did not have until 442. Trino versions before 442 silently return rows that should be soft-deleted — wrong answers, no error. This lock pins Trino 475 so the marriage holds, but downgrading Trino without re-verifying breaks correctness."
    discovered: "2026-05-17"
    workaround: "Keep Trino at 475 or any future numeric tag, AND/OR set `delta.enableDeletionVectors=false` on tables that any pre-442 reader must consume."

  - combination: ["spark-delta:3.5.0_3.2.1 + hudi 0.15 + iceberg in same warehouse"]
    reason: "Three table formats in one warehouse prefix produce a catalog of mixed-format tables. Each engine reads only its own format; the others appear as broken tables (file-listing succeeds, type-validation fails). The catalog is technically the same HMS, but the data is not interoperable."
    discovered: "2026-05-17"
    workaround: "One table format per stack. This lock is Delta-only; the hudi-* stack is Hudi-only; the iceberg-* stacks are Iceberg-only. Cross-stack interop requires a translation layer (e.g., XTable/Delta UniForm) not covered by this lock."

  - combination: ["spark-delta:3.5.0_3.2.1 without DeltaSparkSessionExtension"]
    reason: "Without `spark.sql.extensions=io.delta.sql.DeltaSparkSessionExtension`, CREATE TABLE … USING DELTA falls back to vanilla DataSource v1 path and the table registers in HMS as a generic Parquet table without Delta's table-type marker. Trino's delta-lake connector then refuses to read the table (treats it as non-Delta) and Trino's iceberg connector won't read it either. Silent format-mismatch is the failure mode."
    discovered: "2026-05-17"
    workaround: "Studio image's spark-defaults.conf must bake both `spark.sql.extensions=io.delta.sql.DeltaSparkSessionExtension` and `spark.sql.catalog.spark_catalog=org.apache.spark.sql.delta.catalog.DeltaCatalog`. Bootstrap (TBD) must pre-flight that these are present."
