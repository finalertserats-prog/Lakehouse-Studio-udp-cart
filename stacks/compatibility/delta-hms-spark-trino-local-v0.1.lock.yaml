# ---------------------------------------------------------------------------
# Known-incompatible — combinations we know DO NOT work.
# ---------------------------------------------------------------------------
incompatible:
  - combination: ["spark-delta:3.5.0_3.2.1"]
    reason: "Image does not exist on any registry yet — `lakehousestudio/spark-delta` is a Studio-built image (GATE 1 in status_notes). Any install attempt will fail at `docker compose up` with a pull error until the bake pipeline ships."
    discovered: "2026-05-17"
    workaround: "Bake the image from `scripts/images/Dockerfile.spark-delta` (followup work) before attempting an install."

  - combination: [trino:latest]
    reason: "Floating `latest` tag changes whenever Trino ships. The lock-file contract requires a stable tag — use a numeric pin like `475`."
    discovered: "2026-05-17"
    workaround: "Pin to the numeric Trino tag that matches the lock (currently 475)."

  - combination: ["postgres:latest"]
    reason: "Postgres major-version bumps occasionally change pg_dump/pg_restore output formats and minor SQL behaviors the HMS schema-init expects. The lock-file contract requires a stable tag."
    discovered: "2026-05-17"
    workaround: "Pin to `postgres:15-alpine` (the locked tag) or bump explicitly with re-verification against HMS schema-init."
