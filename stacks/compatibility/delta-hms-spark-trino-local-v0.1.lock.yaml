      use `trinodb/trino:latest` here.

# ---------------------------------------------------------------------------
# Compatibility constraints — pairs that MUST hold for this stack to work.
# CANDIDATE: rules below are grounded in upstream docs (docs.delta.io,
# trino.io, hive.apache.org) but `verified` strings are documentation
# citations, NOT runtime evidence. Bumping any tag in this lock requires
# re-checking every constraint against the new combination.
# ---------------------------------------------------------------------------
constraints:
  - between: [hive-metastore, postgres]
    rule: "Hive Metastore must connect to a running Postgres BEFORE its schema-init step; HMS dies on startup if the JDBC connection refuses on first try"
    verified: "Per bitsondatadev/docker-hive-metastore README (fetched 2026-05-17): `depends_on: { postgres: { condition: service_healthy } }` is the documented pattern. Same constraint as hudi-hms-spark-local-v0.1."

  - between: [spark-delta, hive-metastore]
    rule: "Spark+Delta must register its tables with HMS via the Delta `_delta_log → external table` pattern: `CREATE TABLE … USING DELTA LOCATION 's3a://datalake/warehouse/…'` against a SparkSession configured with the Hive metastore catalog implementation"
    verified: "Per docs.delta.io/latest/delta-spark.html (fetched 2026-05-17): Delta tables register in HMS as external tables whose LOCATION is the Delta table root. The Studio-built spark-delta image's `spark-defaults.conf` must set `spark.sql.catalogImplementation=hive` and `spark.hadoop.hive.metastore.uris=thrift://hive-metastore:9083`."

  - between: [trino, hive-metastore]
    rule: "Trino's delta-lake connector requires `hive.metastore.uri=thrift://hive-metastore:9083` (same HMS Spark wrote to) and must be configured with the same s3.* properties as the iceberg connector in udp-trino-local-v0.1 because the delta-lake connector reuses Trino's native S3 filesystem"
    verified: "Per trino.io/docs/current/connector/delta-lake.html (fetched 2026-05-17): the delta-lake connector requires a Hive Metastore reference and reads through Trino's native S3 filesystem stack — the same fs.s3.enabled + s3.path-style-access + s3.endpoint properties as the iceberg connector apply."

  - between: [spark-delta, trino, hive-metastore]
    rule: "Triangle dependency: Spark writes Delta to MinIO AND registers in HMS → Trino reads HMS → Trino's delta-lake connector reads the Delta log + data from MinIO. If Spark forgets the HMS sync, Trino sees no table. If Trino's HMS URI differs from Spark's, Trino sees a different (empty) catalog."
    verified: "Composition of the two constraints above. Bootstrap (TBD) must wire both engines to the same HMS Thrift URI and the same warehouse path."

  - between: [spark-delta, minio]
    rule: "Spark+Delta must use path-style S3 addressing (spark.hadoop.fs.s3a.path.style.access=true) and the s3a endpoint must point at MinIO (spark.hadoop.fs.s3a.endpoint=http://minio:9000)"
    verified: "Same constraint as udp-local-v0.2 — MinIO on plain HTTP does not implement virtual-hosted-style bucket addressing. The Studio-built spark-delta image's `spark-defaults.conf` must ship these settings."

  - between: [trino, minio]
    rule: "Trino's delta-lake connector must enable fs.s3.enabled=true AND s3.path-style-access=true AND set s3.endpoint=http://minio:9000 — identical to the iceberg-connector contract in udp-trino-local-v0.1"
    verified: "Per trino.io/docs/current/object-storage/file-system-s3.html (fetched 2026-05-17): MinIO is the documented S3-compatible target; path-style is required on HTTP endpoints. Same constraint as udp-trino-local-v0.1's trino↔minio rule."

  - between: [trino, minio]
    rule: "Trino's delta-lake catalog must carry s3.aws-access-key + s3.aws-secret-key matching the MinIO root credentials, otherwise SELECT through the connector fails at Parquet read with a 403 from MinIO"
    verified: "Same constraint as udp-trino-local-v0.1's trino↔minio credentials rule. The bootstrap (TBD) must inject the values from AWS_ACCESS_KEY_ID / AWS_SECRET_ACCESS_KEY into the delta-lake catalog properties."

  - between: [spark-delta, trino]
    rule: "TABLE FORMAT ⇄ ENGINE protocol-version marriage: Delta Lake tables carry a (minReaderVersion, minWriterVersion) protocol pair in the `_delta_log/` metadata. Delta 3.2.x defaults writes to (1,2) but optional features (deletion vectors, column mapping, identity columns) bump the reader/writer floor. Trino 475's delta-lake connector reads protocol versions up through (3,7) but does NOT support all writer features — specifically deletion vectors require Trino 442+ and column-mapping=name requires Trino 380+. Bumping Delta beyond 3.2 may bring in protocol features Trino 475 can't read."
    verified: "source review 2026-05-17 — docs.delta.io/3.2.0/versioning.html for the protocol matrix; trino.io/docs/current/connector/delta-lake.html for Trino's supported protocol versions."
    evidence: "TBD — needs install run"
    known_issue: "If a Spark writer ever enables `delta.enableDeletionVectors=true` on a table, Trino versions before 442 silently return wrong results (rows that should be deleted appear in SELECT). Trino 475 handles this correctly, but any future Trino downgrade in this lock breaks the marriage."

  - between: [spark-delta]
    rule: "JAR BUNDLE PARITY: the Delta jar baked into `lakehousestudio/spark-delta:3.5.0_3.2.1` MUST be the `delta-spark_2.12-3.2.1.jar` + `delta-storage-3.2.1.jar` pair compiled against Spark 3.5's API. Mixing Delta 3.2 jars with Spark 3.4 or 3.6 produces NoSuchMethodError at first write. The Studio image-build (TBD Dockerfile) must pin both jars by exact version + Scala-binary suffix (2.12)."
    verified: "source review 2026-05-17 — docs.delta.io/3.2.0/releases.html lists supported Spark versions; tabulario-style image build patterns pin jars by full name. Same parity discipline as the hudi candidate."
    evidence: "TBD — needs install run"

  - between: [spark-delta, hive-metastore]
    rule: "CATALOG ⇄ PROCESSING ENGINE configuration: Spark+Delta must set `spark.sql.extensions=io.delta.sql.DeltaSparkSessionExtension` AND `spark.sql.catalog.spark_catalog=org.apache.spark.sql.delta.catalog.DeltaCatalog` so that `CREATE TABLE … USING DELTA` registers in HMS as a Delta external table with the right table-type marker. Without these, CREATE TABLE produces a vanilla Parquet entry in HMS and Trino's delta-lake connector won't recognize the table as Delta — it'll be visible but unreadable through the delta-lake catalog."
    verified: "source review 2026-05-17 — docs.delta.io/3.2.0/delta-spark.html#configure-sparksession + #set-up-apache-spark-with-delta-lake. The Studio image's `spark-defaults.conf` MUST ship both properties."
    evidence: "TBD — needs install run"

  - between: [trino, hive-metastore]
    rule: "CATALOG ⇄ SERVING ENGINE wire compatibility: Trino's delta-lake connector requires HMS Thrift schema in the 3.x range (same as the iceberg connector when used with hive.metastore=thrift). HMS 4.x has Thrift schema changes Trino's connector does not yet handle — pinning bitsondatadev/hive-metastore (3.x line) is therefore a marriage requirement, not a preference."
    verified: "source review 2026-05-17 — trino.io/docs/current/connector/delta-lake.html documents HMS Thrift as the catalog source; Trino's metastore client is the same code path as the iceberg connector, which is known to break on HMS 4.x (see hudi-hms candidate's incompatible[] for the parallel observation)."
    evidence: "TBD — needs install run"

  - between: [trino, hive-metastore, spark-delta]
    rule: "TLS/AUTH boundary: HMS Thrift on port 9083 carries NO encryption and NO authentication in this stack — both Spark (writer) and Trino (reader) plain-TCP connect inside the Docker network. This is localhost-only trust posture. Either engine published to a non-loopback host without adding SASL+TLS to HMS breaks the security claim of this lock — but the lock does not cover the authenticated HMS variant."
    verified: "source review 2026-05-17 — bitsondatadev/docker-hive-metastore default config has no SASL. Compose bind (TBD) MUST keep 9083 internal-only."
    evidence: "TBD — needs install run"

  - between: [hive-metastore, postgres]
    rule: "BACKING DB ⇄ CATALOG driver/schema match: identical constraint to the hudi-hms-spark candidate — bitsondatadev/hive-metastore bundles a Postgres JDBC driver in the 42.x line, verified against MySQL 8.0. Pinning mysql:8.0 is the safe marriage; postgres:16 is not yet verified."
    verified: "source review 2026-05-17 — same as the hudi-hms candidate's hive-metastore↔postgres constraint. Cross-referenced for traceability."
    evidence: "TBD — needs install run"

  - between: [spark-delta, trino, minio]
    rule: "ENGINE ⇄ ENGINE PARITY (warehouse path agreement): both Spark+Delta and Trino's delta-lake connector must agree on the warehouse-prefix convention. If Spark writes `CREATE TABLE … LOCATION 's3a://datalake/warehouse/foo'` but Trino's delta-lake catalog is configured with a different `delta.warehouse` default, CREATE-via-Spark works but CREATE-via-Trino lands in a different prefix and the two engines see disjoint catalogs. Bootstrap (TBD) must inject a single shared warehouse path via env var consumed by both engines."
    verified: "source review 2026-05-17 — Trino's delta-lake connector docs note `delta.warehouse` is optional but should match the Spark side when both engines write. Same shape as the iceberg-nessie-trino warehouse-parity constraint."
    evidence: "TBD — needs install run"
    known_issue: "Silent divergence — no error, just disjoint catalogs. Bootstrap pre-flight should assert the single shared warehouse env var is in scope for both engines."

  - between: [spark-delta, trino, hive-metastore, postgres, minio]
    rule: "PORT BINDING uniqueness for the recommended overlay set: minio:9000+9001, hive-metastore-thrift:9083, postgres:5432, trino:8080, jupyter:8888. This stack's port set overlaps with hudi-hms-spark-local-v0.1 (both use 9083 + 5432 + 9000/9001) — running both stacks simultaneously requires different compose project names AND a port-collision pre-flight, or the second `docker compose up` will fail with `port already allocated`. No collision with udp-local-v0.2 (which uses 8181, 8030, 9030) outside of MinIO."
    verified: "source review 2026-05-17 — ports_required list in this lock + hudi-hms candidate's list. Host bootstrap (TBD) must pre-flight."
    evidence: "TBD — needs install run"

  - between: [hive-metastore, postgres]
    rule: "VOLUME MOUNT contract: Postgres MUST mount a named volume for `/var/lib/postgresql/data` (same as the hudi-hms candidate). HMS schema-init runs exactly once per fresh data volume; losing the volume between restarts means HMS re-initializes, which IS idempotent in 3.x but invalidates every Delta-table pointer the previous schema held. Trino then sees no tables; Spark writes succeed against new HMS but the OLD tables on MinIO are unreferenced."
    verified: "source review 2026-05-17 — mysql:8.0 documents `/var/lib/postgresql/data` as PGDATA. Same constraint as the hudi-hms candidate, restated for traceability."
    evidence: "TBD — needs install run"

  - between: [spark-delta, trino]
    rule: "ENGINE ⇄ ENGINE PARITY (concurrent-writer safety): Delta Lake's optimistic concurrency control is enforced at the `_delta_log/` level — both Spark and Trino write delta-lake commits as `00000000000000000001.json` style files. Trino's delta-lake connector supports INSERT but NOT MERGE INTO at Trino 475's release time; mixed Spark-MERGE + Trino-INSERT on the same table is allowed but Spark must remain the schema-evolution authority (Trino INSERT does not bump schema versions)."
    verified: "source review 2026-05-17 — docs.delta.io/3.2.0/concurrency-control.html + trino.io/docs/current/connector/delta-lake.html#sql-support. The supported-statements section explicitly lists what Trino can and cannot do."
    evidence: "TBD — needs install run"
    known_issue: "If a future Trino bump enables MERGE INTO for delta-lake, this constraint changes — re-verify the concurrent-writer story with the new release before bumping."

