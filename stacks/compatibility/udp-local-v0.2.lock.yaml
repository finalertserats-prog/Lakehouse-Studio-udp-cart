# ---------------------------------------------------------------------------
# Known-incompatible — combinations we know DO NOT work. Just as important
# as the positive matrix.
# ---------------------------------------------------------------------------
incompatible:
  - combination: [spark:3.5.1_1.5.2]
    reason: "Tag was removed from Docker Hub after UDP shipped. Any fresh install fails at `docker compose up` with 'not found' error."
    discovered: "2026-05-16"
    workaround: "Bump to 3.5.5_1.8.1 (current certified)"

  - combination: [starrocks-fe:3.3-latest, starrocks-be:3.3-latest]
    reason: "Floating tag has historically resolved to 3.3.10 (pre-3.3.12) which has the Iceberg REST FileIO propagation bug (fixed by PR #55416)."
    discovered: "2026-05-16"
    workaround: "Pin to exact 3.3.12 or newer"

  - combination: [starrocks-fe + spark with hive-metastore]
    reason: |
      UDP's pre-PR-#6 compose had spark → hive-metastore as a hard
      dependency. Without hive-metastore actually starting (which
      required additional env vars not in .env.example), spark
      stayed in Created state forever.
    discovered: "2026-05-16"
    workaround: "Use UDP PR #6+ which makes hive-metastore opt-in via `hms` compose profile"

  - combination: ["CREATE EXTERNAL CATALOG with only aws.s3.* keys (StarRocks 3.3.x + Iceberg REST + MinIO)"]
    reason: |
      StarRocks 3.3 has two S3 client code paths inside the BE:
      (1) the native S3 reader for direct queries reads `aws.s3.*`
          properties (fixed in PR #55416 to propagate from the catalog);
      (2) the Iceberg REST FileIO layer for vended-credentials-style
          and REST-served file reads uses the upstream Iceberg property
          spec — unprefixed `s3.endpoint`, `s3.path-style-access`,
          `s3.access-key-id`, `s3.secret-access-key`.
      Setting only `aws.s3.*` leaves FileIO defaulting to virtual-hosted
      addressing and the `client.region` defaults to AWS's standard
      resolver, which composes `<bucket>.minio:9000` (or worse,
      `<bucket>.s3.us-east-1.amazonaws.com`) at query time → manifests
      as `UnknownHostException` in the FE smoke output.
    discovered: "2026-05-17"
    workaround: "Set BOTH property blocks in CREATE EXTERNAL CATALOG. See constraint `iceberg-rest, starrocks-fe, starrocks-be` above for required_keys list. Pattern landed in commit 8a5914c."
    related_upstream:
      - "apache/iceberg-python#908 (bucket name prepended to MinIO service name)"
      - "apache/iceberg#7709 (REST catalog can't resolve S3 domain name)"
      - "trinodb/trino#25187 (engine ignores s3.path-style-access=true, falls back to virtual-hosted)"
