    timestamp: "2026-05-16T17:50:00+05:30"
    operator: vishnu.wildeagle@gmail.com
    host:
      os: "Windows 11 + Docker Desktop"
      docker: "28.3.0"
      ram_gb: 15.3
      cpu_cores: 16
    via: "Lakehouse Studio v0.3 — UI driven install"
    install_id: inst_0d13069722
    result:
      prepare: passed
      clone: passed
      env: passed
      doctor: passed
      start: passed
      bootstrap: passed
      smoke: failed
      finalize: passed_after_skip
    smoke_failure_root_cause: |
      StarRocks BE → MinIO via AWS SDK on Windows Docker Desktop
      hits UnknownHostException at query time. Catalog properties +
      all 5 prescribed env vars (AWS_REGION, AWS_ACCESS_KEY_ID,
      AWS_SECRET_ACCESS_KEY, AWS_ENDPOINT_URL_S3,
      AWS_S3_US_EAST_1_REGIONAL_ENDPOINT=regional) applied. Codex
      research indicates this is Linux-only-fixable due to SDK
      Docker-network interaction. Lakehouse data IS reachable from
      Spark (proven: `SELECT * FROM udp.curated.demo_customer_summary`
      returned 3 expected rows AMER/APAC/EMEA).
    lakehouse_proof_via_spark:
      - "AMER  1  510.0   2026-05-16 12:37:49"
      - "APAC  2  195.75  2026-05-16 12:37:49"
      - "EMEA  2  480.75  2026-05-16 12:37:49"

# ---------------------------------------------------------------------------
# Known-incompatible — combinations we know DO NOT work. Just as important
# as the positive matrix.
# ---------------------------------------------------------------------------
incompatible:
  - combination: [spark:3.5.1_1.5.2]
    reason: "Tag was removed from Docker Hub after UDP shipped. Any fresh install fails at `docker compose up` with 'not found' error."
    discovered: "2026-05-16"
    workaround: "Bump to 3.5.5_1.8.1 (current certified)"

  - combination: [starrocks-fe:3.3-latest, starrocks-be:3.3-latest]
    reason: "Floating tag has historically resolved to 3.3.10 (pre-3.3.12) which has the Iceberg REST FileIO propagation bug (fixed by PR #55416)."
    discovered: "2026-05-16"
    workaround: "Pin to exact 3.3.12 or newer"

  - combination: [starrocks-fe + spark with hive-metastore]
    reason: |
      UDP's pre-PR-#6 compose had spark → hive-metastore as a hard
      dependency. Without hive-metastore actually starting (which
      required additional env vars not in .env.example), spark
      stayed in Created state forever.
    discovered: "2026-05-16"
    workaround: "Use UDP PR #6+ which makes hive-metastore opt-in via `hms` compose profile"
