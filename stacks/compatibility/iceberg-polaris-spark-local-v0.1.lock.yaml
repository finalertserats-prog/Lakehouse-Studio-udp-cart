evidence: []  # no evidence yet — candidate status

# ---------------------------------------------------------------------------
# Known-incompatible — combinations we know DO NOT work.
# ---------------------------------------------------------------------------
incompatible:
  - combination: ["apache/polaris:latest"]
    reason: "Floating `latest` tag moves with every Polaris release; the OAuth2 token-flow contract has had property-name changes during the incubation period. The lock-file contract requires a stable tag."
    discovered: "2026-05-17"
    workaround: "Pin to `apache/polaris:1.0.1` (the locked tag) or bump explicitly with re-verification against the OAuth2 token flow."

  - combination: ["spark:3.5.1_1.5.2"]
    reason: "Tag was REMOVED from Docker Hub after UDP shipped — carried-over caveat from udp-local-v0.2. Any fresh install fails at `docker compose up` with 'not found' error."
    discovered: "2026-05-16"
    workaround: "Stay on `tabulario/spark-iceberg:3.5.5_1.8.1` (the locked pin)."

  - combination: [starrocks-fe:3.3-latest, starrocks-be:3.3-latest]
    reason: "Floating tag has historically resolved to 3.3.10 (pre-3.3.12) which has the Iceberg REST FileIO propagation bug fixed by PR #55416. Same caveat as udp-local-v0.2."
    discovered: "2026-05-17"
    workaround: "Pin to exact 3.3.12 or newer."

  - combination: ["postgres:latest"]
    reason: "Postgres major-version bumps occasionally change behaviors that Polaris's bootstrap and migration logic expect. The lock-file contract requires a stable tag."
    discovered: "2026-05-17"
    workaround: "Pin to `postgres:15-alpine` (the locked tag) or bump explicitly with re-verification."
