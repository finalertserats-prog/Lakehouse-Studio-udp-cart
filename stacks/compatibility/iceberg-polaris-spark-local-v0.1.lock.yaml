# (also on the JVM) plus Postgres plus StarRocks pushes the floor above
# the iceberg-rest-only candidates.
# ---------------------------------------------------------------------------
host_requirements:
  docker_min: "28.0"
  docker_compose_min: "v2.30"
  bash_min: "5.0"
  os_verified: []  # CANDIDATE: nothing verified yet
  os_unverified_but_likely_works:
    - "Ubuntu 22.04+ (Linux)"
    - "Windows 11 + Docker Desktop"
    - "macOS + Docker Desktop"
  ram_min_gb: 12
  ram_recommended_gb: 18
  disk_min_gb: 50
  ports_required: [9000, 9001, 8181, 5432, 8888, 8030, 9030]

