components:
  - id: minio
    name: MinIO
    role: object_storage
    image: minio/minio
    tag: "RELEASE.2025-04-22T22-12-26Z"
    registry_url: https://hub.docker.com/r/minio/minio/tags
    upstream_url: https://github.com/minio/minio
    notes: |
      Same MinIO release as udp-local-v0.2. Healthcheck uses `mc ready local`
      bundled in the image. Polaris itself does not talk to MinIO directly;
      it hands back FileIO properties to clients (Spark, StarRocks) which
      then read/write through the S3 surface MinIO implements.

  - id: minio-client
    name: MinIO Client (mc)
    role: object_storage_bootstrap
    image: minio/mc
    tag: "RELEASE.2025-04-16T18-13-26Z"
    registry_url: https://hub.docker.com/r/minio/mc/tags
    upstream_url: https://github.com/minio/mc
    notes: One-shot bootstrap — creates the `datalake` bucket on MinIO startup. Same as v0.2.

  - id: postgres
    name: PostgreSQL (Polaris backing DB)
    role: db_backing
    image: postgres
    tag: "15-alpine"
    registry_url: https://hub.docker.com/_/postgres/tags
    upstream_url: https://www.postgresql.org/
    notes: |
      Backing store for Polaris's persistence layer (catalogs, principals,
      grants, table metadata pointers). 15-alpine chosen for small footprint.
      Polaris's bootstrap step initializes the schema on first start; do
      not use the floating `postgres:latest` tag because major-version
      bumps must be re-verified against Polaris's migration logic.

  - id: polaris
    name: Apache Polaris (Iceberg REST catalog)
    role: catalog
    image: apache/polaris
    tag: "1.0.1"
    registry_url: https://hub.docker.com/r/apache/polaris/tags
    upstream_url: https://polaris.apache.org/
    notes: |
      Apache Polaris 1.0.1 — the first stable release post-Apache-donation
      from Snowflake. Exposes the Iceberg REST spec at
      `http://polaris:8181/api/catalog`. All clients (Spark, StarRocks)
      must run the OAuth2 client-credentials flow against
      `http://polaris:8181/api/catalog/v1/oauth/tokens` before any
      Iceberg-REST call will succeed. DO NOT use `apache/polaris:latest`
      — the lock-file contract requires a stable numeric tag.

  - id: spark-iceberg
    name: Apache Spark + Iceberg
    role: processing
    image: tabulario/spark-iceberg
    tag: "3.5.5_1.8.1"
    registry_url: https://hub.docker.com/r/tabulario/spark-iceberg/tags
    upstream_url: https://iceberg.apache.org/spark-quickstart
    notes: |
      Same Spark+Iceberg image as udp-local-v0.2 (`3.5.5_1.8.1`) — Spark
      3.5.5 with bundled Iceberg 1.8.1. The Iceberg 1.8 client implements
      the OAuth2 client-credentials flow Polaris expects via the
      `oauth2-server-uri` + `credential` + `scope` catalog properties.
      DO NOT bump to `3.5.1_1.5.2` — that tag was REMOVED from Docker Hub
      (carried over caveat from udp-local-v0.2).

  - id: starrocks-fe
    name: StarRocks Frontend
    role: serving
    image: starrocks/fe-ubuntu
    tag: "3.3.12"
    registry_url: https://hub.docker.com/r/starrocks/fe-ubuntu/tags
    upstream_url: https://github.com/StarRocks/starrocks
    notes: |
      Same StarRocks release as udp-local-v0.2 — PR #55416 (Iceberg REST
      catalog property propagation to S3 FileIO) is required and shipped
      in 3.3.12. StarRocks 3.3 supports OAuth2-protected Iceberg REST
      catalogs via the external-catalog properties
      `iceberg.rest.security.type=oauth2`,
      `iceberg.rest.oauth2.credential=...`,
      `iceberg.rest.oauth2.server-uri=...`. Do not use `3.3-latest`.

  - id: starrocks-be
    name: StarRocks Backend
    role: serving
    image: starrocks/be-ubuntu
    tag: "3.3.12"
    registry_url: https://hub.docker.com/r/starrocks/be-ubuntu/tags
    upstream_url: https://github.com/StarRocks/starrocks
    notes: Same version requirement as FE.

# ---------------------------------------------------------------------------
# Compatibility constraints — pairs that MUST hold for this stack to work.
# CANDIDATE: rules below are grounded in upstream docs (polaris.apache.org,
# iceberg.apache.org, StarRocks GitHub) but `verified` strings are
# documentation citations, NOT runtime evidence. Bumping any tag in this
# lock requires re-checking every constraint against the new combination.
# ---------------------------------------------------------------------------
constraints:
  - between: [polaris, postgres]
    rule: "Polaris must connect to a running Postgres BEFORE its bootstrap step; the bootstrap initializes the metastore schema and creates the root principal whose client_id/client_secret seed every OAuth2 flow that follows"
    verified: "Per polaris.apache.org/docs/quickstart (fetched 2026-05-17): Polaris's first-run bootstrap requires a reachable JDBC URL and writes the initial schema + root credentials. The compose file (TBD) must encode `depends_on: { postgres: { condition: service_healthy } }`."

  - between: [spark-iceberg, polaris]
    rule: "Spark must complete an OAuth2 client-credentials token flow against `http://polaris:8181/api/catalog/v1/oauth/tokens` BEFORE any Iceberg REST call; the Iceberg 1.8 client implements this when the catalog properties `oauth2-server-uri`, `credential` (in `client_id:client_secret` form), and `scope` are set"
    verified: "Per iceberg.apache.org/docs/latest/configuration/#catalog-properties (fetched 2026-05-17): the REST catalog client documents OAuth2 properties `oauth2-server-uri`, `credential`, `scope`. Polaris's quickstart shows the matching server-side flow."

  - between: [polaris, spark-iceberg]
    rule: "Polaris hands back vended FileIO properties (s3.access-key-id, s3.secret-access-key, s3.endpoint, s3.path-style-access=true) in its REST responses; Spark must NOT override these locally if Polaris is the authority for table-level credentials"
    verified: "Per polaris.apache.org/docs (fetched 2026-05-17): Polaris's storage-credential vending is the recommended path for client S3 auth. Bootstrap (TBD) must register the MinIO endpoint + root credentials at the Polaris storage-config level so vending works for every table."

  - between: [starrocks-fe, polaris]
    rule: "StarRocks 3.3.12's external catalog must be configured with `iceberg.rest.security.type=oauth2`, the same `client_id:client_secret` credential pair Spark uses (or a distinct Polaris principal), the same `oauth2.server-uri`, and the same warehouse name so it sees the same namespace tree Spark wrote to"
    verified: "Per StarRocks 3.3 docs on Iceberg REST catalogs (fetched 2026-05-17): the OAuth2 properties are first-class catalog options. The bootstrap (TBD) must mirror Spark's catalog properties on the StarRocks side."

  - between: [starrocks-fe, polaris]
    rule: "StarRocks 3.3.x still requires PR #55416 for Iceberg REST catalog FileIO propagation to non-AWS S3 endpoints; the rule applies identically whether the REST server is tabulario/iceberg-rest, Nessie's adapter, or Polaris"
    verified: "3.3.12 includes PR #55416 — same constraint as udp-local-v0.2.lock.yaml. The StarRocks side does not distinguish Polaris from any other compliant REST catalog."

  - between: [starrocks-fe, starrocks-be]
    rule: "FE and BE must run the same minor + patch version"
    verified: "both pinned to 3.3.12"

  - between: [minio, starrocks-fe, starrocks-be]
    rule: "StarRocks FE+BE must export AWS_REGION + AWS_ENDPOINT_URL_S3 + AWS_S3_US_EAST_1_REGIONAL_ENDPOINT=regional in startup, beyond catalog props"
    verified: "Same constraint as udp-local-v0.2 — the StarRocks-vs-MinIO contract is independent of which catalog server is in front. The Windows AWS-SDK→MinIO UnknownHostException caveat from v0.2 likely also applies here; not yet observed."

  - between: [spark-iceberg, starrocks-fe, polaris]
    rule: "Both engines must point at the SAME Polaris warehouse name and SAME OAuth2 server URI so that tables Spark writes are visible to StarRocks (and vice-versa) without principal-isolation or warehouse-namespace drift"
    verified: "Both consume POLARIS_BASE_URI=http://polaris:8181, POLARIS_OAUTH_URI=http://polaris:8181/api/catalog/v1/oauth/tokens, and POLARIS_WAREHOUSE=studio_catalog from env_defaults (TBD in the manifest). Runtime verification pending."

  - between: [polaris, spark-iceberg, starrocks-fe]
    rule: "TABLE FORMAT ⇄ CATALOG version range marriage: Polaris 1.0.1 implements Iceberg REST spec v1 + the OAuth2 client-credentials profile. The Iceberg 1.8 client in tabulario/spark-iceberg:3.5.5_1.8.1 and the Iceberg 1.5 client embedded in StarRocks 3.3.12 both speak this spec — so the version floors are: polaris >= 1.0.0 (first stable spec implementation), spark-iceberg client >= 1.6 (for oauth2-server-uri property), starrocks >= 3.3.x (for iceberg.rest.security.type=oauth2 property). Bumping Polaris above 1.0.1 requires re-checking both clients."
    verified: "source review 2026-05-17 — polaris.apache.org/docs/quickstart + iceberg.apache.org/docs/latest/configuration/ + StarRocks 3.3 docs."
    evidence: "TBD — needs install run"

  - between: [polaris, postgres]
    rule: "BACKING DB ⇄ CATALOG schema/driver pin: Polaris 1.0.1 uses the Quarkus-based persistence layer with built-in Postgres support. The Polaris image bundles the postgresql JDBC driver compatible with Postgres 13-16, but schema-migration logic against postgres:15-alpine is the known-good path Polaris itself documents in its quickstart. Polaris 1.0 changed the JDBC store schema vs. 0.x — DO NOT mount a Polaris 0.x Postgres volume into a 1.0 deployment."
    verified: "source review 2026-05-17 — polaris.apache.org/docs/quickstart references postgres:15-alpine in compose examples; Polaris 1.0.0 release notes call out the migration."
    evidence: "TBD — needs install run"
    known_issue: "Same as the HMS-based candidates: postgres:16 is technically supported by the driver but not yet runtime-validated against Polaris 1.0.1's migration scripts. Stay on 15-alpine for the marriage to hold."

  - between: [polaris, spark-iceberg, starrocks-fe]
    rule: "TLS/AUTH boundary: Polaris's OAuth2 token-flow uses the `client_credentials` grant type and returns short-lived bearer tokens (default TTL is 1 hour per Polaris 1.0.1 config). Spark and StarRocks Iceberg clients must REFRESH the token before expiry — the Iceberg 1.8 client implements automatic refresh by re-running the token flow when a 401 comes back. StarRocks 3.3.12's implementation also supports refresh, but the token-cache window is per-FE-session, not per-query. A long-running BE query that outlives the FE's cached token gets a 401 from Polaris mid-scan."
    verified: "source review 2026-05-17 — Polaris config docs for token TTL; Iceberg client REST docs for refresh behavior; StarRocks 3.3 catalog refresh docs."
    evidence: "TBD — needs install run"
    known_issue: "If the BE-side query takes >1h, the cached token expires mid-scan. Workaround for pilot-stable: bump Polaris token TTL to 24h via `polaris.authentication.token-ttl`."

  - between: [polaris, spark-iceberg]
    rule: "CATALOG ⇄ PROCESSING ENGINE OAuth2 wire details: Spark's iceberg REST client requires `oauth2-server-uri=http://polaris:8181/api/catalog/v1/oauth/tokens` (the FULL token endpoint, NOT just the Polaris base URL) AND `credential=<client_id>:<client_secret>` in colon form (NOT separate properties). Spark 3.5.x with Iceberg 1.5+ runtime supports this. Misformatting credential as `client_id;client_secret` or pointing oauth2-server-uri at the base URL silently fails with `400 invalid_request` from Polaris."
    verified: "source review 2026-05-17 — iceberg.apache.org/docs/latest/configuration/#catalog-properties for the `credential` format; polaris.apache.org/docs/oauth for the endpoint shape. Common misconfiguration mode is documented."
    evidence: "TBD — needs install run"
    known_issue: "Bootstrap (TBD) must materialize spark-defaults.conf with `spark.sql.catalog.<name>.rest.auth.type=oauth2` AND the colon-form credential — pre-flight check this format before `docker compose up`."

  - between: [polaris, starrocks-fe]
    rule: "CATALOG ⇄ SERVING ENGINE OAuth2 wire details: StarRocks 3.3.12's external Iceberg catalog needs `iceberg.rest.security.type=oauth2`, `iceberg.rest.oauth2.credential=<client_id>:<client_secret>` (colon form, same as Spark), `iceberg.rest.oauth2.server-uri=http://polaris:8181/api/catalog/v1/oauth/tokens` (full token endpoint), and `iceberg.rest.oauth2.scope=PRINCIPAL_ROLE:ALL` to match what Polaris's principal-role authorization expects. Missing the scope produces 403 on table-list even though the token itself was issued."
    verified: "source review 2026-05-17 — StarRocks 3.3 Iceberg REST catalog OAuth2 properties; Polaris principal-role docs for the default scope shape."
    evidence: "TBD — needs install run"

  - between: [polaris, minio]
    rule: "PROCESSING ⇄ STORAGE credential vending: Polaris's recommended pattern is server-side storage-credential vending — Polaris holds the MinIO credentials (registered via the `/api/management/v1/catalogs/{cat}/storage-configs` endpoint at bootstrap), and Spark/StarRocks receive short-lived S3 credentials back in the table-load response. The clients must NOT hardcode AWS_ACCESS_KEY_ID at the Iceberg-catalog level if vending is in use — that overrides Polaris's vended creds and defeats the security model."
    verified: "source review 2026-05-17 — polaris.apache.org/docs/storage-config + Iceberg client's credential-vending implementation. Bootstrap (TBD) must register MinIO at the storage-config level AND deliberately NOT set s3.access-key-id at the client level."
    evidence: "TBD — needs install run"
    known_issue: "Local-dev sometimes simplifies this by setting credentials at the client level too — that works (client wins) but defeats the OAuth2/vending story. Pick one posture per environment."

  - between: [polaris, postgres, spark-iceberg, starrocks-fe, minio]
    rule: "PORT BINDING uniqueness for the recommended overlay set: minio:9000+9001, polaris:8181, postgres:5432, jupyter:8888, starrocks-fe:8030+9030. Polaris's 8181 COLLIDES with udp-local-v0.2's iceberg-rest:8181 — running both stacks simultaneously requires a port remap on one side, or pick different compose project names AND publish on different host ports. No collision with the Nessie candidate (Nessie uses 19120) or the Trino-bearing candidates (Trino on 8080)."
    verified: "source review 2026-05-17 — ports_required list in this lock + the v0.2 lock + the Nessie candidate's list. Host bootstrap (TBD) must pre-flight."
    evidence: "TBD — needs install run"
    known_issue: "Polaris's default port 8181 is the same port tabulario/iceberg-rest defaults to — historical artifact of the Iceberg REST community converging on 8181. If a host has both udp-local-v0.2 and this stack installed, only one can hold 8181."

  - between: [polaris, postgres]
    rule: "VOLUME MOUNT contract: Postgres MUST mount a named volume for `/var/lib/postgresql/data` (identical to the HMS candidates). Polaris's persistence layer relies on this for catalog durability across container restarts. Without the volume, Polaris re-bootstraps on next start — root principal credentials get regenerated, and every previously-vended catalog client is locked out until creds are re-issued."
    verified: "source review 2026-05-17 — postgres:15-alpine documents `/var/lib/postgresql/data` as PGDATA; Polaris's bootstrap is one-shot per fresh data volume."
    evidence: "TBD — needs install run"
    known_issue: "If the named volume is deleted, the bootstrap-time root client_id/client_secret pair changes — any client config that hardcoded the old pair will get 401s. Pilot-stable docs must document the re-bootstrap path."

  - between: [spark-iceberg, starrocks-fe, polaris]
    rule: "ENGINE ⇄ ENGINE PARITY (warehouse + namespace agreement): both Spark and StarRocks must point at the SAME Polaris warehouse name (e.g. `studio_catalog`) AND traverse the same namespace tree to see each other's tables. Polaris's principal-role model can grant Spark's principal write access to `studio_catalog.db.*` and StarRocks's principal read-only access to the same path — but if the bootstrap accidentally creates two separate catalogs (`studio_catalog_spark` and `studio_catalog_starrocks`), the engines see disjoint trees with no error."
    verified: "source review 2026-05-17 — Polaris's principal-role/grant model. Bootstrap (TBD) must create a single warehouse and grant both principals appropriate access, NOT create separate warehouses per engine."
    evidence: "TBD — needs install run"

