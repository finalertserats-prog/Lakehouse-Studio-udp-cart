status_notes: |
  CANDIDATE — NOT INSTALLABLE END-TO-END YET.

  Evidence classification (honest accounting per the "evidence-backed
  compatibility" principle):

  SOURCE-VERIFIED marriages (read from upstream docs / image manifests
  on 2026-05-17 — no runtime evidence yet):
    - apache/polaris:1.0.1 exists on Docker Hub and is the first stable
      post-Apache-donation tag (polaris.apache.org/docs/releases).
    - tabulario/spark-iceberg:3.5.5_1.8.1 is the same image v0.2 ships
      and is known to include the Iceberg 1.8 REST client with OAuth2
      property support (iceberg.apache.org/docs/latest/configuration/).
    - starrocks-fe:3.3.12 has PR #55416 — same axiom as v0.2 — AND has
      OAuth2 catalog properties documented at the StarRocks 3.3 level
      (StarRocks 3.3 Iceberg REST catalog docs).
    - MinIO path-style + http-endpoint axioms are identical to v0.2.

  AXIOMATICALLY-CLAIMED marriages (need install evidence to prove):
    - That Polaris 1.0.1's OAuth2 client-credentials flow round-trips
      end-to-end with the Iceberg 1.8 client bundled in tabulario/
      spark-iceberg:3.5.5_1.8.1 — never runtime-checked.
    - That Polaris 1.0.1's storage-credential vending hands back FileIO
      properties StarRocks 3.3.12 honors verbatim (in particular that
      StarRocks's external catalog respects vended creds vs. catalog-
      level creds when both are present) — never runtime-checked.
    - That Polaris's Postgres-backed persistence layer schema-init runs
      cleanly on postgres:15-alpine — Polaris 1.0.1 changelog notes
      schema migration changes since 0.x; not yet runtime-validated.
    - Whether the Windows AWS-SDK→MinIO UnknownHostException from v0.2
      reproduces here. Same StarRocks, same MinIO, Polaris in front
      instead of tabulario/iceberg-rest. Different code path on the
      auth side, but identical S3-side surface — likely same caveat.

  Why this stack matters:
    - Apache Polaris 1.0.1 is the first stable release post-Apache-donation
      (the project was contributed by Snowflake and graduated through the
      Apache Incubator). 1.0.1 is the version Polaris itself promotes as
      the recommended starting point for new deployments. This stack
      proves Studio can install a Polaris-based Iceberg lakehouse on the
      same MinIO substrate as every other Studio stack.
    - Polaris's OAuth2 client-credentials flow is the headline contract
      to validate: every Spark and StarRocks session must obtain a token
      from Polaris's `/api/catalog/v1/oauth/tokens` endpoint before any
      Iceberg-REST call succeeds.

  Promotion requirements to pilot-stable:
    1. Append at least one passing evidence[] entry that exercises the
       OAuth2 token flow end-to-end: Spark obtains a token, creates an
       Iceberg table via Polaris, writes data to MinIO; StarRocks
       obtains its own token, reads the same table via its Polaris
       external catalog.
    2. Capture certified_on os/docker/docker_compose from the verified
       host — current `TBD` placeholders block promotion on their own.

  Use udp-local-v0.2 for any real install today.

