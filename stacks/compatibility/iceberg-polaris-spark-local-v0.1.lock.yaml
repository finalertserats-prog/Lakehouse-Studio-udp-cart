# ---------------------------------------------------------------------------
# Known-incompatible — combinations we know DO NOT work.
# ---------------------------------------------------------------------------
incompatible:
  - combination: ["apache/polaris:latest"]
    reason: "Floating `latest` tag moves with every Polaris release; the OAuth2 token-flow contract has had property-name changes during the incubation period. The lock-file contract requires a stable tag."
    discovered: "2026-05-17"
    workaround: "Pin to `apache/polaris:1.0.1` (the locked tag) or bump explicitly with re-verification against the OAuth2 token flow."

  - combination: ["spark:3.5.1_1.5.2"]
    reason: "Tag was REMOVED from Docker Hub after UDP shipped — carried-over caveat from udp-local-v0.2. Any fresh install fails at `docker compose up` with 'not found' error."
    discovered: "2026-05-16"
    workaround: "Stay on `tabulario/spark-iceberg:3.5.5_1.8.1` (the locked pin)."

  - combination: [starrocks-fe:3.3-latest, starrocks-be:3.3-latest]
    reason: "Floating tag has historically resolved to 3.3.10 (pre-3.3.12) which has the Iceberg REST FileIO propagation bug fixed by PR #55416. Same caveat as udp-local-v0.2."
    discovered: "2026-05-17"
    workaround: "Pin to exact 3.3.12 or newer."

  - combination: ["postgres:latest"]
    reason: "Postgres major-version bumps occasionally change behaviors that Polaris's bootstrap and migration logic expect. The lock-file contract requires a stable tag."
    discovered: "2026-05-17"
    workaround: "Pin to `postgres:15-alpine` (the locked tag) or bump explicitly with re-verification."

  - combination: ["apache/polaris:1.0.1", "polaris-0.x Postgres data volume"]
    reason: "Polaris 1.0 changed the JDBC schema vs. the 0.x incubator releases. Mounting a Postgres volume that was previously bootstrapped by Polaris 0.x into a 1.0.1 container produces schema-mismatch errors at first start — Polaris's migration logic does NOT cover the 0.x→1.0 jump cleanly. The volume must be fresh."
    discovered: "2026-05-17"
    workaround: "Start with a fresh Postgres volume for Polaris 1.0.1. If migrating from 0.x, dump and re-bootstrap rather than relying on in-place migration."

  - combination: ["apache/polaris:1.0.1", "iceberg-rest:1.6.0 in the same stack"]
    reason: "Two competing Iceberg REST servers on the same MinIO warehouse leads to two separate catalogs that both claim authority for the same tables. Clients pointed at one cannot see tables created via the other. Polaris and tabulario/iceberg-rest are alternatives, NOT complements."
    discovered: "2026-05-17"
    workaround: "Pick one catalog server per stack. This lock chooses Polaris; udp-local-v0.2 chooses tabulario/iceberg-rest."

  - combination: ["apache/polaris:1.0.1", "spark/starrocks clients without oauth2 properties"]
    reason: "Polaris 1.0.1 has authentication enabled by default — there is no `authentication.enabled=false` shortcut to bypass OAuth2 for local dev (unlike Nessie, where unauthenticated plain-HTTP is the default). Any client missing `rest.auth.type=oauth2` + credential + server-uri gets 401 on every Iceberg-REST call."
    discovered: "2026-05-17"
    workaround: "Bootstrap MUST inject OAuth2 properties into both Spark's spark-defaults.conf and StarRocks's external-catalog config. There is no 'just turn auth off' path for Polaris."

  - combination: ["apache/polaris:1.0.1", "ephemeral postgres volume"]
    reason: "Without a persistent Postgres volume, every Polaris restart re-bootstraps and generates a NEW root client_id/client_secret. Any client config that hardcoded the previous pair gets 401s on next session. This is a durability + identity-binding contract, not a Polaris bug."
    discovered: "2026-05-17"
    workaround: "Always declare a named volume for `/var/lib/postgresql/data` (or a host bind-mount on Linux). Track this as a host-prep requirement in the install docs."

  - combination: ["apache/polaris:1.0.1 with token-ttl=1h", "BE query >1h"]
    reason: "Polaris's default OAuth2 token TTL is 1 hour. StarRocks BE-side scan that outlives the FE's cached token gets 401s mid-scan because the BE re-requests S3 credentials via the expired token. Long-running ETL queries are the typical trigger."
    discovered: "2026-05-17"
    workaround: "Bump `polaris.authentication.token-ttl` to 24h (or longer) in Polaris config for ETL-heavy workloads. Pilot-stable docs must call this out."
