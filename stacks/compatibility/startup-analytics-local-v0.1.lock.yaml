# LAKEHOUSE STUDIO COMPATIBILITY LOCK
# =====================================
# Startup Analytics = the udp-local-v0.2 certified core (MinIO + Iceberg REST
# + Spark + StarRocks) with Apache Superset layered on top for BI. The core
# five components are pinned to the SAME tags as udp-local-v0.2, whose
# pilot-stable certification they inherit. Superset is the only NEW surface in
# this stack and has no end-to-end evidence yet, so the stack as a whole is
# `candidate` until a full bootstrap+smoke run is captured below.

schema_version: "1.0"
stack_id: startup-analytics-local-v0.1
version_id: "0.1.0"
certified_at: "2026-07-08T13:30:00+05:30"
certified_by: gundimedamanaskiran@gmail.com
certified_on:
  os: "Windows 11 + Docker Desktop"
  docker: "29.5.2"
  docker_compose: "v2"
status: "candidate"

status_notes: |
  candidate: the five-component lakehouse core is byte-identical to
  udp-local-v0.2 (same images + tags) and inherits its pilot-stable
  certification and dual-S3-property bootstrap fix. Apache Superset 4.1.1 is
  added via backend/stack_compose_fragments.py (single-container, SQLite
  backend) and initialised by the conditional Superset block in
  _STUDIO_BOOTSTRAP_SH. Superset has NOT yet been captured in an end-to-end
  evidence run on this stack id — flip to pilot-stable only after a fresh
  install reaches READY with the Superset health check green and a dashboard
  built against the StarRocks MySQL endpoint.

components:
  - id: minio
    name: MinIO
    role: object_storage
    image: minio/minio
    tag: "RELEASE.2025-04-22T22-12-26Z"
    registry_url: https://hub.docker.com/r/minio/minio/tags
    upstream_url: https://github.com/minio/minio
    notes: Inherited from udp-local-v0.2 (pilot-stable).

  - id: minio-client
    name: MinIO Client (mc)
    role: object_storage_bootstrap
    image: minio/mc
    tag: "RELEASE.2025-04-16T18-13-26Z"
    registry_url: https://hub.docker.com/r/minio/mc/tags
    upstream_url: https://github.com/minio/mc
    notes: One-shot bucket init. Inherited from udp-local-v0.2.

  - id: iceberg-rest
    name: Iceberg REST Catalog
    role: catalog
    image: tabulario/iceberg-rest
    tag: "1.6.0"
    registry_url: https://hub.docker.com/r/tabulario/iceberg-rest/tags
    upstream_url: https://github.com/apache/iceberg
    notes: Inherited from udp-local-v0.2 (pilot-stable).

  - id: spark
    name: Apache Spark + Iceberg
    role: processing
    image: tabulario/spark-iceberg
    tag: "3.5.5_1.8.1"
    registry_url: https://hub.docker.com/r/tabulario/spark-iceberg/tags
    upstream_url: https://iceberg.apache.org/spark-quickstart
    notes: Inherited from udp-local-v0.2. DO NOT bump to 3.5.1_1.5.2 (removed upstream).

  - id: starrocks-fe
    name: StarRocks Frontend
    role: serving
    image: starrocks/fe-ubuntu
    tag: "3.3.12"
    registry_url: https://hub.docker.com/r/starrocks/fe-ubuntu/tags
    upstream_url: https://github.com/StarRocks/starrocks
    notes: Inherited from udp-local-v0.2. Requires PR #55416 (>= 3.3.12).

  - id: starrocks-be
    name: StarRocks Backend
    role: serving
    image: starrocks/be-ubuntu
    tag: "3.3.12"
    registry_url: https://hub.docker.com/r/starrocks/be-ubuntu/tags
    upstream_url: https://github.com/StarRocks/starrocks
    notes: Same version as FE. Inherited from udp-local-v0.2.

  - id: superset
    name: Apache Superset
    role: bi
    image: apache/superset
    tag: "4.1.1"
    registry_url: https://hub.docker.com/r/apache/superset/tags
    upstream_url: https://github.com/apache/superset
    notes: |
      NEW surface for this stack. Single-container deployment with the default
      SQLite metadata backend (pilot scope — no separate Postgres/Redis).
      Connects to StarRocks over the MySQL protocol on :9030. Initialised by
      the conditional Superset block in _STUDIO_BOOTSTRAP_SH (superset db
      upgrade / fab create-admin / superset init). No end-to-end evidence yet.

constraints:
  # The core five inherit every udp-local-v0.2 constraint (dual S3 property
  # block, StarRocks >= 3.3.12, path-style S3, FE/BE version match). Only the
  # Superset-specific constraints are restated here.
  - between: [superset, starrocks-fe]
    rule: "Superset reads StarRocks via the MySQL dialect on :9030; StarRocks FE must be reachable before superset init runs"
    verified: "bootstrap waits for the FE MySQL port before the conditional superset init block"

  - between: [superset]
    rule: "Superset 4.1.1 requires SUPERSET_SECRET_KEY to be set (non-empty) or the webserver refuses to start"
    verified: "env_defaults sets SUPERSET_SECRET_KEY; fragment passes it through"

host_requirements:
  docker_min: "28.0"
  docker_compose_min: "v2.30"
  bash_min: "5.0"
  os_verified:
    - "Windows 11 + Docker Desktop (core inherited; Superset pending evidence)"
  os_unverified_but_likely_works:
    - "Ubuntu 22.04+"
    - "macOS + Docker Desktop"
  # +2GB over udp-local-v0.2 for the Superset webserver.
  ram_min_gb: 10
  ram_recommended_gb: 16
  disk_min_gb: 55
  ports_required: [9000, 9001, 8181, 8888, 8030, 9030, 8088]

# Append the first end-to-end run here, then flip status to pilot-stable.
evidence: []

incompatible:
  # Inherits every udp-local-v0.2 known-incompatible combination (removed spark
  # tag, floating StarRocks tags, aws.s3.*-only catalog). No Superset-specific
  # incompatibilities recorded yet.
  - combination: [spark:3.5.1_1.5.2]
    reason: "Tag removed from Docker Hub after UDP shipped — fresh install fails at compose up."
    discovered: "2026-05-16"
    workaround: "Use 3.5.5_1.8.1 (current certified)."