# StarRocks FE config — defaults preserved (live cluster's fe.conf only contains comments
# at the top, all runtime config flows from start_fe.sh defaults + entrypoint overrides).
# Live FE: /opt/StarRocks-4.0.0-rc01-ubuntu-amd64/fe/conf/fe.conf

sys_log_level = INFO

# Port allocation matches live (sdpdevstg01:8030/9020/9030/9010)
http_port = 8030
rpc_port = 9020
query_port = 9030
edit_log_port = 9010

# Docker bridge network priority
priority_networks = 172.16.0.0/12

# HMS integration (set by entrypoint overlay in docker-compose command:)
enable_hms_catalog = true
enable_external_catalog = true
enable_hms_events_incremental_sync = true
hive_metastore_timeout_s = 120

default_replication_num = 1
