# Mirrored from live techsophy.com dev cluster (sdpdevstg01, scanned 2026-05-21).
# Source: /opt/spark-3.4.4-bin-hadoop3/conf/spark-defaults.conf
# Templating:
#   - hostnames `sdpdevnn01.techsophy.com` → `namenode` / `resourcemanager`
#   - paths `/etc/hadoop-3.4.1` → `/opt/hadoop-3.4.1` (container install dir)
#   - SSL passwords `TScert#9876` → ${SPARK_SSL_PASSWORD} via .env
# Hudi catalog/extension and extra-jars classpath retained for single-host Hudi work.

spark.master                                yarn
spark.hadoop.hadoop.home                    /opt/hadoop-3.4.1
spark.hadoop.core-site.xml                  /opt/hadoop-3.4.1/etc/hadoop/core-site.xml
spark.hadoop.hdfs-site.xml                  /opt/hadoop-3.4.1/etc/hadoop/hdfs-site.xml
spark.hadoop.yarn-site.xml                  /opt/hadoop-3.4.1/etc/hadoop/yarn-site.xml

spark.hadoop.fs.defaultFS                   hdfs://namenode:9820
spark.hadoop.yarn.resourcemanager.address   resourcemanager:8037
spark.hadoop.hive.metastore.uris            thrift://hive-metastore:9083

# Hudi 1.0.1 extensions (kept from prior stack — production also runs Hudi)
spark.sql.extensions                        org.apache.spark.sql.hudi.HoodieSparkSessionExtension
spark.sql.catalog.spark_catalog             org.apache.spark.sql.hudi.catalog.HoodieCatalog

# Serialization (live uses Kryo)
spark.serializer                            org.apache.spark.serializer.KryoSerializer
spark.kryo.registrator                      org.apache.spark.HoodieSparkKryoRegistrar
spark.kryo.registrationRequired             false

# Extra jars (Hudi bundle staged under /opt/spark/extra-jars)
spark.driver.extraClassPath                 /opt/spark/extra-jars/*
spark.executor.extraClassPath               /opt/spark/extra-jars/*

# GC tuning — matches production
spark.driver.extraJavaOptions               -XX:+UseG1GC -XX:G1HeapRegionSize=32m
spark.executor.extraJavaOptions             -XX:+UseG1GC -XX:G1HeapRegionSize=32m

# Hudi write parallelism (kept small for single-node Docker; tune via .env if needed)
spark.default.parallelism                   4
spark.sql.shuffle.partitions                4

# Fixed RPC / block manager / driver ports (live)
spark.rpc.netty.port                        7078
spark.blockManager.port                     7089
spark.driver.port                           7090
spark.executor.port                         7091

# SSL is OFF in this docker stack (no keystore bundled). Live cluster runs HTTPS_ONLY
# with /etc/hadoop-3.4.1/conf/keystore.jks; layer that in to enable.
