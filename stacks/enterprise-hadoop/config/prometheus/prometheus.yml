# Mirrored from live techsophy.com dev cluster (sdpdevnn01, scanned 2026-05-21).
# Source: /opt/prometheus-3.4.1.linux-amd64/prometheus.yml
# Live config scrapes node_exporter on every box at 9100. Single-host docker replica
# extends that with JMX scrapes for the Hadoop / StarRocks / Trino containers.

global:
  scrape_interval: 15s
  evaluation_interval: 15s

alerting:
  alertmanagers:
    - static_configs:
        - targets:
          # - alertmanager:9093

scrape_configs:
  # ─── Live cluster: node_exporter on every host (preserved as-is) ────────
  - job_name: 'node-exporter'
    static_configs:
      - targets: ['37.27.255.200:9100']
        labels:
          nodename: 'sdpdevnn01.techsophy.com'
      - targets: ['157.180.25.254:9100']
        labels:
          nodename: 'sdpdevdn01.techsophy.com'
      - targets: ['65.21.246.208:9100']
        labels:
          nodename: 'sdpdevstg01.techsophy.com'
      - targets: ['135.181.157.21:9100']
        labels:
          nodename: 'sdpdevafw01.techsophy.com'

  # ─── Docker replica: JMX / metric endpoints from container services ─────
  - job_name: 'namenode'
    static_configs:
      - targets: ['namenode:9871']
    metrics_path: /jmx
    scheme: https
    tls_config:
      insecure_skip_verify: true
    params:
      qry: ['Hadoop:service=NameNode,name=FSNamesystemState']

  - job_name: 'resourcemanager'
    static_configs:
      - targets: ['resourcemanager:8090']
    metrics_path: /jmx
    scheme: https
    tls_config:
      insecure_skip_verify: true

  - job_name: 'starrocks-fe'
    static_configs:
      - targets: ['starrocks-fe:8030']
    metrics_path: /metrics

  - job_name: 'starrocks-be'
    static_configs:
      - targets: ['starrocks-be:8050']
    metrics_path: /metrics

  - job_name: 'trino'
    static_configs:
      - targets: ['trino:8080']
    metrics_path: /v1/status

  - job_name: 'airflow'
    static_configs:
      - targets: ['airflow-webserver:8080']
    metrics_path: /admin/metrics/

  - job_name: 'ranger'
    static_configs:
      - targets: ['ranger-admin:6080']
    metrics_path: /service/metrics/prometheus
