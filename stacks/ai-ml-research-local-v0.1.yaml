id: ai-ml-research-local-v0.1
name: AI / ML Research — Iceberg Feature Store + Spark + Notebooks
version: "0.1"
mode: docker-compose
maturity: candidate
description: >
  Iceberg as a feature-store substrate for ML. MinIO object storage +
  Iceberg REST catalog + Apache Spark for training-set pulls + Trino for
  federated SQL + StarRocks for serving + JupyterLab (PySpark) for
  notebooks. Same certified lakehouse core as udp-trino-local-v0.1 (which
  already runs Spark alongside Trino) with JupyterLab layered on so data
  scientists get a notebook surface out of the box. Bootstraps demo
  raw/curated tables via Trino and verifies cross-engine reads.

repository:
  url: https://github.com/finalertserats-prog/Unified-Data-Plug.git
  ref: claude/review-repo-udp-H7jt4
  # Distinct install_dir so this stack never collides with a Trino or Local
  # Demo install on the same host.
  install_dir: ai-ml-research

components:
  - id: minio
    name: MinIO
    category: object_storage
    version: RELEASE.2025-04-22T22-12-26Z
    image: minio/minio:RELEASE.2025-04-22T22-12-26Z
    service_name: minio
    ports: [9000, 9001]
    resource_profiles:
      minimal:     { cpu: 1, ram_gb: 2, disk_gb: 20 }
      recommended: { cpu: 2, ram_gb: 4, disk_gb: 50 }
      comfortable: { cpu: 4, ram_gb: 8, disk_gb: 200 }
  - id: iceberg-rest
    name: Iceberg REST Catalog
    category: catalog
    version: "1.6.0"
    image: tabulario/iceberg-rest:1.6.0
    service_name: iceberg-rest
    ports: [8181]
    resource_profiles:
      minimal:     { cpu: 1, ram_gb: 1, disk_gb: 2 }
      recommended: { cpu: 1, ram_gb: 2, disk_gb: 5 }
      comfortable: { cpu: 2, ram_gb: 4, disk_gb: 10 }
  - id: spark
    name: Apache Spark + Iceberg
    category: processing
    version: 3.5.5_1.8.1
    image: tabulario/spark-iceberg:3.5.5_1.8.1
    service_name: spark
    ports: [8888, 4040]
    resource_profiles:
      minimal:     { cpu: 2, ram_gb: 4,  disk_gb: 10 }
      recommended: { cpu: 4, ram_gb: 8,  disk_gb: 20 }
      comfortable: { cpu: 8, ram_gb: 16, disk_gb: 40 }
  - id: trino
    name: Trino
    category: processing
    version: "481"
    image: trinodb/trino:481
    service_name: trino
    ports: [8080]
    resource_profiles:
      minimal:     { cpu: 2, ram_gb: 4,  disk_gb: 5 }
      recommended: { cpu: 4, ram_gb: 10, disk_gb: 20 }
      comfortable: { cpu: 8, ram_gb: 24, disk_gb: 50 }
  - id: starrocks-fe
    name: StarRocks Frontend
    category: serving
    version: "3.3.12"
    image: starrocks/fe-ubuntu:3.3.12
    service_name: starrocks-fe
    ports: [8030, 9020, 9030]
    resource_profiles:
      minimal:     { cpu: 1, ram_gb: 2, disk_gb: 5 }
      recommended: { cpu: 2, ram_gb: 4, disk_gb: 10 }
      comfortable: { cpu: 2, ram_gb: 8, disk_gb: 20 }
  - id: starrocks-be
    name: StarRocks Backend
    category: serving
    version: "3.3.12"
    image: starrocks/be-ubuntu:3.3.12
    service_name: starrocks-be
    ports: [8040, 8060, 9050, 9060]
    resource_profiles:
      minimal:     { cpu: 2, ram_gb: 4,  disk_gb: 20 }
      recommended: { cpu: 4, ram_gb: 8,  disk_gb: 50 }
      comfortable: { cpu: 8, ram_gb: 16, disk_gb: 200 }
  # JupyterLab is provided by backend/stack_compose_fragments.py, which writes
  # a docker-compose.fragment.yml keyed on this stack id (Trino + Jupyter) and
  # appends `jupyter` to the `docker compose up` service list. Host port 8889
  # (container 8888) so it never collides with Spark's notebook on 8888.
  - id: jupyter
    name: JupyterLab (PySpark + Iceberg)
    category: ai_ml
    version: spark-3.5.0
    image: jupyter/all-spark-notebook:spark-3.5.0
    service_name: jupyter
    ports: [8889]
    resource_profiles:
      minimal:     { cpu: 1, ram_gb: 2, disk_gb: 5 }
      recommended: { cpu: 2, ram_gb: 4, disk_gb: 10 }
      comfortable: { cpu: 4, ram_gb: 8, disk_gb: 20 }

requirements:
  os: [linux, windows-docker-desktop, darwin]
  docker: required
  docker_compose: required
  bash: required
  # Spark + Trino JVMs + StarRocks + Jupyter together — heaviest local stack.
  minimum_ram_gb: 16
  recommended_ram_gb: 24
  minimum_cpu_cores: 6
  recommended_cpu_cores: 10
  minimum_disk_gb: 60
  recommended_disk_gb: 120

ports:
  required: [9000, 9001, 8181, 8888, 8080, 8030, 9030, 8889]
  optional: [4040, 9020, 8040, 8060, 9050, 9060]

env_defaults:
  UDP_PROJECT_NAME: ai-ml-research
  UDP_ENV: local
  MINIO_ROOT_USER: admin
  MINIO_ROOT_PASSWORD: udp_admin_12345
  MINIO_BUCKET: datalake
  AWS_ACCESS_KEY_ID: admin
  AWS_SECRET_ACCESS_KEY: udp_admin_12345
  AWS_REGION: us-east-1
  S3_ENDPOINT: http://minio:9000
  ICEBERG_WAREHOUSE: s3://datalake/warehouse
  ICEBERG_REST_URI: http://iceberg-rest:8181
  TRINO_CATALOG_ICEBERG_URI: http://iceberg-rest:8181
  TRINO_CATALOG_ICEBERG_WAREHOUSE: s3://datalake/warehouse
  TRINO_CATALOG_ICEBERG_FS_S3_ENABLED: "true"
  TRINO_CATALOG_ICEBERG_FS_S3_PATH_STYLE: "true"
  TRINO_CATALOG_ICEBERG_FS_S3_ENDPOINT: http://minio:9000
  TRINO_HTTP_PORT: "8080"
  TRINO_JAVA_OPTS: "-Xms3G -Xmx3G -XX:+UseG1GC -XX:+ExplicitGCInvokesConcurrent -XX:+ExitOnOutOfMemoryError"
  TRINO_QUERY_MAX_MEMORY_PER_NODE: "1.5GB"
  TRINO_QUERY_MAX_MEMORY: "1.5GB"
  STARROCKS_HOST: 127.0.0.1
  STARROCKS_MYSQL_PORT: "9030"
  STARROCKS_ROOT_PASSWORD: ""
  JUPYTER_TOKEN: lakehouse

commands:
  doctor:    { argv: ["./udp", "doctor"],     timeout: 60 }
  start:
    type: docker_compose_up
    # spark is a declared component (service_name spark) so it comes up from
    # the base compose; trino + jupyter come from the fragment. create-bucket
    # is the one-shot MinIO init.
    extra_services: [create-bucket]
    timeout: 1800
  # Reuse the Trino bootstrap: it wires Trino's Iceberg-REST catalog, seeds
  # demo raw/curated tables via Trino SQL, and wires StarRocks at the same
  # endpoint. Spark and Jupyter read the SAME warehouse via iceberg-rest, so
  # no separate Spark bootstrap is required for the demo.
  bootstrap: { argv: ["bash", "scripts/lhs-trino-bootstrap.sh"], timeout: 900 }
  smoke:     { argv: ["bash", "scripts/lhs-trino-smoke.sh"],     timeout: 600 }
  status:    { argv: ["./udp", "status"],     timeout: 30 }
  stop:      { argv: ["./udp", "stop"],       timeout: 120 }
  clean:     { argv: ["./udp", "clean"],      timeout: 180 }

outputs:
  urls:
    minio_console:  { url: "http://{host}:9001", label: "MinIO Console" }
    iceberg_rest:   { url: "http://{host}:8181/v1/config", label: "Iceberg REST" }
    spark_notebook: { url: "http://{host}:8888", label: "Spark Notebook" }
    trino_ui:       { url: "http://{host}:8080", label: "Trino UI" }
    starrocks_ui:   { url: "http://{host}:8030", label: "StarRocks UI" }
    jupyterlab:     { url: "http://{host}:8889/lab?token=lakehouse", label: "JupyterLab" }
  connections:
    starrocks_mysql: "mysql -h {host} -P 9030 -u root"
    trino_cli:       "trino --server http://{host}:8080 --catalog iceberg"
    jupyter_token:   "http://{host}:8889 (token: lakehouse)"

certification:
  smoke_test_required: true
  demo_bootstrap_required: true
  evidence_dir: evidence/ai-ml-research-local-v0.1/
