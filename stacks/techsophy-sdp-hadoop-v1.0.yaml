id: techsophy-sdp-hadoop-v1.0
name: TechSophy SDP — Hadoop + Hudi + StarRocks + Trino + Ranger
version: "1.0"
mode: remote-cluster
maturity: pilot-stable
description: >
  Production-grade multi-engine datalake running on bare-metal servers.
  HDFS 3.4.1 storage, Apache Hive 4.0.1 + Tez 0.10.4 for batch SQL,
  Spark 3.4.4 + Hudi 1.0.1 for incremental writes, StarRocks 4.0.0
  for sub-second OLAP, Trino 479 for federated SQL, Apache Ranger 3.0.0
  for unified authorization across all engines, Airflow for orchestration,
  and Prometheus + Grafana + Loki for observability.

# Remote cluster — no local Docker install. Studio connects to the
# existing running cluster, runs health checks, and surfaces endpoints.
# Replace the role-based hostnames below with your actual cluster FQDNs
# before running the connectivity check.
cluster:
  nodes:
    - role: namenode
      hostname: namenode.cluster.local
      services: [hdfs-namenode, yarn-resourcemanager, mapreduce-history,
                 ranger-admin, starrocks-be, prometheus, grafana, loki,
                 node-exporter]
    - role: services
      hostname: services.cluster.local
      services: [starrocks-fe, starrocks-be, hiveserver2, hive-metastore,
                 trino, postgresql, pgbouncer, spark-client, tez-client,
                 node-exporter]
    - role: datanode
      hostname: datanode1.cluster.local
      services: [hdfs-datanode, yarn-nodemanager, node-exporter]
    - role: datanode
      hostname: datanode2.cluster.local
      services: [hdfs-datanode, yarn-nodemanager]
    - role: datanode
      hostname: datanode3.cluster.local
      services: [hdfs-datanode, yarn-nodemanager]
    - role: app
      hostname: appnode.cluster.local
      services: [airflow, postgresql-airflow, rabbitmq]

components:
  - id: hdfs
    name: HDFS NameNode
    category: storage
    version: "3.4.1"
    host: namenode.cluster.local
    ports: [9820, 9870]
    resource_profiles:
      minimal:     { cpu: 2, ram_gb: 4,  disk_gb: 100 }
      recommended: { cpu: 4, ram_gb: 8,  disk_gb: 500 }
      comfortable: { cpu: 8, ram_gb: 16, disk_gb: 2000 }

  - id: hdfs-datanode
    name: HDFS DataNode
    category: storage
    version: "3.4.1"
    host: datanode1.cluster.local
    ports: [9866, 9867]
    resource_profiles:
      minimal:     { cpu: 2, ram_gb: 4,  disk_gb: 500 }
      recommended: { cpu: 4, ram_gb: 8,  disk_gb: 2000 }
      comfortable: { cpu: 8, ram_gb: 16, disk_gb: 10000 }

  - id: yarn
    name: YARN ResourceManager
    category: compute
    version: "3.4.1"
    host: namenode.cluster.local
    ports: [8088, 8090, 19890]
    resource_profiles:
      minimal:     { cpu: 2, ram_gb: 4, disk_gb: 20 }
      recommended: { cpu: 4, ram_gb: 8, disk_gb: 50 }
      comfortable: { cpu: 8, ram_gb: 16, disk_gb: 100 }

  - id: hiveserver2
    name: HiveServer2
    category: serving
    version: "4.0.1"
    host: services.cluster.local
    ports: [10000]
    resource_profiles:
      minimal:     { cpu: 2, ram_gb: 4,  disk_gb: 10 }
      recommended: { cpu: 4, ram_gb: 8,  disk_gb: 20 }
      comfortable: { cpu: 8, ram_gb: 16, disk_gb: 50 }

  - id: hive-metastore
    name: Hive Metastore
    category: catalog
    version: "4.0.1"
    host: services.cluster.local
    ports: [9083]
    resource_profiles:
      minimal:     { cpu: 1, ram_gb: 2, disk_gb: 10 }
      recommended: { cpu: 2, ram_gb: 4, disk_gb: 20 }
      comfortable: { cpu: 4, ram_gb: 8, disk_gb: 50 }

  - id: tez
    name: Apache Tez
    category: processing
    version: "0.10.4"
    host: services.cluster.local
    ports: []
    resource_profiles:
      minimal:     { cpu: 2, ram_gb: 4,  disk_gb: 10 }
      recommended: { cpu: 4, ram_gb: 8,  disk_gb: 20 }
      comfortable: { cpu: 8, ram_gb: 16, disk_gb: 40 }

  - id: spark
    name: Apache Spark
    category: processing
    version: "3.4.4"
    host: services.cluster.local
    ports: []
    resource_profiles:
      minimal:     { cpu: 4, ram_gb: 8,  disk_gb: 20 }
      recommended: { cpu: 8, ram_gb: 16, disk_gb: 50 }
      comfortable: { cpu: 16, ram_gb: 32, disk_gb: 100 }

  - id: hudi
    name: Apache Hudi
    category: table_format
    version: "1.0.1"
    host: services.cluster.local
    ports: []
    resource_profiles:
      minimal:     { cpu: 2, ram_gb: 4, disk_gb: 10 }
      recommended: { cpu: 4, ram_gb: 8, disk_gb: 20 }
      comfortable: { cpu: 8, ram_gb: 16, disk_gb: 50 }

  - id: starrocks-fe
    name: StarRocks Frontend
    category: serving
    version: "4.0.0-rc01"
    host: services.cluster.local
    ports: [9030, 8030, 9020]
    resource_profiles:
      minimal:     { cpu: 2, ram_gb: 4,  disk_gb: 10 }
      recommended: { cpu: 4, ram_gb: 8,  disk_gb: 20 }
      comfortable: { cpu: 8, ram_gb: 16, disk_gb: 50 }

  - id: starrocks-be
    name: StarRocks Backend
    category: serving
    version: "4.0.0-rc01"
    host: services.cluster.local
    ports: [9050, 9060, 8050, 8060]
    resource_profiles:
      minimal:     { cpu: 4, ram_gb: 8,  disk_gb: 50 }
      recommended: { cpu: 8, ram_gb: 16, disk_gb: 200 }
      comfortable: { cpu: 16, ram_gb: 32, disk_gb: 500 }

  - id: trino
    name: Trino
    category: processing
    version: "479"
    host: services.cluster.local
    ports: [3000]
    resource_profiles:
      minimal:     { cpu: 4, ram_gb: 8,  disk_gb: 20 }
      recommended: { cpu: 8, ram_gb: 16, disk_gb: 50 }
      comfortable: { cpu: 16, ram_gb: 32, disk_gb: 100 }

  - id: ranger
    name: Apache Ranger Admin
    category: security
    version: "3.0.0-SNAPSHOT"
    host: namenode.cluster.local
    ports: [6080, 6182]
    resource_profiles:
      minimal:     { cpu: 2, ram_gb: 2, disk_gb: 20 }
      recommended: { cpu: 2, ram_gb: 4, disk_gb: 50 }
      comfortable: { cpu: 4, ram_gb: 8, disk_gb: 100 }

  - id: airflow
    name: Apache Airflow
    category: orchestration
    version: "2.x"
    host: appnode.cluster.local
    ports: [8080]
    resource_profiles:
      minimal:     { cpu: 2, ram_gb: 4, disk_gb: 20 }
      recommended: { cpu: 4, ram_gb: 8, disk_gb: 50 }
      comfortable: { cpu: 8, ram_gb: 16, disk_gb: 100 }

  - id: prometheus
    name: Prometheus
    category: observability
    version: "3.4.1"
    host: namenode.cluster.local
    ports: [9090]
    resource_profiles:
      minimal:     { cpu: 1, ram_gb: 2, disk_gb: 20 }
      recommended: { cpu: 2, ram_gb: 4, disk_gb: 50 }
      comfortable: { cpu: 4, ram_gb: 8, disk_gb: 200 }

  - id: grafana
    name: Grafana
    category: observability
    version: "12.0.1"
    host: namenode.cluster.local
    ports: [3000]
    resource_profiles:
      minimal:     { cpu: 1, ram_gb: 1, disk_gb: 5 }
      recommended: { cpu: 2, ram_gb: 2, disk_gb: 10 }
      comfortable: { cpu: 2, ram_gb: 4, disk_gb: 20 }

  - id: postgresql
    name: PostgreSQL (HMS + Ranger DB)
    category: metadata_store
    version: "14"
    host: services.cluster.local
    ports: [5432, 6432]
    resource_profiles:
      minimal:     { cpu: 1, ram_gb: 2, disk_gb: 20 }
      recommended: { cpu: 2, ram_gb: 4, disk_gb: 50 }
      comfortable: { cpu: 4, ram_gb: 8, disk_gb: 200 }

requirements:
  os: [linux]
  docker: not-required
  minimum_ram_gb: 7
  recommended_ram_gb: 32
  minimum_cpu_cores: 4
  recommended_cpu_cores: 8
  minimum_disk_gb: 150
  recommended_disk_gb: 500

ports:
  required: []
  optional: [9820, 9870, 8088, 10000, 9083, 9030, 8030, 3000, 6080, 8080, 9090]

# Remote cluster: no local install commands.
# The runner detects mode=remote-cluster and skips the Docker Compose pipeline.
commands:
  smoke:
    type: remote-verify
    timeout: 120

outputs:
  urls:
    hdfs_namenode_ui:   { url: "http://namenode.cluster.local:9870",   label: "HDFS NameNode UI" }
    yarn_rm_ui:         { url: "http://namenode.cluster.local:8088",   label: "YARN ResourceManager" }
    hiveserver2_jdbc:   { url: "jdbc:hive2://services.cluster.local:10000", label: "HiveServer2 JDBC" }
    starrocks_ui:       { url: "http://services.cluster.local:8030",   label: "StarRocks FE UI" }
    trino_ui:           { url: "https://services.cluster.local:3000",  label: "Trino Coordinator" }
    ranger_admin_ui:    { url: "http://namenode.cluster.local:6080",   label: "Ranger Admin UI" }
    airflow_ui:         { url: "http://appnode.cluster.local:8080",    label: "Airflow UI" }
    grafana_ui:         { url: "http://namenode.cluster.local:3000",   label: "Grafana Dashboards" }
    prometheus_ui:      { url: "http://namenode.cluster.local:9090",   label: "Prometheus" }
    mr_history:         { url: "http://namenode.cluster.local:19890",  label: "MR History Server" }
  connections:
    starrocks_mysql:    "mysql -h services.cluster.local -P 9030 -u root"
    hive_beeline:       "beeline -u 'jdbc:hive2://services.cluster.local:10000'"
    hdfs_shell:         "hdfs dfs -ls hdfs://namenode.cluster.local:9820/"
    trino_cli:          "trino --server https://services.cluster.local:3000 --insecure"

certification:
  smoke_test_required: false
  demo_bootstrap_required: false
  evidence_dir: evidence/techsophy-sdp-hadoop-v1.0/
