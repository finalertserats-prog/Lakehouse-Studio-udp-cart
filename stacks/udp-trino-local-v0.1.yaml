id: udp-trino-local-v0.1
name: Unified Data Plug — Trino Lakehouse
version: "0.1"
mode: docker-compose
maturity: pilot-stable
description: >
  CANDIDATE stack — Trino-based variant of the UDP reference lakehouse.
  MinIO object storage + Iceberg REST catalog + Trino federated SQL +
  StarRocks analytics. The bootstrap and smoke scripts referenced under
  `commands` are now SHIPPED — see backend/runner.py
  `_STUDIO_TRINO_BOOTSTRAP_SH` and `_STUDIO_TRINO_SMOKE_SH`. They wire
  Trino's Iceberg-REST catalog via /etc/trino/catalog/iceberg.properties,
  seed demo raw/curated tables via Trino SQL, and validate cross-engine
  reads against the same warehouse from StarRocks.
  Promotion to `pilot-stable` still requires at least one passing
  end-to-end install with evidence captured in the lock file. Use
  `udp-local-v0.2` for any real install today.

repository:
  url: https://github.com/finalertserats-prog/Unified-Data-Plug.git
  # NOTE: Same UDP repository as v0.2. UDP's compose file already includes
  # a Trino service definition in some branches, but the path is not
  # wired into Studio's installer yet. Promoting this candidate likely
  # needs either (a) a new UDP branch that ships a Trino-native bootstrap
  # in place of Spark's, or (b) a separate `udp-trino` repository fork.
  # Decide before evidence collection begins.
  ref: claude/review-repo-udp-H7jt4
  install_dir: udp-trino

components:
  - id: minio
    name: MinIO
    category: object_storage
    version: RELEASE.2025-04-22T22-12-26Z
    image: minio/minio:RELEASE.2025-04-22T22-12-26Z
    service_name: minio
    ports: [9000, 9001]
    resource_profiles:
      minimal:     { cpu: 1, ram_gb: 2, disk_gb: 20 }
      recommended: { cpu: 2, ram_gb: 4, disk_gb: 50 }
      comfortable: { cpu: 4, ram_gb: 8, disk_gb: 200 }
  - id: iceberg-rest
    name: Iceberg REST Catalog
    category: catalog
    version: "1.6.0"
    image: tabulario/iceberg-rest:1.6.0
    service_name: iceberg-rest
    ports: [8181]
    resource_profiles:
      minimal:     { cpu: 1, ram_gb: 1, disk_gb: 2 }
      recommended: { cpu: 1, ram_gb: 2, disk_gb: 5 }
      comfortable: { cpu: 2, ram_gb: 4, disk_gb: 10 }
  - id: trino
    name: Trino
    category: processing
    # Trino 481 — bumped from 475 on 2026-05-27. 481 is current latest;
    # 475 was held while community Iceberg-REST + MinIO bugs surfaced.
    # No regressions reported in 476-481 range for Iceberg REST path.
    version: "481"
    image: trinodb/trino:481
    service_name: trino
    ports: [8080]
    resource_profiles:
      # Trino is RAM-hungry — its native execution holds working sets
      # in JVM heap. Minimal tier is a hard floor; below this Trino
      # rejects queries during startup with heap-allocation errors.
      minimal:     { cpu: 2, ram_gb: 4,  disk_gb: 5 }
      recommended: { cpu: 4, ram_gb: 10, disk_gb: 20 }
      comfortable: { cpu: 8, ram_gb: 24, disk_gb: 50 }
  - id: starrocks-fe
    name: StarRocks Frontend
    category: serving
    # Same PR #55416 requirement as udp-local-v0.2 — Iceberg REST catalog
    # property propagation to S3 FileIO landed in 3.3.12.
    version: "3.3.12"
    image: starrocks/fe-ubuntu:3.3.12
    service_name: starrocks-fe
    ports: [8030, 9020, 9030]
    resource_profiles:
      minimal:     { cpu: 1, ram_gb: 2, disk_gb: 5 }
      recommended: { cpu: 2, ram_gb: 4, disk_gb: 10 }
      comfortable: { cpu: 2, ram_gb: 8, disk_gb: 20 }
  - id: starrocks-be
    name: StarRocks Backend
    category: serving
    version: "3.3.12"
    image: starrocks/be-ubuntu:3.3.12
    service_name: starrocks-be
    ports: [8040, 8060, 9050, 9060]
    resource_profiles:
      minimal:     { cpu: 2, ram_gb: 4,  disk_gb: 20 }
      recommended: { cpu: 4, ram_gb: 8,  disk_gb: 50 }
      comfortable: { cpu: 8, ram_gb: 16, disk_gb: 200 }

requirements:
  os: [linux, windows-docker-desktop, darwin]
  docker: required
  docker_compose: required
  bash: required
  # Trino's JVM dominates RAM. Bumping the floor over v0.2's 8 GB
  # because Trino on 4 GB will reject Iceberg scans during planning.
  minimum_ram_gb: 12
  recommended_ram_gb: 20
  minimum_cpu_cores: 4
  recommended_cpu_cores: 8
  minimum_disk_gb: 50
  recommended_disk_gb: 100

ports:
  # Trino UI on 8080 replaces Spark's 8888/4040. Same MinIO + Iceberg-REST +
  # StarRocks ports as v0.2.
  required: [9000, 9001, 8181, 8080, 8030, 9030]
  optional: [9020, 8040, 8060, 9050, 9060]

env_defaults:
  UDP_PROJECT_NAME: unified-data-plug-trino
  UDP_ENV: local
  MINIO_ROOT_USER: admin
  MINIO_ROOT_PASSWORD: udp_admin_12345
  MINIO_BUCKET: datalake
  AWS_ACCESS_KEY_ID: admin
  AWS_SECRET_ACCESS_KEY: udp_admin_12345
  AWS_REGION: us-east-1
  S3_ENDPOINT: http://minio:9000
  ICEBERG_WAREHOUSE: s3://datalake/warehouse
  ICEBERG_REST_URI: http://iceberg-rest:8181
  # Trino-specific (consumed by the TBD bootstrap script that will write
  # /etc/trino/catalog/iceberg.properties inside the trino container).
  TRINO_CATALOG_ICEBERG_URI: http://iceberg-rest:8181
  TRINO_CATALOG_ICEBERG_WAREHOUSE: s3://datalake/warehouse
  TRINO_CATALOG_ICEBERG_FS_S3_ENABLED: "true"
  TRINO_CATALOG_ICEBERG_FS_S3_PATH_STYLE: "true"
  TRINO_CATALOG_ICEBERG_FS_S3_ENDPOINT: http://minio:9000
  TRINO_HTTP_PORT: "8080"
  # JVM + memory tuning for the 10 GB-RAM recommended-tier profile. Defaults
  # below were chosen with StarRocks (FE+BE ~4 GB) + MinIO + Iceberg-REST + OS
  # also sharing the box: Trino gets a 4 GB container budget, of which 3 GB is
  # heap (Xms == Xmx to avoid container-OOM during JVM ramp-up) and 1 GB is
  # off-heap headroom (direct buffers, JIT code cache, thread stacks).
  # query.max-memory-per-node + query.max-memory at 1.5 GB (50% of heap)
  # specifically addresses Iceberg planning OOMs on the default ~2 GB heap.
  # Sourced from a Gemini research call against current Trino+StarRocks
  # sizing guidance; revisit if either engine's defaults change materially.
  TRINO_JAVA_OPTS: "-Xms3G -Xmx3G -XX:+UseG1GC -XX:+ExplicitGCInvokesConcurrent -XX:+ExitOnOutOfMemoryError"
  TRINO_QUERY_MAX_MEMORY_PER_NODE: "1.5GB"
  TRINO_QUERY_MAX_MEMORY: "1.5GB"
  STARROCKS_HOST: 127.0.0.1
  STARROCKS_MYSQL_PORT: "9030"
  STARROCKS_ROOT_PASSWORD: ""

# CANDIDATE STATUS NOTE: scripts now ship via backend/runner.py's
# `_STUDIO_SCRIPT_SETS` dispatch — the env step writes them into
# install_dir/scripts/. Promotion to pilot-stable still requires at
# least one passing evidence record captured in the lock file.
commands:
  doctor:    { argv: ["./udp", "doctor"],     timeout: 60 }
  start:
    type: docker_compose_up
    extra_services: [create-bucket, spark]
    # 1800s, not 600s — cold image pulls (Trino + StarRocks + Iceberg REST)
    # routinely exceed 10 minutes on a non-trivial connection.
    timeout: 1800
  # Studio writes this script via runner.py's _STUDIO_TRINO_BOOTSTRAP_SH
  # constant. It writes /etc/trino/catalog/iceberg.properties inside the
  # trino container, restarts trino, seeds raw + curated tables via
  # Trino SQL, then wires StarRocks's REST catalog at the same endpoint.
  bootstrap: { argv: ["bash", "scripts/lhs-trino-bootstrap.sh"], timeout: 900 }
  # Studio writes this script via runner.py's _STUDIO_TRINO_SMOKE_SH
  # constant. Round-trips a SELECT through Trino on the curated table,
  # then queries the SAME table from StarRocks via the shared Iceberg
  # catalog. Shape mirrors v0.2's smoke output for harness parsing.
  smoke:     { argv: ["bash", "scripts/lhs-trino-smoke.sh"],     timeout: 600 }
  status:    { argv: ["./udp", "status"],     timeout: 30 }
  stop:      { argv: ["./udp", "stop"],       timeout: 120 }
  clean:     { argv: ["./udp", "clean"],      timeout: 180 }

outputs:
  urls:
    minio_console:  { url: "http://{host}:9001", label: "MinIO Console" }
    iceberg_rest:   { url: "http://{host}:8181/v1/config", label: "Iceberg REST" }
    trino_ui:       { url: "http://{host}:8080", label: "Trino UI" }
    starrocks_ui:   { url: "http://{host}:8030", label: "StarRocks UI" }
  connections:
    starrocks_mysql: "mysql -h {host} -P 9030 -u root"
    trino_cli:       "trino --server http://{host}:8080 --catalog iceberg"

certification:
  # Both flags true — promotion REQUIRES a passing smoke + a real
  # bootstrap run with evidence. Today neither has happened.
  smoke_test_required: true
  demo_bootstrap_required: true
  evidence_dir: evidence/udp-trino-local-v0.1/
