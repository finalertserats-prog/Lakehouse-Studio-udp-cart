# ============================================================================
# CANDIDATE — KNOWN INSTALL BLOCKER (Codex review 2026-05-17 P0)
# ============================================================================
# UDP's upstream docker-compose.yml does NOT ship Polaris + postgres-polaris
# services. Until Studio's runner appends a Polaris compose overlay
# (planned v0.6.1), the operator must manually drop a docker-compose.polaris.yml
# into install_dir containing the apache/polaris:1.0.1 + postgres pair.
# Also note: Polaris and the standalone iceberg-rest both bind to port 8181
# by default — installing both stacks side-by-side requires port remapping.
# ============================================================================
id: iceberg-polaris-spark-local-v0.1
name: Iceberg + Polaris + Spark + StarRocks (Candidate)
version: "0.1"
mode: docker-compose
maturity: candidate
description: >
  CANDIDATE stack — Iceberg tables governed by Apache Polaris (the
  Snowflake-donated catalog with realm-scoped RBAC and credential
  vending), written by Spark and queried by StarRocks. Postgres
  backs Polaris persistence. MinIO provides S3-compatible object
  storage. Differs from udp-local-v0.2 by swapping the lightweight
  Iceberg REST catalog for Polaris, which adds principals, roles,
  and per-catalog credential vending on top of the same Iceberg
  REST surface.
  Promotion to `pilot-stable` requires at least one passing
  end-to-end install with evidence captured in the matching lock
  file under evidence/iceberg-polaris-spark-local-v0.1/.

repository:
  url: https://github.com/finalertserats-prog/Unified-Data-Plug.git
  # NOTE: Same UDP repository as the other Studio stacks. UDP's
  # compose does NOT ship a Polaris service definition or a Polaris
  # backing-Postgres natively. Studio's runner.py writes those + the
  # bootstrap/smoke scripts into install_dir via the _STUDIO_SCRIPT_SETS
  # dispatch. That wiring is separate work tracked outside this manifest.
  ref: claude/review-repo-udp-H7jt4
  install_dir: iceberg-polaris-spark

components:
  - id: minio
    name: MinIO
    category: object_storage
    # Same MinIO release as the other Studio stacks for S3 parity.
    version: RELEASE.2025-04-22T22-12-26Z
    image: minio/minio:RELEASE.2025-04-22T22-12-26Z
    service_name: minio
    ports: [9000, 9001]
    resource_profiles:
      minimal:     { cpu: 1, ram_gb: 2, disk_gb: 20 }
      recommended: { cpu: 2, ram_gb: 4, disk_gb: 50 }
      comfortable: { cpu: 4, ram_gb: 8, disk_gb: 200 }
  - id: postgres-polaris
    name: Postgres (Polaris backing DB)
    category: catalog_db
    # postgres:15-alpine — Polaris's documented production backing
    # store is Postgres; the JDBC persistence plugin defaults to
    # Postgres dialect. 15 is the minimum tested by the Polaris team.
    version: "15-alpine"
    image: postgres:15-alpine
    service_name: postgres-polaris
    ports: [5432]
    resource_profiles:
      minimal:     { cpu: 1, ram_gb: 1, disk_gb: 5 }
      recommended: { cpu: 1, ram_gb: 2, disk_gb: 10 }
      comfortable: { cpu: 2, ram_gb: 4, disk_gb: 20 }
  - id: polaris
    name: Apache Polaris
    category: catalog
    # Polaris 1.4.1 — bumped from initially-pinned 1.0.1 after probe
    # revealed apache/polaris:1.0.1 was NEVER published on Docker Hub
    # (only 1.4.x tags exist). 1.4.1 is the current stable + includes
    # the CVE-2026-42809 + CVE-2026-42812 security fixes. Ports:
    # 8181 = Iceberg REST + management API, 8182 = management/metrics.
    # Verified 2026-05-17 via `docker manifest inspect`.
    version: "1.4.1"
    image: apache/polaris:1.4.1
    service_name: polaris
    ports: [8181, 8182]
    resource_profiles:
      minimal:     { cpu: 1, ram_gb: 2, disk_gb: 5 }
      recommended: { cpu: 2, ram_gb: 4, disk_gb: 10 }
      comfortable: { cpu: 4, ram_gb: 8, disk_gb: 20 }
  - id: spark
    name: Spark + Iceberg
    category: processing
    # Same tabulario/spark-iceberg image as udp-local-v0.2 — Polaris
    # exposes the same Iceberg REST surface that the bundled Iceberg
    # 1.8.1 runtime targets. No Polaris-specific Spark image needed.
    version: 3.5.5_1.8.1
    image: tabulario/spark-iceberg:3.5.5_1.8.1
    service_name: spark
    ports: [8888, 4040]
    resource_profiles:
      minimal:     { cpu: 2, ram_gb: 4,  disk_gb: 10 }
      recommended: { cpu: 4, ram_gb: 8,  disk_gb: 20 }
      comfortable: { cpu: 8, ram_gb: 16, disk_gb: 40 }
  - id: starrocks-fe
    name: StarRocks Frontend
    category: serving
    # 3.3.12 carries PR #55416 — Iceberg REST property propagation to
    # S3 FileIO. Required for non-AWS S3-compatible backends like MinIO.
    version: "3.3.12"
    image: starrocks/fe-ubuntu:3.3.12
    service_name: starrocks-fe
    ports: [8030, 9020, 9030]
    resource_profiles:
      minimal:     { cpu: 1, ram_gb: 2, disk_gb: 5 }
      recommended: { cpu: 2, ram_gb: 4, disk_gb: 10 }
      comfortable: { cpu: 2, ram_gb: 8, disk_gb: 20 }
  - id: starrocks-be
    name: StarRocks Backend
    category: serving
    version: "3.3.12"
    image: starrocks/be-ubuntu:3.3.12
    service_name: starrocks-be
    ports: [8040, 8060, 9050, 9060]
    resource_profiles:
      minimal:     { cpu: 2, ram_gb: 4,  disk_gb: 20 }
      recommended: { cpu: 4, ram_gb: 8,  disk_gb: 50 }
      comfortable: { cpu: 8, ram_gb: 16, disk_gb: 200 }

requirements:
  os: [linux, windows-docker-desktop, darwin]
  docker: required
  docker_compose: required
  bash: required
  # Floor = Spark 4 GB + Polaris 4 GB + StarRocks FE+BE ~4 GB +
  # Postgres 1 GB + MinIO + OS headroom. No Trino, so the JVM
  # pressure is lower than the Trino-bearing stacks.
  minimum_ram_gb: 12
  recommended_ram_gb: 18
  minimum_cpu_cores: 4
  recommended_cpu_cores: 8
  minimum_disk_gb: 60
  recommended_disk_gb: 120

ports:
  # MinIO console + API, Polaris REST/management, Spark notebook, StarRocks FE.
  required: [9000, 9001, 8181, 8888, 8030, 9030]
  optional: [4040, 8182, 9020, 8040, 8060, 9050, 9060, 5432]

env_defaults:
  UDP_PROJECT_NAME: lakehouse-studio-polaris
  UDP_ENV: local
  MINIO_ROOT_USER: admin
  MINIO_ROOT_PASSWORD: udp_admin_12345
  MINIO_BUCKET: datalake
  AWS_ACCESS_KEY_ID: admin
  AWS_SECRET_ACCESS_KEY: udp_admin_12345
  AWS_REGION: us-east-1
  S3_ENDPOINT: http://minio:9000
  ICEBERG_WAREHOUSE: s3://datalake/warehouse
  # Polaris exposes the Iceberg REST API at /api/catalog/. Engines
  # point their `iceberg.rest-catalog.uri` here. The management API
  # (used by the bootstrap script to create the realm + catalog +
  # principals) is at /api/management/v1/.
  POLARIS_URI: http://polaris:8181/api/catalog
  POLARIS_MANAGEMENT_URI: http://polaris:8181/api/management/v1
  POLARIS_REALM_NAME: default-realm
  POLARIS_CATALOG_NAME: lakehouse
  POLARIS_PRINCIPAL_NAME: studio-root
  # Polaris backing DB (Postgres). Consumed by Polaris's persistence
  # config (JDBC EclipseLink) and by the polaris-admin bootstrap step.
  POLARIS_DB_HOST: postgres-polaris
  POLARIS_DB_PORT: "5432"
  POLARIS_DB_NAME: polaris
  POLARIS_DB_USER: polaris
  POLARIS_DB_PASSWORD: polaris_password_pilot
  # ICEBERG_REST_URI kept as a stable alias so engine configs that
  # were written against a plain REST catalog (e.g. StarRocks's
  # iceberg.catalog.type=rest) still work without rename.
  ICEBERG_REST_URI: http://polaris:8181/api/catalog
  STARROCKS_HOST: 127.0.0.1
  STARROCKS_MYSQL_PORT: "9030"
  STARROCKS_ROOT_PASSWORD: ""

# CANDIDATE STATUS NOTE: bootstrap + smoke scripts ship via
# backend/runner.py's `_STUDIO_SCRIPT_SETS` dispatch — the env step
# writes them into install_dir/scripts/. Promotion to pilot-stable
# requires at least one passing evidence record captured in the
# matching lock file under evidence/iceberg-polaris-spark-local-v0.1/.
commands:
  doctor:    { argv: ["./udp", "doctor"],     timeout: 60 }
  start:
    type: docker_compose_up
    extra_services: [create-bucket]
    timeout: 600
  bootstrap: { argv: ["bash", "scripts/lhs-polaris-bootstrap.sh"], timeout: 900 }
  smoke:     { argv: ["bash", "scripts/lhs-polaris-smoke.sh"],     timeout: 600 }
  status:    { argv: ["./udp", "status"],     timeout: 30 }
  stop:      { argv: ["./udp", "stop"],       timeout: 120 }
  clean:     { argv: ["./udp", "clean"],      timeout: 180 }

outputs:
  urls:
    minio_console:    { url: "http://{host}:9001", label: "MinIO Console" }
    polaris_catalog:  { url: "http://{host}:8181/api/catalog/v1/config", label: "Polaris Iceberg REST" }
    polaris_mgmt:     { url: "http://{host}:8181/api/management/v1/realms", label: "Polaris Management API" }
    spark_notebook:   { url: "http://{host}:8888", label: "Spark Notebook" }
    starrocks_ui:     { url: "http://{host}:8030", label: "StarRocks UI" }
  connections:
    starrocks_mysql:  "mysql -h {host} -P 9030 -u root"
    postgres_polaris: "psql -h {host} -p 5432 -U polaris -d polaris"

certification:
  # Both flags true — promotion REQUIRES a passing smoke + a real
  # bootstrap run with evidence captured in evidence/<stack-id>/.
  smoke_test_required: true
  demo_bootstrap_required: true
  evidence_dir: evidence/iceberg-polaris-spark-local-v0.1/
