id: iceberg-nessie-trino-local-v0.1
name: Iceberg + Nessie + Trino Lakehouse (Candidate)
version: "0.1"
mode: docker-compose
maturity: candidate
description: >
  CANDIDATE stack — Iceberg tables with Project Nessie as the
  git-style versioned catalog (branches, tags, time-travel by ref),
  Trino as the federated SQL engine, and StarRocks for low-latency
  analytics. MinIO provides S3-compatible object storage. Differs
  from udp-trino-local-v0.1 by swapping the Iceberg REST catalog for
  Nessie, which exposes the same Iceberg REST API surface plus
  Nessie's native branch/commit semantics.
  Promotion to `pilot-stable` requires at least one passing
  end-to-end install with evidence captured in the matching lock
  file under evidence/iceberg-nessie-trino-local-v0.1/.

repository:
  url: https://github.com/finalertserats-prog/Unified-Data-Plug.git
  # NOTE: Same UDP repository as the v0.2/Trino stacks. UDP's compose
  # does NOT currently ship a Nessie service definition natively;
  # Studio's runner.py writes the Nessie service + bootstrap/smoke
  # scripts into install_dir via the _STUDIO_SCRIPT_SETS dispatch.
  # That dispatch wiring is separate work tracked outside this manifest.
  ref: claude/review-repo-udp-H7jt4
  install_dir: iceberg-nessie-trino

components:
  - id: minio
    name: MinIO
    category: object_storage
    # Same MinIO release as udp-local-v0.2 — keeps S3 compatibility
    # behavior consistent across all Studio stacks and avoids a
    # second image pull on hosts that already ran v0.2.
    version: RELEASE.2025-04-22T22-12-26Z
    image: minio/minio:RELEASE.2025-04-22T22-12-26Z
    service_name: minio
    ports: [9000, 9001]
    resource_profiles:
      minimal:     { cpu: 1, ram_gb: 2, disk_gb: 20 }
      recommended: { cpu: 2, ram_gb: 4, disk_gb: 50 }
      comfortable: { cpu: 4, ram_gb: 8, disk_gb: 200 }
  - id: nessie
    name: Project Nessie
    category: catalog
    # Nessie 0.99.0 (May 2025) is the first release whose Iceberg
    # REST endpoint reliably propagates S3 sign/endpoint properties
    # through to Trino's Iceberg connector. Earlier 0.9x releases
    # required extra `nessie.catalog.service.s3.*` overrides per
    # warehouse — fixed here. Bump only after re-validating Trino +
    # StarRocks reads against the new release.
    version: "0.99.0"
    image: ghcr.io/projectnessie/nessie:0.99.0
    service_name: nessie
    ports: [19120]
    resource_profiles:
      minimal:     { cpu: 1, ram_gb: 1, disk_gb: 2 }
      recommended: { cpu: 1, ram_gb: 2, disk_gb: 5 }
      comfortable: { cpu: 2, ram_gb: 4, disk_gb: 10 }
  - id: trino
    name: Trino
    category: processing
    # Same Trino 475 pin as udp-trino-local-v0.1 — picked for its
    # in-market maturity around Iceberg-REST + MinIO. Nessie exposes
    # the same Iceberg REST surface, so the same Trino release applies.
    version: "475"
    image: trinodb/trino:475
    service_name: trino
    ports: [8080]
    resource_profiles:
      # Same RAM-hungry JVM profile as the Trino-only candidate;
      # Nessie's extra container does not change Trino's heap floor.
      minimal:     { cpu: 2, ram_gb: 4,  disk_gb: 5 }
      recommended: { cpu: 4, ram_gb: 10, disk_gb: 20 }
      comfortable: { cpu: 8, ram_gb: 24, disk_gb: 50 }
  - id: starrocks-fe
    name: StarRocks Frontend
    category: serving
    # 3.3.12 carries PR #55416 — Iceberg REST property propagation to
    # S3 FileIO. Required for non-AWS S3-compatible backends like MinIO.
    version: "3.3.12"
    image: starrocks/fe-ubuntu:3.3.12
    service_name: starrocks-fe
    ports: [8030, 9020, 9030]
    resource_profiles:
      minimal:     { cpu: 1, ram_gb: 2, disk_gb: 5 }
      recommended: { cpu: 2, ram_gb: 4, disk_gb: 10 }
      comfortable: { cpu: 2, ram_gb: 8, disk_gb: 20 }
  - id: starrocks-be
    name: StarRocks Backend
    category: serving
    version: "3.3.12"
    image: starrocks/be-ubuntu:3.3.12
    service_name: starrocks-be
    ports: [8040, 8060, 9050, 9060]
    resource_profiles:
      minimal:     { cpu: 2, ram_gb: 4,  disk_gb: 20 }
      recommended: { cpu: 4, ram_gb: 8,  disk_gb: 50 }
      comfortable: { cpu: 8, ram_gb: 16, disk_gb: 200 }

requirements:
  os: [linux, windows-docker-desktop, darwin]
  docker: required
  docker_compose: required
  bash: required
  # Honest sizing (Gemini review 2026-05-17): summing recommended profiles
  # is Trino 10 + StarRocks FE 4 + StarRocks BE 8 + Nessie 2 + MinIO 4 =
  # ~28 GB. Summing minimal profiles is ~13 GB but with OS + Docker
  # overhead you need 16 GB floor or Trino planning OOMs on Iceberg scans.
  minimum_ram_gb: 16
  recommended_ram_gb: 28
  minimum_cpu_cores: 4
  recommended_cpu_cores: 8
  minimum_disk_gb: 60
  recommended_disk_gb: 120

ports:
  # MinIO console + API, Nessie REST, Trino UI, StarRocks FE.
  required: [9000, 9001, 19120, 8080, 8030, 9030]
  optional: [9020, 8040, 8060, 9050, 9060]

env_defaults:
  UDP_PROJECT_NAME: lakehouse-studio-nessie
  UDP_ENV: local
  MINIO_ROOT_USER: admin
  MINIO_ROOT_PASSWORD: udp_admin_12345
  MINIO_BUCKET: datalake
  AWS_ACCESS_KEY_ID: admin
  AWS_SECRET_ACCESS_KEY: udp_admin_12345
  AWS_REGION: us-east-1
  S3_ENDPOINT: http://minio:9000
  ICEBERG_WAREHOUSE: s3://datalake/warehouse
  # Nessie endpoints split into TWO distinct surfaces:
  #   /api/v2        — Nessie's NATIVE API (branches, commits, tags)
  #   /iceberg       — Iceberg REST adapter (what Spark / Trino / StarRocks talk to)
  #   /iceberg/<ref> — same Iceberg REST surface scoped to a specific branch
  # Engines configured with `rest.uri` MUST point at /iceberg/<branch>,
  # NOT at /api/v2. The /api/v2 path is for nessie-cli + commit operations.
  NESSIE_URI: http://nessie:19120/api/v2
  NESSIE_DEFAULT_BRANCH: main
  ICEBERG_REST_URI: http://nessie:19120/iceberg/main
  # Trino-specific (consumed by the bootstrap script that writes
  # /etc/trino/catalog/iceberg.properties inside the trino container).
  # Point Trino's iceberg connector at Nessie's Iceberg REST adapter on
  # the default `main` branch.
  TRINO_CATALOG_ICEBERG_URI: http://nessie:19120/iceberg/main
  TRINO_CATALOG_ICEBERG_WAREHOUSE: s3://datalake/warehouse
  TRINO_CATALOG_ICEBERG_FS_S3_ENABLED: "true"
  TRINO_CATALOG_ICEBERG_FS_S3_PATH_STYLE: "true"
  TRINO_CATALOG_ICEBERG_FS_S3_ENDPOINT: http://minio:9000
  TRINO_HTTP_PORT: "8080"
  # JVM + memory tuning identical to udp-trino-local-v0.1 — see that
  # file for the sizing rationale. Nessie does not change Trino's
  # heap profile.
  TRINO_JAVA_OPTS: "-Xms3G -Xmx3G -XX:+UseG1GC -XX:+ExplicitGCInvokesConcurrent -XX:+ExitOnOutOfMemoryError"
  TRINO_QUERY_MAX_MEMORY_PER_NODE: "1.5GB"
  TRINO_QUERY_MAX_MEMORY: "1.5GB"
  STARROCKS_HOST: 127.0.0.1
  STARROCKS_MYSQL_PORT: "9030"
  STARROCKS_ROOT_PASSWORD: ""

# CANDIDATE STATUS NOTE: bootstrap + smoke scripts ship via
# backend/runner.py's `_STUDIO_SCRIPT_SETS` dispatch — the env step
# writes them into install_dir/scripts/. Promotion to pilot-stable
# requires at least one passing evidence record captured in the
# matching lock file under evidence/iceberg-nessie-trino-local-v0.1/.
commands:
  doctor:    { argv: ["./udp", "doctor"],     timeout: 60 }
  start:
    type: docker_compose_up
    extra_services: [create-bucket]
    timeout: 600
  bootstrap: { argv: ["bash", "scripts/lhs-nessie-bootstrap.sh"], timeout: 900 }
  smoke:     { argv: ["bash", "scripts/lhs-nessie-smoke.sh"],     timeout: 600 }
  status:    { argv: ["./udp", "status"],     timeout: 30 }
  stop:      { argv: ["./udp", "stop"],       timeout: 120 }
  clean:     { argv: ["./udp", "clean"],      timeout: 180 }

outputs:
  urls:
    minio_console:  { url: "http://{host}:9001", label: "MinIO Console" }
    nessie_api:     { url: "http://{host}:19120/api/v2/config", label: "Nessie REST" }
    trino_ui:       { url: "http://{host}:8080", label: "Trino UI" }
    starrocks_ui:   { url: "http://{host}:8030", label: "StarRocks UI" }
  connections:
    starrocks_mysql: "mysql -h {host} -P 9030 -u root"
    trino_cli:       "trino --server http://{host}:8080 --catalog iceberg"
    nessie_cli:      "nessie --endpoint http://{host}:19120/api/v2"

certification:
  # Both flags true — promotion REQUIRES a passing smoke + a real
  # bootstrap run with evidence captured in evidence/<stack-id>/.
  smoke_test_required: true
  demo_bootstrap_required: true
  evidence_dir: evidence/iceberg-nessie-trino-local-v0.1/
