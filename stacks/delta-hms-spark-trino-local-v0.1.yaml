id: delta-hms-spark-trino-local-v0.1
name: Delta Lake + Hive Metastore + Spark + Trino (Candidate)
version: "0.1"
mode: docker-compose
maturity: candidate
description: >
  CANDIDATE stack — Delta Lake tables registered in a Postgres-backed
  Hive Metastore, written by Spark, and queried via Trino's
  delta-lake connector. MinIO provides S3-compatible object storage.
  Aimed at teams already invested in the Databricks/Delta ecosystem
  who want a local open-source equivalent of the read+write path.
  Promotion to `pilot-stable` requires at least one passing
  end-to-end install with evidence captured in the matching lock
  file under evidence/delta-hms-spark-trino-local-v0.1/.

repository:
  url: https://github.com/finalertserats-prog/Unified-Data-Plug.git
  # NOTE: Same UDP repository as the other Studio stacks. UDP's
  # compose ships a hive-metastore in some branches but does NOT
  # ship a Delta-tuned Spark image or a Trino delta-lake catalog
  # config. Studio's runner.py writes those + the bootstrap/smoke
  # scripts into install_dir via the _STUDIO_SCRIPT_SETS dispatch.
  # That wiring is separate work tracked outside this manifest.
  ref: claude/review-repo-udp-H7jt4
  install_dir: delta-hms-spark-trino

components:
  - id: minio
    name: MinIO
    category: object_storage
    # Same MinIO release as the other Studio stacks for S3 parity.
    version: RELEASE.2025-04-22T22-12-26Z
    image: minio/minio:RELEASE.2025-04-22T22-12-26Z
    service_name: minio
    ports: [9000, 9001]
    resource_profiles:
      minimal:     { cpu: 1, ram_gb: 2, disk_gb: 20 }
      recommended: { cpu: 2, ram_gb: 4, disk_gb: 50 }
      comfortable: { cpu: 4, ram_gb: 8, disk_gb: 200 }
  - id: postgres-hms
    name: Postgres (Hive Metastore backing DB)
    category: metastore_db
    # postgres:15-alpine — see hudi-hms-spark-local-v0.1 for sizing
    # and version rationale (identical here).
    version: "15-alpine"
    image: postgres:15-alpine
    service_name: postgres-hms
    ports: [5432]
    resource_profiles:
      minimal:     { cpu: 1, ram_gb: 1, disk_gb: 5 }
      recommended: { cpu: 1, ram_gb: 2, disk_gb: 10 }
      comfortable: { cpu: 2, ram_gb: 4, disk_gb: 20 }
  - id: hive-metastore
    name: Hive Metastore (Thrift)
    category: catalog
    # bitsondatadev/hive-metastore:latest — community-standard HMS
    # image. `latest` is pinned by convention since the image owner
    # does not publish stable semver tags; capture digest at evidence
    # collection time.
    version: latest
    image: bitsondatadev/hive-metastore:latest
    service_name: hive-metastore
    ports: [9083]
    resource_profiles:
      minimal:     { cpu: 1, ram_gb: 1, disk_gb: 2 }
      recommended: { cpu: 1, ram_gb: 2, disk_gb: 5 }
      comfortable: { cpu: 2, ram_gb: 4, disk_gb: 10 }
  - id: spark-delta
    name: Spark + Delta Lake
    category: processing
    # Spark 3.5.0 + Delta 3.2.1 — Delta 3.2.x is the line that ships
    # the io.delta:delta-spark_2.12 artifact against Spark 3.5. Newer
    # Delta 3.3+ requires Spark 3.5.3+. lakehousestudio/spark-delta is
    # Studio's own image because no community image bundles this combo
    # with the S3A + Hive bindings pre-wired.
    version: 3.5.0_3.2.1
    image: lakehousestudio/spark-delta:3.5.0_3.2.1
    service_name: spark
    ports: [8888, 4040]
    resource_profiles:
      # Mirrors udp-local-v0.2's Spark sizing — Delta writes have a
      # similar memory profile to Iceberg writes at this scale.
      minimal:     { cpu: 2, ram_gb: 4,  disk_gb: 10 }
      recommended: { cpu: 4, ram_gb: 8,  disk_gb: 20 }
      comfortable: { cpu: 8, ram_gb: 16, disk_gb: 40 }
  - id: trino
    name: Trino
    category: serving
    # Same Trino 475 pin as the other Trino-bearing Studio stacks.
    # Trino's delta-lake connector reads Delta tables registered in
    # Hive Metastore — no separate Delta REST endpoint exists.
    version: "475"
    image: trinodb/trino:475
    service_name: trino
    ports: [8080]
    resource_profiles:
      # Same RAM-hungry JVM floor as the other Trino stacks.
      minimal:     { cpu: 2, ram_gb: 4,  disk_gb: 5 }
      recommended: { cpu: 4, ram_gb: 10, disk_gb: 20 }
      comfortable: { cpu: 8, ram_gb: 24, disk_gb: 50 }

requirements:
  os: [linux, windows-docker-desktop, darwin]
  docker: required
  docker_compose: required
  bash: required
  # Floor = Trino 10 GB (recommended) + Spark 4 GB + HMS 1 GB +
  # Postgres 1 GB + MinIO + OS headroom. Below 14 GB Trino planning
  # OOMs on Delta scans of even small fact tables.
  minimum_ram_gb: 14
  recommended_ram_gb: 22
  minimum_cpu_cores: 4
  recommended_cpu_cores: 8
  minimum_disk_gb: 60
  recommended_disk_gb: 120

ports:
  # MinIO console + API, HMS Thrift, Spark notebook, Trino UI.
  required: [9000, 9001, 9083, 8888, 8080]
  optional: [4040, 5432]

env_defaults:
  UDP_PROJECT_NAME: lakehouse-studio-delta
  UDP_ENV: local
  MINIO_ROOT_USER: admin
  MINIO_ROOT_PASSWORD: udp_admin_12345
  MINIO_BUCKET: datalake
  AWS_ACCESS_KEY_ID: admin
  AWS_SECRET_ACCESS_KEY: udp_admin_12345
  AWS_REGION: us-east-1
  S3_ENDPOINT: http://minio:9000
  # Hive Metastore backing DB (Postgres). Consumed by the HMS image's
  # entrypoint to render metastore-site.xml at boot.
  HMS_DB_HOST: postgres-hms
  HMS_DB_PORT: "5432"
  HMS_DB_NAME: metastore
  HMS_DB_USER: hive
  HMS_DB_PASSWORD: hive_password_pilot
  HMS_URI: thrift://hive-metastore:9083
  # Delta-specific config.
  DELTA_WAREHOUSE: s3://datalake/warehouse
  DELTA_DATABASE: default
  # Trino delta-lake connector (consumed by the bootstrap script that
  # writes /etc/trino/catalog/delta.properties inside the trino
  # container). The delta connector reads tables registered in HMS,
  # so it needs HMS Thrift + S3A creds, not a REST endpoint.
  TRINO_CATALOG_DELTA_METASTORE: thrift
  TRINO_CATALOG_DELTA_METASTORE_URI: thrift://hive-metastore:9083
  TRINO_CATALOG_DELTA_FS_S3_ENABLED: "true"
  TRINO_CATALOG_DELTA_FS_S3_PATH_STYLE: "true"
  TRINO_CATALOG_DELTA_FS_S3_ENDPOINT: http://minio:9000
  TRINO_CATALOG_DELTA_FS_S3_REGION: us-east-1
  TRINO_HTTP_PORT: "8080"
  # JVM + memory tuning identical to udp-trino-local-v0.1 — see that
  # file for the sizing rationale.
  TRINO_JAVA_OPTS: "-Xms3G -Xmx3G -XX:+UseG1GC -XX:+ExplicitGCInvokesConcurrent -XX:+ExitOnOutOfMemoryError"
  TRINO_QUERY_MAX_MEMORY_PER_NODE: "1.5GB"
  TRINO_QUERY_MAX_MEMORY: "1.5GB"

# CANDIDATE STATUS NOTE: bootstrap + smoke scripts ship via
# backend/runner.py's `_STUDIO_SCRIPT_SETS` dispatch — the env step
# writes them into install_dir/scripts/. Promotion to pilot-stable
# requires at least one passing evidence record captured in the
# matching lock file under evidence/delta-hms-spark-trino-local-v0.1/.
commands:
  doctor:    { argv: ["./udp", "doctor"],     timeout: 60 }
  start:
    type: docker_compose_up
    extra_services: [create-bucket]
    timeout: 600
  bootstrap: { argv: ["bash", "scripts/lhs-delta-bootstrap.sh"], timeout: 900 }
  smoke:     { argv: ["bash", "scripts/lhs-delta-smoke.sh"],     timeout: 600 }
  status:    { argv: ["./udp", "status"],     timeout: 30 }
  stop:      { argv: ["./udp", "stop"],       timeout: 120 }
  clean:     { argv: ["./udp", "clean"],      timeout: 180 }

outputs:
  urls:
    minio_console:  { url: "http://{host}:9001", label: "MinIO Console" }
    spark_notebook: { url: "http://{host}:8888", label: "Spark Notebook" }
    spark_ui:       { url: "http://{host}:4040", label: "Spark UI" }
    trino_ui:       { url: "http://{host}:8080", label: "Trino UI" }
  connections:
    hms_thrift:      "thrift://{host}:9083"
    postgres_hms:    "psql -h {host} -p 5432 -U hive -d metastore"
    trino_cli:       "trino --server http://{host}:8080 --catalog delta"

certification:
  # Both flags true — promotion REQUIRES a passing smoke + a real
  # bootstrap run with evidence captured in evidence/<stack-id>/.
  smoke_test_required: true
  demo_bootstrap_required: true
  evidence_dir: evidence/delta-hms-spark-trino-local-v0.1/
