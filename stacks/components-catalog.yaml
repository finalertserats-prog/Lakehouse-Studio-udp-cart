  - id: streaming
    label: Streaming ingest (optional)
    description: Event bus + CDC + streaming compute for low-latency lakehouse ingestion. Per §5.6.3 of the founding architecture doc — future components on the roadmap. Catalog-only in v0.6.2 (no overlay yet).
    order: 9
    optional: true
    components:
      - id: kafka
        name: Apache Kafka
        version: "3.8.1"
        maturity: ga
        recommended: false
        status_badge: "Candidate"
        badges: [Candidate, Optional]
        compatible: true
        license: Apache-2.0
        maintainer: Apache Software Foundation
        url: https://kafka.apache.org
        summary: Distributed event streaming platform. The industry-standard event bus for CDC-into-lakehouse pipelines and real-time analytics. Catalog-only in v0.6.2 — no installable overlay yet, but listed so operators can plan around it.
        compatible_with: [debezium, flink]
        logo: "/assets/logos/kafka.svg"
        tagline: "Distributed event streaming platform — the de-facto event bus for CDC pipelines."
        what_it_is: >
          Kafka is the dominant open-source event streaming platform. It
          stores records in append-only topic partitions, replicates them
          across brokers, and lets producers / consumers read at their own
          pace. The KRaft mode (3.3+) removes the Zookeeper dependency.
          In a lakehouse context Kafka is the source-of-truth event bus
          that Debezium streams CDC into and that Flink consumes from to
          land changes in Iceberg / Hudi / Delta.
        best_for:
          - "CDC pipelines from operational DBs into the lakehouse"
          - "Event sourcing + microservice event buses"
          - "Real-time analytics feeding StarRocks / ClickHouse"
          - "Streaming ETL with Flink reading Kafka, writing Iceberg"
        capabilities:
          - "Append-only topic partitions with replication"
          - "KRaft mode (no Zookeeper) — Kafka 3.3+"
          - "Exactly-once semantics for transactional writes"
          - "Kafka Connect — pluggable source/sink connectors"
          - "Schema Registry integration for Avro/JSON/Protobuf"
          - "Stream processing via Kafka Streams or external engines"
        why_this_version: >
          Pinned to 3.8.1 — current stable 3.x release at write time.
          3.x is the long-term line; the 4.x line is in development but
          not GA yet. Image: `apache/kafka:3.8.1` (official Apache image,
          multi-arch).
        resource_profile_summary: "Recommended tier: 2 CPU, 4 GB RAM, 50 GB disk per broker. Single-broker dev / 3-broker prod minimum for replication."
      - id: debezium
        name: Debezium
        version: "2.7.3"
        maturity: ga
        recommended: false
        status_badge: "Candidate"
        badges: [Candidate, Optional]
        compatible: true
        license: Apache-2.0
        maintainer: Red Hat / Debezium community
        url: https://debezium.io
        summary: Change Data Capture from operational databases (Postgres, MySQL, MongoDB, SQL Server) into Kafka. The standard pre-Flink building block for CDC-into-lakehouse pipelines. Catalog-only in v0.6.2.
        compatible_with: [kafka]
        logo: "/assets/logos/debezium.svg"
        tagline: "Change Data Capture from operational DBs into Kafka — the CDC-into-lakehouse standard."
        what_it_is: >
          Debezium is a set of Kafka Connect source connectors that tail
          the transaction log of an operational database (Postgres WAL,
          MySQL binlog, MongoDB oplog, SQL Server CDC) and emit each
          row-level change as a Kafka record. The output topic carries
          before/after row state, the operation type (c/u/d), and the
          source's transaction metadata. Downstream consumers (Flink,
          Spark Structured Streaming, Hudi DeltaStreamer) land the
          changes into Iceberg / Hudi / Delta as MERGE INTO updates.
        best_for:
          - "Pulling Postgres / MySQL changes into the lakehouse in near real-time"
          - "Outbox pattern — service emits domain events via DB writes"
          - "Audit-trail capture (every row change becomes a Kafka record)"
          - "Zero-downtime database migrations via dual-write + verify"
        capabilities:
          - "Source connectors for Postgres / MySQL / MongoDB / SQL Server / Oracle / Db2 / Cassandra"
          - "Schema evolution detection + Avro schema emission"
          - "Snapshot mode for initial bulk load + log tail for ongoing changes"
          - "Single-message transforms (SMT) for field redaction / routing"
          - "Heartbeat events to keep low-traffic topics fresh"
          - "Embedded Debezium engine for non-Kafka deployments"
        why_this_version: >
          Pinned to 2.7.3 — current stable 2.x release. 3.x is in early
          access but the connector matrix is still maturing. Image:
          `debezium/connect:2.7.3.Final` (Kafka Connect base + Debezium
          connectors bundled).
        resource_profile_summary: "Recommended tier: 1 CPU, 2 GB RAM per Connect worker. Disk usage minimal — state lives in Kafka."
      - id: flink
        name: Apache Flink
        version: "1.20.0"
        maturity: ga
        recommended: false
        status_badge: "Candidate"
        badges: [Candidate, Optional]
        compatible: true
        license: Apache-2.0
        maintainer: Apache Software Foundation
        url: https://flink.apache.org
        summary: Stateful stream processing engine with low-latency event-time semantics and a first-class Iceberg sink. The streaming-compute peer of Spark for lakehouse ingestion. Catalog-only in v0.6.2.
        compatible_with: [kafka, iceberg, hudi]
        logo: "/assets/logos/flink.svg"
        tagline: "Stateful stream processing with low-latency event-time semantics and a first-class Iceberg sink."
        what_it_is: >
          Flink is a distributed stream processing engine optimized for
          stateful, low-latency, event-time computation. It pairs
          naturally with Kafka as a source and Iceberg / Hudi as a sink:
          a Flink job consumes a Kafka topic of CDC events from Debezium,
          applies windowed aggregations or joins, and writes the result
          to an Iceberg table on object storage. Same API for batch +
          stream, which makes backfill + live-update unified.
        best_for:
          - "CDC pipelines: Kafka → Flink → Iceberg / Hudi sink"
          - "Real-time aggregations with event-time + watermarks"
          - "Stateful joins across multiple streams"
          - "Backfill + live computation on the same job"
        capabilities:
          - "Exactly-once state semantics with checkpointing"
          - "Native Iceberg sink with auto-compaction"
          - "Native Kafka source / sink with offset checkpointing"
          - "Event-time processing with configurable watermarks"
          - "SQL + DataStream + Table API"
          - "Kubernetes-native operator for production deployments"
        why_this_version: >
          Pinned to 1.20.0 — current stable 1.x release at write time.
          1.20 is an LTS line with the new Disaggregated State Storage
          (FLIP-423) and the Catalog Modification API. Image:
          `apache/flink:1.20.0-scala_2.12-java17`, multi-arch.
        resource_profile_summary: "Recommended tier: 2 CPU, 4 GB RAM per TaskManager. Job count + state size drive total sizing."
    coming_soon:
      - { name: "Apache Pulsar",       id: "pulsar",          logo: "/assets/logos/pulsar.svg",          summary: "Multi-tenant event streaming alternative to Kafka with tiered storage.", reason: "Alternative event bus; v0.7" }
      - { name: "Redpanda",            id: "redpanda",        logo: "/assets/logos/redpanda.svg",        summary: "Kafka-API-compatible streaming platform written in C++ — no Zookeeper / no JVM.", reason: "Kafka alternative; v0.7" }
      - { name: "Schema Registry",     id: "schema-registry", logo: "/assets/logos/schema-registry.svg", summary: "Centralized Avro / JSON / Protobuf schema enforcement for Kafka topics.", reason: "Streaming contract layer; v0.7" }

