        compatible_with: [trino, spark-iceberg, starrocks]
        logo: "/assets/logos/dbt.svg"
        tagline: "SQL transformation framework — the T in ELT. Compiles Jinja+SQL into a dependency DAG."
        what_it_is: >
          dbt Core is the open-source CLI that compiles SQL files
          (with Jinja templating) into a DAG of table / view / incremental
          model materializations. The `ref()` macro links models — dbt
          builds the dependency graph automatically and runs models in
          topological order. Built-in tests (unique, not_null, accepted_values,
          relationships) + custom data tests catch regressions before
          they hit the warehouse. Adapters exist for Trino, Spark, Postgres,
          Snowflake, BigQuery, Redshift, Databricks, and dozens more.
        best_for:
          - "Modeling raw → staging → marts transformations in SQL"
          - "Lineage-aware refactors (rename a column, dbt knows what breaks)"
          - "Data quality checks at the warehouse layer"
          - "Version-controlled, reviewable transformations (it's just SQL files in git)"
        capabilities:
          - "Jinja-templated SQL with ref() / source() / config() macros"
          - "Materializations: view, table, incremental, ephemeral, snapshot"
          - "Built-in tests + custom data tests"
          - "Auto-generated documentation with lineage graph"
          - "Adapters for every major warehouse engine"
          - "dbt Cloud is the SaaS layer; dbt Core is the open-source CLI"
        why_this_version: >
          Pinned to 1.9.0 — current stable 1.x release at write time.
          dbt's 1.x line follows semver tightly; 1.9 is the line that
          gets new features in 2026. Install: `pip install dbt-core==1.9.0`
          plus the adapter for your engine (`dbt-trino`, `dbt-spark`, etc.).
        resource_profile_summary: "Client-side only — runs on the operator's laptop or CI runner. No persistent server. Memory dominated by the compiled manifest.json (typically <100MB for small projects)."
    coming_soon:
      - { name: "SQLMesh", id: "sqlmesh", logo: "/assets/logos/sqlmesh.svg", summary: "Modern dbt alternative with native time-travel + virtual data environments.", reason: "Newer transformation framework; v0.7" }

  - id: lineage
    label: Data lineage (optional)
    description: Track which tables flow into which dashboards / models / queries. Per §5.6.3 of the founding architecture doc — future components on the roadmap. Catalog-only in v0.6.2.
    order: 11
    optional: true
    components:
      - id: openlineage
        name: OpenLineage
        version: "1.24.2"
        maturity: ga
        recommended: false
        status_badge: "Candidate"
        badges: [Candidate, Optional]
        compatible: true
        license: Apache-2.0
        maintainer: LF AI & Data Foundation
        url: https://openlineage.io
        summary: Open standard for collecting data lineage from pipelines. Integrations for Airflow, Dagster, dbt, Spark, Flink — every event carries inputs, outputs, schema, run metadata. Pairs with Marquez as the reference backend. Catalog-only in v0.6.2.
        compatible_with: [airflow, dagster, dbt-core, spark-iceberg, flink]
        logo: "/assets/logos/openlineage.svg"
        tagline: "Open standard for data lineage events — works across Airflow, Dagster, dbt, Spark, Flink."
        what_it_is: >
          OpenLineage is a CNCF-incubating open standard for the wire
          format of data-lineage events. A producer (Airflow operator,
          Spark listener, dbt run hook) emits a structured event for
          each job run with inputs / outputs / schema / run metadata.
          A consumer (Marquez, Datakin, Atlan, custom backend) ingests
          those events and reconstructs the cross-tool lineage graph.
          The Studio overlay wires nothing yet — operators add the
          OpenLineage listener to their Airflow / Spark / Dagster
          deployment and point it at Marquez or their preferred backend.
        best_for:
          - "Cross-tool lineage (Airflow DAG → Spark job → dbt model → BI dashboard)"
          - "Compliance: showing which raw source flows into a regulated report"
          - "Impact analysis: 'if we drop column X, what dashboards break?'"
          - "Audit trails for data-derivation in BFSI / healthcare"
        capabilities:
          - "Standardized event format (JSON + Avro schemas)"
          - "Native integrations: Airflow, Dagster, dbt, Spark, Flink"
          - "Pluggable backends: Marquez, Datakin, Atlan, custom HTTP endpoint"
          - "Column-level lineage (Spark + dbt facets)"
          - "Schema + statistics + custom facets per event"
          - "OpenLineage client libraries for Python / Java / Scala / JavaScript"
        why_this_version: >
          Pinned to 1.24.2 — current stable release at write time.
          OpenLineage's spec + client libraries version together;
          1.24 is the line that ships the new dataset versioning facet.
        resource_profile_summary: "Library-only — no runtime. Backend (Marquez / similar) is sized separately. Per-event overhead is minimal (single HTTP POST per job run)."
    coming_soon:
      - { name: "Marquez", id: "marquez", logo: "/assets/logos/marquez.svg", summary: "Reference OpenLineage backend with a web UI for lineage exploration.", reason: "Reference backend; v0.7" }
      - { name: "DataHub", id: "datahub", logo: "/assets/logos/datahub.svg", summary: "Full data catalog + lineage + governance platform from LinkedIn.",        reason: "Catalog + lineage; v0.8" }

  - id: ai_ml
    label: AI / ML notebooks (optional)
    description: Interactive notebooks for feature engineering, training-data pulls, and ad-hoc analysis against lakehouse tables.
    order: 12
    optional: true
    components:
      - id: jupyter
        name: JupyterLab (PySpark + Iceberg)
        version: "spark-3.5.0"
        maturity: ga
        recommended: false
        status_badge: "Candidate"
        badges: [Candidate, Optional]
        compatible: true
        license: BSD-3-Clause
        maintainer: Project Jupyter
        url: https://jupyter.org
        summary: JupyterLab with PySpark, the Iceberg Spark runtime, and MinIO S3 credentials pre-wired. Read and write lakehouse tables from notebooks.
        compatible_with: [spark-iceberg, iceberg-rest, minio, trino]
        logo: "/assets/logos/jupyter.svg"
        tagline: "PySpark + Iceberg notebooks with MinIO S3 access out of the box."
        why_this_version: "jupyter/all-spark-notebook pinned to spark-3.5.0 to match the spark-iceberg 3.5.x runtime in the certified stacks."
        resource_profile_summary: "Single notebook server. ~1-2 GB idle; scales with notebook workloads (Spark runs in local mode inside the container)."

# ============================================================
# Enterprise On-Prem Datalake components (remote-cluster mode)
# These components represent services already running on bare-metal.
# They are display-only in the cart — the install pipeline is a
# connectivity verification, not a Docker install.
# ============================================================

  - id: compute_hadoop
    label: Hadoop compute (YARN)
    description: YARN ResourceManager schedules all Spark, Tez, and MapReduce jobs across the cluster.
    order: 21
    optional: true
    components:
      - id: hadoop-yarn
        name: Apache YARN
        version: "3.4.1"
        maturity: ga
        recommended: true
        badges: [Recommended, Enterprise]
        compatible: true
        license: Apache-2.0
        maintainer: Apache Software Foundation
        url: https://hadoop.apache.org/docs/stable/hadoop-yarn/hadoop-yarn-site/YARN.html
        summary: Yet Another Resource Negotiator — the cluster resource manager for Hadoop. Schedules Spark, Tez, and MapReduce jobs across the cluster, enforcing CPU/memory quotas per queue.
        compatible_with: [hdfs, spark-hadoop, tez, ranger-admin]
        logo: "/assets/logos/yarn.svg"
        tagline: "Cluster resource manager for Hadoop — schedules Spark, Tez, MR jobs."
        what_it_is: >
          YARN decouples resource management from programming model.
          The ResourceManager tracks cluster resources and schedules
          containers; NodeManagers on each worker node launch and monitor
          containers. Every Hadoop compute framework (Spark, Tez, MR)
          runs on YARN — it's the central scheduler that prevents one
          job from starving others.
        best_for:
          - "Clusters running mixed Spark + Tez + MapReduce workloads"
          - "Teams needing queue-based capacity scheduling (DRF)"
          - "On-prem infrastructure without a dedicated Kubernetes cluster"
        capabilities:
          - "Capacity Scheduler: per-queue resource guarantees + limits"
          - "Fair Scheduler: weighted sharing across queues"
          - "ResourceManager HA for fault-tolerant scheduling"
          - "NodeManager container lifecycle management"
          - "Timeline Server for job history"
        resource_profile_summary: "ResourceManager: 4 CPU, 8 GB RAM. Each NodeManager: 4+ CPU, 8+ GB RAM (passes most resources through to containers)."

  - id: tez_engine
    label: Tez execution engine
    description: Apache Tez runs Hive batch SQL as DAGs on YARN, 5-10× faster than MapReduce.
    order: 21.5
    optional: true
    components:
      - id: tez
        name: Apache Tez
        version: "0.10.4"
        maturity: ga
        recommended: true
        badges: [Recommended, Enterprise]
        compatible: true
        license: Apache-2.0
        maintainer: Apache Software Foundation
        url: https://tez.apache.org
        summary: DAG execution framework on YARN — powers HiveServer2 batch SQL. Tez containers are pre-warmed per session, cutting per-query startup overhead vs. MapReduce by 5-10×.
        compatible_with: [hadoop-yarn, hive-metastore-hadoop, hdfs]
        logo: "/assets/logos/tez.svg"
        tagline: "DAG execution engine on YARN — fast Hive batch SQL without MapReduce overhead."
        what_it_is: >
          Tez compiles a SQL query from HiveServer2 into a DAG of tasks
          and submits it to YARN. Unlike MapReduce, Tez avoids writing
          intermediate shuffle data to HDFS — it pipelines data between
          stages in memory or local disk, achieving 5-10× lower latency
          on typical Hive queries. Pre-warmed Tez sessions avoid cold
          JVM startup on every query.
        best_for:
          - "Hive batch SQL where MapReduce latency is unacceptable"
          - "Long-running ETL pipelines that benefit from pipelined stages"
          - "Clusters already invested in HiveServer2 as the SQL gateway"
        capabilities:
          - "DAG-based execution (vs. sequential MR stages)"
          - "In-memory pipelining between stages"
          - "Tez UI for DAG visualization and debugging"
          - "Pre-warmed AM (Application Master) sessions"
          - "Native Hive integration: hive.execution.engine=tez"
        resource_profile_summary: "No dedicated process — runs as YARN containers. Each Tez AM: ~1 GB RAM. Task containers: sized by hive.tez.container.size (default 512 MB – 4 GB)."
        version_options:
          - version: "0.10.4"
            label: "Tez 0.10.4 (Recommended)"
            default: true
          - version: "0.10.3"
            label: "Tez 0.10.3 (Previous)"

  - id: security_hadoop
    label: Hadoop security
    description: Apache Ranger provides unified authorization and audit across all Hadoop ecosystem services.
    order: 23
    optional: true
    components:
      - id: ranger-admin
        name: Apache Ranger Admin
        version: "3.0.0"
        maturity: ga
        recommended: true
        badges: [Recommended, Enterprise]
        compatible: true
        license: Apache-2.0
        maintainer: Apache Software Foundation
        url: https://ranger.apache.org
        summary: Centralized policy engine for the entire Hadoop ecosystem — one place to write HDFS, Hive, YARN, and Trino access policies. Row filters, column masks, and audit logs included.
        compatible_with: [hdfs, hive-metastore-hadoop, hadoop-yarn, trino]
        logo: "/assets/logos/ranger.svg"
        tagline: "Centralized authorization for HDFS, Hive, YARN, and Trino."
        what_it_is: >
          Apache Ranger is the security plane for the Hadoop ecosystem.
          The Admin UI lets security teams write allow/deny policies for
          individual users and groups against HDFS paths, Hive databases
          and tables (including row-level filters and column masks), YARN
          queues, and Trino queries — without touching each service's
          native config. Plugins installed on each service intercept
          every access request and evaluate it against the policy store
          in real time. Full audit logs are written to Solr or Elasticsearch.
        best_for:
          - "Enterprises requiring centralized, auditable data access control"
          - "Multi-tenant clusters where different teams need data isolation"
          - "Regulated industries needing column-level masking and audit"
        capabilities:
          - "Policy-based allow/deny for HDFS, Hive, YARN, Trino"
          - "Row-level filtering and column masking per policy"
          - "User/group sync from LDAP/AD"
          - "Tag-based policies (Atlas integration)"
          - "Full audit trail — every access logged"
          - "REST API + web UI for policy management"
        resource_profile_summary: "2 CPU, 4 GB RAM, 50 GB disk. PostgreSQL backend for policy store (sized separately)."

  - id: federated_sql
    label: Federated SQL engine
    description: Distributed SQL engine for federated queries across HDFS, Hive, StarRocks, and relational databases.
    order: 24
    optional: true
    components:
      - id: trino-enterprise
        name: Trino (Enterprise)
        version: "480"
        maturity: ga
        recommended: true
        badges: [Recommended, Enterprise]
        compatible: true
        license: Apache-2.0
        maintainer: Trino Software Foundation
        url: https://trino.io
        summary: Distributed federated SQL engine for the enterprise Hadoop stack — connects to Hive Metastore, StarRocks, HDFS, and MySQL in a single query. Ranger plugin provides unified access control.
        compatible_with: [hive-metastore-hadoop, hdfs, starrocks, ranger-admin]
        logo: "/assets/logos/trino.svg"
        tagline: "Federated SQL across Hive, StarRocks, HDFS, and relational sources."
        what_it_is: >
          Trino 480 on the enterprise Hadoop stack federates queries across
          the Hive catalog (HDFS-backed tables), StarRocks (MySQL protocol
          connector), and other JDBC sources in a single SQL statement.
          The Apache Ranger plugin enforces the same row/column-level
          access policies applied to Hive and HDFS — one policy store
          for all engines.
        best_for:
          - "Ad-hoc federated queries joining Hive tables with StarRocks OLAP results"
          - "Teams needing ANSI SQL across multiple engines without ETL"
          - "Environments already running Ranger for centralized access control"
        capabilities:
          - "Native Hive connector with Hive Metastore integration"
          - "StarRocks connector (MySQL protocol) for federated OLAP queries"
          - "Ranger 3.0 plugin for unified row/column-level access control"
          - "HTTPS-only endpoint (port 3000) with certificate auth"
          - "Cost-based optimizer with dynamic filtering"
        resource_profile_summary: "Coordinator: 8 CPU, 16 GB RAM, 50 GB disk. Workers sized by query concurrency (same specs as coordinator per worker node)."
        version_options:
          - version: "480"
            label: "Trino 480 (Recommended)"
            default: true
          - version: "460"
            label: "Trino 460 (Stable)"

  - id: connection_pooling
    label: Connection pooling
    description: Connection pooler that sits between Hive Metastore and PostgreSQL, enabling high-concurrency HMS without exhausting Postgres connections.
    order: 25
    optional: true
    components:
      - id: pgbouncer
        name: PgBouncer
        version: "v1.23.1-p3"
        maturity: ga
        recommended: true
        badges: [Recommended, Enterprise]
        compatible: true
        license: ISC
        maintainer: PgBouncer project
        url: https://www.pgbouncer.org
        summary: Lightweight PostgreSQL connection pooler — sits between Hive Metastore and Postgres, multiplexing hundreds of HMS threads onto a small pool. Transaction-mode pooling eliminates connection storms on startup.
        compatible_with: [hive-metastore-hadoop, hdfs]
        logo: "/assets/logos/postgres.svg"
        tagline: "PgBouncer transaction-mode pool — keeps HMS → Postgres connections under control."
        what_it_is: >
          PgBouncer is a lightweight connection pooler for PostgreSQL.
          In the enterprise Hadoop stack it sits on port 6432 between
          Hive Metastore (and HiveServer2) and the PostgreSQL metastore
          database. Transaction-mode pooling means each HMS thread
          borrows a real Postgres connection only for the duration of
          one transaction, then returns it to the pool. This keeps the
          Postgres connection count bounded even when dozens of Hive
          sessions are open simultaneously.
        best_for:
          - "Hive Metastore installations with many concurrent Hive/Spark sessions"
          - "Production deployments where Postgres max_connections is a constraint"
          - "Any setup matching the techsophy.com on-prem Hadoop architecture"
        capabilities:
          - "Transaction-mode connection pooling (default pool size 20)"
          - "Auth via plain-text or MD5 userlist"
          - "Max 100 client connections → 20 server connections"
          - "Zero-downtime config reload"
          - "Exposes pg_isready-compatible health check on port 6432"
        resource_profile_summary: "Negligible — single process, ~50 MB RAM, no disk."

