categories:
  - id: table_format
    label: Table format
    description: How table data is laid out on object storage. Sets the foundation for everything else.
    order: 1
    components:
      - id: iceberg
        name: Apache Iceberg
        version: "1.6.0"
        maturity: ga
        recommended: true
        badges: [Recommended, Stable]
        compatible: true
        license: Apache-2.0
        maintainer: Apache Software Foundation
        url: https://iceberg.apache.org
        summary: Open table format with schema evolution, time travel, and hidden partitioning. The de-facto choice for Spark + Trino + StarRocks workflows.
        compatible_with: [iceberg-rest, spark-iceberg, starrocks]
        logo: "/assets/logos/iceberg.svg"
        tagline: "Open table format for huge analytic datasets on object storage."
        what_it_is: >
          Iceberg is a table format that lives on top of Parquet/ORC/Avro files in
          object storage. It tracks every change as a snapshot, so the same table
          can be queried by Spark, Trino, StarRocks, and Flink at the same time
          without copying data or fighting over metadata.
        best_for:
          - "Petabyte tables read by multiple engines at once"
          - "Audit history via snapshot-based time travel"
          - "Schema and partition changes without rewriting old data"
          - "Replacing Hive Metastore-era directory layouts"
        capabilities:
          - "ACID inserts, updates, deletes, and merges"
          - "Time travel by snapshot id or timestamp"
          - "Hidden partitioning — query by date, scan by partition automatically"
          - "Schema evolution: add/drop/rename columns without rewrites"
          - "Partition evolution: change layout without breaking old data"
          - "Engine-agnostic — Spark, Trino, StarRocks, Flink read the same tables"
        why_this_version: >
          Pinned to 1.6.0 because the certified Spark image bundles Iceberg 1.8.1
          (client) and 1.6.0 on the REST catalog (server) — server-side is
          guaranteed >= client-side per the lock file's constraint, and 1.6.0 is
          the highest Iceberg-REST tag available on tabulario/iceberg-rest at
          certification time.
        resource_profile_summary: "Format spec — no runtime of its own. Storage cost comes from the underlying Parquet files in MinIO."
    coming_soon:
      - { name: "Apache Hudi",  id: "hudi",  logo: "/assets/logos/hudi.svg",  summary: "Streaming-first table format with built-in upsert + incremental pulls.", reason: "Different transactional model; tested combinations TBD" }
      - { name: "Delta Lake",   id: "delta", logo: "/assets/logos/delta.svg", summary: "Databricks-led table format with strong Spark integration and OPTIMIZE.", reason: "Databricks-led; tested combinations TBD" }

  - id: catalog
    label: Table catalog
    description: Registry of table metadata (schemas, partitions, snapshot locations). Sits between processing engines and storage.
    order: 2
    components:
      - id: iceberg-rest
        name: Iceberg REST Catalog
        version: "1.6.0"
        maturity: ga
        recommended: true
        badges: [Recommended, Stable]
        compatible: true
        license: Apache-2.0
        maintainer: Apache Iceberg community
        url: https://iceberg.apache.org/concepts/catalog/
        summary: Spec-compliant REST catalog server. Lightweight, no Postgres dependency, scales horizontally. Works with every modern Iceberg client.
        compatible_with: [iceberg, spark-iceberg, starrocks]
        logo: "/assets/logos/iceberg-rest.svg"
        tagline: "Lightweight REST server that hands out Iceberg table metadata."
        what_it_is: >
          A reference implementation of the Iceberg REST Catalog spec. Engines
          ask it "where does table X live, and what's its current snapshot?" over
          plain HTTP. No Postgres or Hive Metastore behind it — metadata is
          tracked in object storage; the REST server is a stateless lookup layer.
        best_for:
          - "Multi-engine reads against the same Iceberg warehouse"
          - "Replacing Hive Metastore for new lakehouses"
          - "Cloud-native deploys where running another Postgres is overhead"
          - "Local dev where you want a real catalog without a real database"
        capabilities:
          - "Implements the Iceberg REST Catalog spec end-to-end"
          - "Stateless — scale horizontally behind a load balancer"
          - "No relational DB dependency for warehouse metadata"
          - "Works with Spark, Trino, StarRocks, Flink, and PyIceberg clients"
          - "S3-compatible storage backend (MinIO, AWS S3, GCS via interop)"
          - "Healthcheck patched to use a bash-only TCP probe (image ships without wget)"
        why_this_version: >
          Pinned to tabulario/iceberg-rest:1.6.0 because it's the verified tag on
          Docker Hub that matches the Spark image's Iceberg client lineage. The
          lock file's spark↔iceberg-rest constraint requires server-side >=
          client-side, and Spark 3.5.5_1.8.1 ships Iceberg 1.8.1 — making 1.6.0
          on the REST server the floor that still satisfies the constraint.
        resource_profile_summary: "Recommended tier: 1 CPU, 2 GB RAM, 5 GB disk. Stateless — metadata lives in object storage, not in the container."
    coming_soon:
      - { name: "Lakekeeper",     id: "lakekeeper",     logo: "/assets/logos/lakekeeper.svg",     summary: "Multi-tenant Iceberg REST with built-in RBAC and per-table policies.", reason: "Multi-tenant Iceberg REST; smoke tests pending" }
      - { name: "Project Nessie", id: "nessie",         logo: "/assets/logos/nessie.svg",         summary: "Git-for-data catalog — branches, merges, and point-in-time rollback over Iceberg tables.", reason: "Branching semantics, git-for-data" }
      - { name: "Apache Polaris", id: "polaris",        logo: "/assets/logos/polaris.svg",        summary: "Snowflake-incubated open catalog with cross-engine credential vending.", reason: "Snowflake-incubated open catalog" }
      - { name: "Hive Metastore", id: "hive-metastore", logo: "/assets/logos/hive-metastore.svg", summary: "Legacy table catalog from the Hadoop era — still required by some BI tools.", reason: "Legacy support — slated for v0.5" }

  - id: object_storage
    label: Object storage
    description: Where table files actually live. S3-compatible API across all options.
    order: 3
    components:
      - id: minio
        name: MinIO (self-hosted)
        version: "RELEASE.2025-04-22T22-12-26Z"
        maturity: ga
        recommended: true
        badges: [Recommended, Stable]
        compatible: true
        license: AGPL-3.0
        maintainer: MinIO Inc.
        url: https://min.io
        summary: S3-compatible object store you control. Default for the UDP pilot; perfect for dev / on-prem / air-gapped. Swap to managed S3/GCS/Azure for cost-effective production.
        compatible_with: [iceberg-rest, spark-iceberg]
        production_note: For production at scale, migrate to AWS S3 / GCS / Azure Blob — same S3 API, lower operational burden.
        logo: "/assets/logos/minio.svg"
        tagline: "Self-hosted S3-compatible object storage you run on your own hardware."
        what_it_is: >
          MinIO is a drop-in S3 replacement. It speaks the same API surface as
          AWS S3, so any tool that writes Parquet to S3 (Spark, Iceberg, Trino)
          works against MinIO unchanged. Default substrate for the UDP pilot
          because it runs on a laptop, an on-prem cluster, or an air-gapped
          server with no cloud account required.
        best_for:
          - "Local dev — full S3 surface without an AWS account"
          - "Air-gapped / on-prem deployments inside customer infrastructure"
          - "Single-node demos that need to look like production"
          - "Edge sites pushing data back to a central lakehouse"
        capabilities:
          - "S3 API parity — same auth, same path semantics, same listing behaviour"
          - "Erasure coding for single-node and multi-node fault tolerance"
          - "Bucket policies, versioning, and lifecycle rules"
          - "Healthcheck via bundled `mc ready local` (no extra sidecar)"
          - "Web console on port 9001 for browsing buckets and objects"
          - "Server-side encryption, audit logs, and IAM-style users"
        why_this_version: >
          Pinned to RELEASE.2025-04-22T22-12-26Z because that's the exact tag
          the install + bootstrap + smoke loop was certified against on
          2026-05-16 (Windows Docker Desktop, evidence id
          2026-05-16-windows-docker-desktop in the lock file). The image bundles
          the matching `mc` client used by the bucket-creation init container.
        resource_profile_summary: "Recommended tier: 2 CPU, 4 GB RAM, 50 GB disk. Disk grows with your data — plan for the size of your largest table plus headroom."
    coming_soon:
      - { name: "AWS S3",             id: "aws-s3",       summary: "Most common production target — config wizard pending.",                                                  reason: "Most common production target — config wizard pending" }
      - { name: "Google GCS",         id: "gcs",          summary: "Google's object store. Same S3 surface via interop; needs creds-handling UI.",                            reason: "Same S3 API surface; needs creds-handling UI" }
      - { name: "Azure Blob Storage", id: "azure-blob",   summary: "Azure's object store. Same S3 surface via interop; needs creds-handling UI.",                             reason: "Same S3 API surface; needs creds-handling UI" }

  - id: processing
    label: Processing engine
    description: Where ETL / batch / streaming jobs run. Reads/writes table files via the catalog.
    order: 4
    components:
      - id: spark-iceberg
        name: Apache Spark + Iceberg
        version: "3.5.5_1.8.1"
        maturity: ga
        recommended: true
        badges: [Recommended, Stable]
        compatible: true
        license: Apache-2.0
        maintainer: Apache Software Foundation
        url: https://spark.apache.org
        summary: Industry-standard processing engine with first-class Iceberg support. Includes a Jupyter notebook UI for interactive exploration.
        compatible_with: [iceberg, iceberg-rest, minio]
        logo: "/assets/logos/spark-iceberg.svg"
        tagline: "Distributed processing engine bundled with first-class Iceberg support."
        what_it_is: >
          Spark is the workhorse for ETL, batch transforms, and big joins. This
          image bundles Spark 3.5.5 with the matching Iceberg 1.8.1 runtime jar
          pre-wired, plus a Jupyter notebook UI on port 8888 so you can write
          PySpark against your Iceberg tables interactively from minute one.
        best_for:
          - "Bootstrapping raw / curated / analytics layers on a lakehouse"
          - "Heavy joins and aggregations that don't fit in serving-engine memory"
          - "Notebook-driven exploration of Iceberg tables on S3 / MinIO"
          - "ETL pipelines that need to read and write the same Iceberg warehouse"
        capabilities:
          - "Pre-bundled Iceberg 1.8.1 runtime — no manual jar wrangling"
          - "PySpark, Scala, SQL, and R interfaces"
          - "Reads and writes Iceberg, Parquet, ORC, JSON, CSV out of the box"
          - "Path-style S3 addressing pre-configured for MinIO compatibility"
          - "Jupyter UI on port 8888 with a sample notebook"
          - "Spark UI on port 4040 for query plans and stage timings"
        why_this_version: >
          Pinned to tabulario/spark-iceberg:3.5.5_1.8.1 because the previously
          documented 3.5.1_1.5.2 tag was REMOVED from Docker Hub after UDP
          shipped — every fresh install broke at `docker compose up`. 3.5.5_1.8.1
          is verified present via `docker manifest inspect`, and its bundled
          Iceberg 1.8.1 satisfies the spark↔iceberg-rest server-side-newer
          constraint.
        resource_profile_summary: "Recommended tier: 4 CPU, 8 GB RAM, 20 GB disk. RAM dominates — Spark spills to disk under pressure but slows sharply."
      - id: trino
        name: Trino
        version: "475"
        maturity: ga
        recommended: false
        # Candidate badge tells the UI to render a non-green status pill so
        # operators see this is not the certified pick. Stack-level status
        # also flows from stacks/compatibility/udp-trino-local-v0.1.lock.yaml
        # which carries status: "candidate".
        status_badge: "Candidate"
        badges: [Candidate]
        compatible: true
        license: Apache-2.0
        maintainer: Trino Software Foundation
        url: https://trino.io
        summary: Federated SQL engine that reads Iceberg, Postgres, Kafka, and more in one statement. CANDIDATE for the v0.1 Trino stack — image tags verified but no successful end-to-end install captured yet.
        compatible_with: [iceberg, iceberg-rest, minio]
        logo: "/assets/logos/trino.svg"
        tagline: "Distributed SQL query engine for federated analytics across many data sources."
        what_it_is: >
          Trino is a parallel SQL engine that runs ANSI SQL across Iceberg,
          Hive, Postgres, MySQL, Kafka, MongoDB, and dozens of other sources
          without copying data into a warehouse first. In this candidate
          stack Trino takes Spark's slot — it both bootstraps the demo
          tables (via Trino SQL) and serves ad-hoc queries against the
          Iceberg REST catalog.
        best_for:
          - "Federated queries that join Iceberg tables against relational sources"
          - "Interactive ad-hoc SQL exploration on lakehouse data"
          - "Replacing Presto / PrestoSQL deployments with the modern fork"
          - "Multi-engine architectures where one SQL surface fronts everything"
        capabilities:
          - "ANSI SQL with window functions, CTEs, lateral joins, and approximate aggregates"
          - "Native Iceberg connector with REST catalog support"
          - "Federated query across Iceberg + relational + streaming sources"
          - "Native S3 filesystem with MinIO-compatible path-style addressing"
          - "Cost-based optimizer with dynamic filtering and join reordering"
          - "Web UI on port 8080 for query plans, stage timings, and worker health"
        why_this_version: >
          Pinned to trinodb/trino:475 because (a) it's been in-market long
          enough for community-reported Iceberg-REST and MinIO bugs to surface
          and (b) the floating `latest` tag is a moving target that breaks
          the lock-file contract. Verified present on Docker Hub via
          `docker manifest inspect trinodb/trino:475` on 2026-05-16.
        resource_profile_summary: "Recommended tier: 4 CPU, 10 GB RAM, 20 GB disk. RAM dominates — Trino's JVM holds working sets in heap; below 10 GB total it rejects Iceberg scans during planning."
    coming_soon:
      - { name: "Apache Flink", id: "flink",  logo: "/assets/logos/flink.svg",  summary: "Streaming compute with an Iceberg sink for low-latency CDC pipelines.",          reason: "Streaming-first; planned for v0.5" }
      - { name: "Dremio",       id: "dremio", logo: "/assets/logos/dremio.svg", summary: "BI-focused lakehouse engine with semantic layer and reflections.",                reason: "BI-focused lakehouse engine" }

  - id: serving
    label: Analytics / serving engine
    description: Fast SQL for dashboards, BI tools, and ad-hoc queries. Reads from the catalog at MPP speed.
    order: 5
    components:
      - id: starrocks
        name: StarRocks (FE + BE)
        version: "3.3.12"
        maturity: ga
        recommended: true
        badges: [Recommended, Stable]
        compatible: true
        license: Apache-2.0
        maintainer: StarRocks community
        url: https://starrocks.io
        summary: MPP analytics database with native Iceberg external catalog. Reads Iceberg tables directly without copying data — single-digit-second query latency.
        compatible_with: [iceberg, iceberg-rest]
        logo: "/assets/logos/starrocks.svg"
        tagline: "MPP analytics engine that reads Iceberg tables directly, no copies."
        what_it_is: >
          StarRocks is a columnar MPP database tuned for sub-second BI queries.
          It speaks the Iceberg REST catalog natively, so dashboards hit the
          same Parquet files Spark just wrote — no separate warehouse to sync,
          no nightly copy job. Runs as two services: a Frontend (FE) that
          plans queries and a Backend (BE) that executes them.
        best_for:
          - "Sub-second BI dashboards on Iceberg tables"
          - "Ad-hoc SQL exploration over an existing lakehouse"
          - "Replacing Druid / ClickHouse without leaving the lakehouse format"
          - "Concurrent users — MPP scales horizontally on the BE tier"
        capabilities:
          - "Native Iceberg external catalog — no data movement"
          - "Vectorised execution with cost-based query planning"
          - "MySQL wire protocol — any MySQL client / BI tool connects"
          - "Materialized views with automatic rewrite for repeat queries"
          - "Bitmap and bloom-filter indexes on hot columns"
          - "FE+BE separation — scale planning and execution independently"
        why_this_version: >
          Pinned to 3.3.12 (both FE and BE) because earlier 3.3.x releases
          ignored Iceberg REST catalog property propagation into the S3 FileIO
          layer — a deal-breaker for any non-AWS S3 endpoint like MinIO. The
          fix landed in StarRocks PR #55416, first available in 3.3.12. The
          floating `3.3-latest` tag is explicitly forbidden in the lock file
          because it has historically resolved to a pre-3.3.12 build.
        resource_profile_summary: "Recommended tier: FE 2 CPU / 4 GB / 10 GB + BE 4 CPU / 8 GB / 50 GB. BE storage grows with cached query results."
    coming_soon:
      - { name: "ClickHouse",   id: "clickhouse", logo: "/assets/logos/clickhouse.svg", summary: "Column-store OLAP engine with extreme single-table scan speed.",                            reason: "OLAP serving alternative; pending Iceberg-via-external-catalog validation" }
      - { name: "Trino",        id: "trino",      logo: "/assets/logos/trino.svg",      summary: "Same engine as the processing slot — can answer dashboard queries too.",                    reason: "Same component as processing — could play both roles" }
      - { name: "Apache Druid", id: "druid",      logo: "/assets/logos/druid.svg",      summary: "Real-time analytics database for streaming ingestion plus historical drill-down.",          reason: "Real-time analytics; planned for v0.6" }

  - id: orchestration
    label: Orchestrator (optional)
    description: Schedules data pipelines. Defer for analytics-only stacks; add for production ETL.
    order: 6
    optional: true
    components: []
    coming_soon:
      - { name: "Dagster",        id: "dagster", logo: "/assets/logos/dagster.svg", summary: "Asset-first orchestrator — pipelines defined as the data they produce.", reason: "Asset-first; the doc's recommended choice — v0.4" }
      - { name: "Apache Airflow", id: "airflow", logo: "/assets/logos/airflow.svg", summary: "Industry-standard DAG scheduler with the largest operator ecosystem.",    reason: "Industry standard; v0.4 with Postgres auto-add" }

  - id: observability
    label: Observability (optional)
    description: Metrics + dashboards for the lakehouse itself. Defer for pilot.
    order: 7
    optional: true
    components: []
    coming_soon:
