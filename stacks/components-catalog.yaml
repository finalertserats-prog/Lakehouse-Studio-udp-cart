  - id: startup_analytics
    label: Startup Analytics
    icon: chart
    elevator_pitch: Iceberg + StarRocks for sub-second BI without a data team.
    persona: Growth-stage startup / first data hire
    intended_for: ["BI teams", "product analytics", "investor dashboards"]
    anti_use_cases: ["regulated data", "streaming-first workloads"]
    recommended_set: udp-recommended
    readiness: pilot
    hero_use_cases: ["Open analytics without managed-warehouse pricing", "Same lakehouse for ELT + BI"]
    pending_components:
      - { name: Dagster, role: orchestration, eta: v0.4, reason: "Asset-first scheduling for ELT" }
    compliance_tags: []

  - id: ai_research
    label: AI / ML Research
    icon: sparkles
    elevator_pitch: Iceberg as feature-store substrate, Spark for training pulls.
    persona: ML team / research lab
    intended_for: ["feature engineering", "experiment tracking infra", "training-data versioning"]
    anti_use_cases: ["low-latency online serving"]
    recommended_set: udp-recommended
    readiness: pilot
    hero_use_cases: ["Versioned datasets via Iceberg snapshots", "Multi-engine reads from one warehouse"]
    pending_components:
      - { name: "JupyterHub (multi-user)", role: notebook, eta: v0.5, reason: "Shared research environment" }
      - { name: MLflow, role: tracking, eta: v0.6, reason: "Experiment tracking + model registry" }
    compliance_tags: []

  - id: healthcare
    label: Healthcare Lakehouse
    icon: shield
    elevator_pitch: Air-gapped lakehouse framing with HIPAA-adjacent notes — not certified PHI-ready.
    persona: Hospital IT / regulated-industry data platform
    intended_for: ["on-prem analytics", "data-residency requirements"]
    anti_use_cases: ["live PHI without your own BAA + controls"]
    recommended_set: udp-recommended
    readiness: pilot
    hero_use_cases: ["Open analytics on infrastructure you control", "Audit-friendly storage substrate"]
    pending_components:
      - { name: "TLS-by-default profile", role: security, eta: v0.4, reason: "Encrypt all service ports out of the box" }
      - { name: "Audit-log shipper", role: observability, eta: v0.5, reason: "Stream events to SIEM" }
      - { name: "Polaris / Lakekeeper RBAC", role: catalog, eta: v0.5, reason: "Per-table access control" }
