# Component Catalog (v0.3 pilot — UDP-only)
#
# Per the founding architecture doc, this is the "Knowledge Layer" surface
# exposed to the Catalog/Cart UI. Each category lists the option(s) the user
# can pick. For the v0.3 pilot every category has exactly ONE option that's
# ✓ Compatible — the UDP component. Alternatives are listed under
# `coming_soon` so the user sees the marketplace nature of the product
# without picking something we can't actually install yet.
#
# Use cases ("goals") map to a recommended set of category picks. For the
# pilot all goals point at the UDP set.

goals:
  - id: local_demo
    label: Local demo
    summary: Lakehouse on one machine. Great for evaluation and proof-of-concept work.
    icon: laptop
    recommended_set: udp-recommended
    intended_for: ["evaluating", "first-time users", "interview projects"]
  - id: production_lakehouse
    label: Production lakehouse
    summary: Multi-tenant analytics lakehouse for real workloads. Cloud-region friendly.
    icon: building
    recommended_set: udp-recommended
    intended_for: ["mid-size companies", "data platform teams"]
  - id: ai_research
    label: AI / ML research platform
    summary: Lakehouse plus columnar serving — feature stores, vector search, BI on the side.
    icon: sparkles
    recommended_set: udp-recommended
    intended_for: ["ML teams", "research labs"]
  - id: analytics_layer
    label: Analytics-only
    summary: Lakehouse storage + serving without orchestration. Add Airflow/Dagster later.
    icon: chart
    recommended_set: udp-recommended
    intended_for: ["BI teams adding open formats"]
  - id: air_gapped
    label: Air-gapped / on-prem
    summary: For regulated industries — runs entirely inside customer infrastructure with no outbound traffic.
    icon: shield
    recommended_set: udp-recommended
    intended_for: ["healthcare", "BFSI", "government"]

recommended_sets:
  udp-recommended:
    name: UDP Reference Stack
    components: [iceberg, iceberg-rest, minio, spark-iceberg, starrocks]
    stack_id: udp-local-v0.2
  # CANDIDATE — image tags verified on registry but no end-to-end install
  # evidence yet. Listed here so the UI/picker can surface it as an
  # explicit candidate option (gated by the lock file's status="candidate"
  # which surfaces as a warning via /healthz).
  udp-trino-recommended:
    name: UDP Trino Reference Stack (Candidate)
    components: [iceberg, iceberg-rest, minio, trino, starrocks]
    stack_id: udp-trino-local-v0.1
  # ===== v0.6 additions — all candidate =====
  # Each set lists the components that, when in the cart together,
  # marry into the matching certified stack. The compatibility checker
  # uses this mapping to surface a green/yellow/red pill in the UI.
  iceberg-nessie-recommended:
    name: Iceberg + Nessie + Trino (Candidate — git-for-data catalog)
    components: [iceberg, nessie, minio, trino, starrocks]
    stack_id: iceberg-nessie-trino-local-v0.1
  hudi-hms-recommended:
    name: Hudi + Hive Metastore + Spark (Candidate — streaming-first format)
    components: [hudi, hive-metastore, minio, spark-hudi]
    stack_id: hudi-hms-spark-local-v0.1
  delta-hms-recommended:
    name: Delta Lake + Hive Metastore + Spark + Trino (Candidate)
    components: [delta, hive-metastore, minio, spark-delta, trino]
    stack_id: delta-hms-spark-trino-local-v0.1
  iceberg-polaris-recommended:
    name: Iceberg + Polaris + Spark + StarRocks (Candidate — RBAC catalog)
    components: [iceberg, polaris, minio, spark-iceberg, starrocks]
    stack_id: iceberg-polaris-spark-local-v0.1

# ============================================================
# Templates — use-case-shaped views over recommended_sets.
# ============================================================
# For v0.4, every template currently maps to the one certified stack
# (udp-recommended). `pending_components` are display-only labels for the
# user; they never enter the cart, never affect compatibility scoring,
# never reach the install pipeline. New certified stacks come through
# `stacks/compatibility/*.lock.yaml` certification, not through templates.
#
# `compliance_tags` resolve via stacks/compliance.yaml (loaded separately).
templates:

  - id: local_demo
    label: Local Demo Stack
    icon: laptop
    elevator_pitch: Lakehouse on your laptop in 10 minutes — the certified UDP reference, nothing extra.
    persona: Evaluator / first-time user
    intended_for: ["evaluating", "interview projects", "demos"]
    anti_use_cases: ["regulated PHI/PCI data", "multi-tenant workloads"]
    recommended_set: udp-recommended
    readiness: pilot
    hero_use_cases: ["Try Iceberg + StarRocks end-to-end", "Show stakeholders a working lakehouse"]
    pending_components: []
    compliance_tags: []

  - id: production_lakehouse
    label: Production Lakehouse
    icon: cube
    elevator_pitch: General-purpose open lakehouse for real workloads — no vertical assumptions.
    persona: Data platform team / mid-size company
    intended_for: ["production analytics", "multi-team data platforms", "any-industry lakehouses"]
    anti_use_cases: ["sub-second OLTP", "regulated PHI without your own controls (use Healthcare template)"]
    recommended_set: udp-recommended
    readiness: pilot
