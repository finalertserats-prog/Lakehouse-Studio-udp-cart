    intended_for: ["BI teams", "product analytics", "investor dashboards"]
    anti_use_cases: ["regulated data", "streaming-first workloads"]
    recommended_set: udp-recommended
    readiness: pilot
    hero_use_cases: ["Open analytics without managed-warehouse pricing", "Same lakehouse for ELT + BI"]
    pending_components:
      - { name: Dagster, role: orchestration, eta: v0.4, reason: "Asset-first scheduling for ELT" }
    compliance_tags: []

  - id: ai_research
