categories:
  - id: table_format
    label: Table format
    description: How table data is laid out on object storage. Sets the foundation for everything else.
    order: 1
    components:
      - id: iceberg
        name: Apache Iceberg
        version: "1.6.0"
        maturity: ga
        recommended: true
        badges: [Recommended, Stable]
        compatible: true
        license: Apache-2.0
        maintainer: Apache Software Foundation
        url: https://iceberg.apache.org
        summary: Open table format with schema evolution, time travel, and hidden partitioning. The de-facto choice for Spark + Trino + StarRocks workflows.
        compatible_with: [iceberg-rest, spark-iceberg, starrocks]
        logo: "/assets/logos/iceberg.svg"
        tagline: "Open table format for huge analytic datasets on object storage."
        what_it_is: >
          Iceberg is a table format that lives on top of Parquet/ORC/Avro files in
          object storage. It tracks every change as a snapshot, so the same table
          can be queried by Spark, Trino, StarRocks, and Flink at the same time
          without copying data or fighting over metadata.
        best_for:
          - "Petabyte tables read by multiple engines at once"
          - "Audit history via snapshot-based time travel"
          - "Schema and partition changes without rewriting old data"
          - "Replacing Hive Metastore-era directory layouts"
        capabilities:
          - "ACID inserts, updates, deletes, and merges"
          - "Time travel by snapshot id or timestamp"
          - "Hidden partitioning — query by date, scan by partition automatically"
          - "Schema evolution: add/drop/rename columns without rewrites"
          - "Partition evolution: change layout without breaking old data"
          - "Engine-agnostic — Spark, Trino, StarRocks, Flink read the same tables"
        why_this_version: >
          Pinned to 1.6.0 because the certified Spark image bundles Iceberg 1.8.1
          (client) and 1.6.0 on the REST catalog (server) — server-side is
          guaranteed >= client-side per the lock file's constraint, and 1.6.0 is
          the highest Iceberg-REST tag available on tabulario/iceberg-rest at
          certification time.
        resource_profile_summary: "Format spec — no runtime of its own. Storage cost comes from the underlying Parquet files in MinIO."
      - id: hudi
        name: Apache Hudi
        version: "0.15.0"
        maturity: ga
        recommended: false
        # Candidate pattern (mirrors Trino) — UI surfaces a non-green pill;
        # stack-level status flows from the lock file. Promotion to
        # `pilot-stable` requires a passing end-to-end install captured in
        # the matching .lock.yaml file's `evidence[]` block.
        status_badge: "Candidate"
        badges: [Candidate]
        compatible: true
        license: Apache-2.0
        maintainer: Apache Software Foundation
        url: https://hudi.apache.org
        summary: Streaming-first table format with built-in upsert, incremental pulls, and record-level indexing. Pairs with Spark + Hive Metastore for CDC-into-lakehouse pipelines.
        # Trino read support exists via the hudi-connector but is READ-ONLY
        # and version-matched (Hudi 0.15 ⇄ Trino 460+). Writes happen only
        # via Spark — that's why spark-hudi is the primary processing pair.
        compatible_with: [hive-metastore, spark-hudi]
        logo: "/assets/logos/hudi.svg"
        tagline: "Streaming-first table format with upserts and incremental pulls."
        what_it_is: >
          Hudi (Hadoop Upserts Deletes and Incrementals) is a table format
          designed around mutable records. It supports MERGE INTO with
          record-level indexing, Copy-On-Write and Merge-On-Read storage
          modes, and incremental query pulls that fetch only rows changed
          since a previous query. Built for CDC pipelines feeding a
          lakehouse from operational databases.
        best_for:
          - "CDC pipelines from Postgres/MySQL into the lakehouse"
          - "Tables that get frequent upserts (customer profiles, inventory)"
          - "Incremental ETL — pull-only-what-changed semantics"
          - "Streaming-first architectures with bounded-latency ingest"
        capabilities:
          - "ACID merges with record-level indexing"
          - "Copy-On-Write (read-optimized) and Merge-On-Read (write-optimized) storage"
          - "Incremental pulls — query only changed rows since a timestamp"
          - "Time travel via commit history"
          - "Hive-Metastore-native — works with existing HMS-aware engines"
          - "Z-order and Hilbert curve clustering for query pruning"
        why_this_version: >
          Pinned to 0.15.0 because it's the latest stable release that
          ships pre-built Spark bundles for Spark 3.5.x, which is the
          Spark version line we already certify. Earlier 0.14.x lacks
          the Spark 3.5 bundle; 1.0.x is too new for cross-engine read
          parity (Trino's hudi-connector is still tracking 0.15).
        resource_profile_summary: "Format spec — no runtime of its own. Sizing tracks the Spark + HMS sidecars that materialize it."
        version_options:
          - version: "1.0.1"
            label: "Hudi 1.0.1 — Enterprise (HDFS + Spark 3.4.x)"
            cart_id: "hudi-v1"
            badges: [Enterprise]
            tagline: "Hudi 1.0.1 for enterprise Hadoop clusters — HDFS, Spark 3.4.x, HMS."
          - version: "0.15.0"
            label: "Hudi 0.15.0 — Docker / MinIO stacks"
            default: true
            badges: [Candidate]
            tagline: "Streaming-first table format with upserts and incremental pulls."
      - id: hudi-v1
        hidden: true
        name: Apache Hudi 1.0
        version: "1.0.1"
        maturity: ga
        recommended: false
        badges: [Enterprise]
        compatible: true
        license: Apache-2.0
        maintainer: Apache Software Foundation
        url: https://hudi.apache.org
        summary: Hudi 1.0.1 — the enterprise on-prem release. Major rewrite with improved MOR performance, better HMS/Spark 3.4.x integration, and native HDFS support. Use this for bare-metal Hadoop clusters.
        compatible_with: [hive-metastore-hadoop, spark-hadoop, hdfs]
        logo: "/assets/logos/hudi.svg"
        tagline: "Hudi 1.0.1 for enterprise Hadoop clusters — HDFS, Spark 3.4.x, HMS."
        what_it_is: >
          Apache Hudi 1.0.x is the first major-version release after years of 0.x
          development. It brings improved Merge-On-Read performance, a redesigned
          table format spec (Hudi Table Format v2), better Spark 3.4.x integration,
          and native HDFS support for on-prem bare-metal clusters. Use 1.0.1
          with the hudi-spark3.4 bundle JAR on Spark 3.4.4 + YARN + HMS clusters.
          For local Docker-based stacks use Hudi 0.15.0 instead.
        best_for:
          - "Enterprise on-prem Hadoop clusters (HDFS + YARN + HMS)"
          - "Spark 3.4.x with YARN in cluster mode"
          - "CDC upserts into MOR tables with improved read performance"
          - "Teams upgrading from Hudi 0.14.x on existing Hadoop infra"
        capabilities:
          - "Hudi Table Format v2 — improved metadata table + file sizing"
          - "MOR performance improvements: faster log file merging"
          - "Spark 3.4.x bundle (hudi-spark3.4-bundle_2.12)"
          - "HMS-native: partition sync and schema evolution with HMS 4.0.x"
          - "HDFS-native storage with proper block replication"
          - "Record-level indexing: Bloom, Simple, HBase, Bucket"
        why_this_version: >
          1.0.1 is the first stable patch of the 1.0 major line. Ships the
          hudi-spark3.4 bundle for Spark 3.4.x (the certified Spark version
          in the enterprise on-prem stack). Not interchangeable with 0.15.0 —
          table format version and Spark bundle packaging differ.
        resource_profile_summary: "Format spec on HDFS. Executor memory sized via Spark on YARN (typical 4-8 GB per executor). No separate Hudi process."
        version_options:
          - version: "1.0.1"
            label: "Hudi 1.0.1 (Recommended)"
            default: true
          - version: "1.0.0"
            label: "Hudi 1.0.0 (Previous)"
      - id: delta
        name: Delta Lake
        version: "3.2.1"
        maturity: ga
        recommended: false
        status_badge: "Candidate"
        badges: [Candidate]
        compatible: true
        license: Apache-2.0
        maintainer: Linux Foundation (originally Databricks)
        url: https://delta.io
        summary: Databricks-led open table format with strong Spark integration, ACID transactions, and OPTIMIZE/VACUUM operations. Multi-engine reads via Delta-Sharing and the delta-rs Rust core.
        compatible_with: [hive-metastore, spark-delta, trino]
        logo: "/assets/logos/delta.svg"
        tagline: "ACID table format with first-class Spark integration and OPTIMIZE."
        what_it_is: >
          Delta Lake is a table format that adds ACID transactions to
          Parquet files on object storage. Originally built by Databricks
          and now Linux-Foundation-governed. Strong Spark integration via
          the io.delta:delta-spark package; cross-engine reads via Trino's
          delta-lake connector, StarRocks' delta external catalog, and
          the delta-rs Rust core (used by DuckDB, Polars, Daft).
        best_for:
          - "Batch ETL pipelines that need ACID guarantees on object storage"
          - "Teams already invested in Spark — Delta is its native format"
          - "BI workloads via Trino on Delta tables"
          - "Z-order optimization for query pruning"
        capabilities:
          - "ACID transactions over Parquet on object storage"
          - "Schema evolution with constraint enforcement"
          - "Time travel by version or timestamp"
          - "OPTIMIZE (compaction) and VACUUM (cleanup) operations"
          - "Z-order multi-dimensional clustering"
          - "Change Data Feed for downstream incremental reads"
        why_this_version: >
          Pinned to delta-spark 3.2.1 because it's the latest stable
          release that targets Spark 3.5.x — matching our certified
          Spark line. Delta 3.3.x targets Spark 4.x which our base image
          doesn't ship yet.
        resource_profile_summary: "Format spec — no runtime of its own. Sizing tracks the Spark + HMS sidecars that materialize it."

  - id: catalog
    label: Table catalog
    description: Registry of table metadata (schemas, partitions, snapshot locations). Sits between processing engines and storage.
    order: 2
    components:
      - id: iceberg-rest
        name: Iceberg REST Catalog
        version: "1.6.0"
        maturity: ga
        recommended: true
        badges: [Recommended, Stable]
        compatible: true
        license: Apache-2.0
        maintainer: Apache Iceberg community
        url: https://iceberg.apache.org/concepts/catalog/
        summary: Spec-compliant REST catalog server. Lightweight, no Postgres dependency, scales horizontally. Works with every modern Iceberg client.
        compatible_with: [iceberg, spark-iceberg, starrocks]
        logo: "/assets/logos/iceberg-rest.svg"
        tagline: "Lightweight REST server that hands out Iceberg table metadata."
        what_it_is: >
          A reference implementation of the Iceberg REST Catalog spec. Engines
          ask it "where does table X live, and what's its current snapshot?" over
          plain HTTP. No Postgres or Hive Metastore behind it — metadata is
          tracked in object storage; the REST server is a stateless lookup layer.
        best_for:
          - "Multi-engine reads against the same Iceberg warehouse"
          - "Replacing Hive Metastore for new lakehouses"
          - "Cloud-native deploys where running another Postgres is overhead"
          - "Local dev where you want a real catalog without a real database"
        capabilities:
          - "Implements the Iceberg REST Catalog spec end-to-end"
          - "Stateless — scale horizontally behind a load balancer"
          - "No relational DB dependency for warehouse metadata"
          - "Works with Spark, Trino, StarRocks, Flink, and PyIceberg clients"
          - "S3-compatible storage backend (MinIO, AWS S3, GCS via interop)"
          - "Healthcheck patched to use a bash-only TCP probe (image ships without wget)"
        why_this_version: >
          Pinned to tabulario/iceberg-rest:1.6.0 because it's the verified tag on
          Docker Hub that matches the Spark image's Iceberg client lineage. The
          lock file's spark↔iceberg-rest constraint requires server-side >=
          client-side, and Spark 3.5.5_1.8.1 ships Iceberg 1.8.1 — making 1.6.0
          on the REST server the floor that still satisfies the constraint.
        resource_profile_summary: "Recommended tier: 1 CPU, 2 GB RAM, 5 GB disk. Stateless — metadata lives in object storage, not in the container."
      - id: nessie
        name: Project Nessie
        version: "0.99.0"
        maturity: ga
        recommended: false
        status_badge: "Candidate"
        badges: [Candidate]
        compatible: true
        license: Apache-2.0
        maintainer: Dremio + Apache Iceberg community
        url: https://projectnessie.org
        summary: Git-for-data catalog with branches, merges, and point-in-time rollback over Iceberg tables. Atomic multi-table commits enable cross-table CDC and zero-copy environment branching.
        compatible_with: [iceberg, spark-iceberg, trino, starrocks]
        logo: "/assets/logos/nessie.svg"
        tagline: "Git-for-data catalog with branches, merges, and atomic multi-table commits."
        what_it_is: >
          Nessie is an Iceberg-compatible catalog that adds Git-like
          semantics to table metadata. Operations happen on branches;
          merges are atomic across multiple tables; point-in-time
          rollback restores the entire warehouse to any prior commit.
          Pairs especially well with audit-heavy workloads and
          dev/staging/prod environment branching without data copies.
        best_for:
          - "Audit-trail-first deployments — every change is a commit"
          - "Dev/staging/prod environments as zero-copy branches"
          - "Multi-table atomic refactors (rename across joined tables in one commit)"
          - "Point-in-time rollback for regulated industries (BFSI, healthcare)"
        capabilities:
          - "Branching, merging, and conflict resolution at the catalog layer"
          - "Atomic multi-table commits"
          - "Time travel by commit hash, branch name, or timestamp"
          - "REST API + native Iceberg REST catalog adapter"
          - "Supports Spark, Trino, StarRocks, and Flink as engines"
          - "Pluggable backends (JDBC, RocksDB, MongoDB, in-memory)"
