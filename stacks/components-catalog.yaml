# Component Catalog (v0.3 pilot — UDP-only)
#
# Per the founding architecture doc, this is the "Knowledge Layer" surface
# exposed to the Catalog/Cart UI. Each category lists the option(s) the user
# can pick. For the v0.3 pilot every category has exactly ONE option that's
# ✓ Compatible — the UDP component. Alternatives are listed under
# `coming_soon` so the user sees the marketplace nature of the product
# without picking something we can't actually install yet.
#
# Use cases ("goals") map to a recommended set of category picks. For the
# pilot all goals point at the UDP set.

goals:
  - id: local_demo
    label: Local demo
    summary: Lakehouse on one machine. Great for evaluation and proof-of-concept work.
    icon: laptop
    recommended_set: local-demo
    intended_for: ["evaluating", "first-time users", "interview projects"]
  - id: production_lakehouse
    label: Production lakehouse
    summary: Multi-tenant analytics lakehouse for real workloads. Cloud-region friendly.
    icon: building
    recommended_set: production-lakehouse
    intended_for: ["mid-size companies", "data platform teams"]
  - id: ai_research
    label: AI / ML research platform
    summary: Lakehouse plus columnar serving — feature stores, vector search, BI on the side.
    icon: sparkles
    recommended_set: ai-ml-research
    intended_for: ["ML teams", "research labs"]
  - id: analytics_layer
    label: Analytics-only
    summary: Lakehouse storage + serving without orchestration. Add Airflow/Dagster later.
    icon: chart
    recommended_set: udp-recommended
    intended_for: ["BI teams adding open formats"]
  - id: air_gapped
    label: Air-gapped / on-prem
    summary: For regulated industries — runs entirely inside customer infrastructure with no outbound traffic.
    icon: shield
    recommended_set: udp-recommended
    intended_for: ["healthcare", "BFSI", "government"]
  - id: enterprise_onprem_datalake
    label: Enterprise On-Prem Datalake
    summary: Production-grade multi-engine datalake on bare-metal servers — HDFS + Hive + Spark + Hudi + StarRocks + Trino + Ranger.
    icon: server
    recommended_set: enterprise-hadoop-docker-recommended
    stack_id: enterprise-hadoop-v1.0
    intended_for: ["enterprise data engineering teams", "on-premises deployments", "regulated industries requiring data residency"]

recommended_sets:
  # ── Per-card differentiated stacks. Each maps to a template card.
  # All use real component_registry.py IDs; minio-create-bucket is auto-added.
  local-demo:
    name: Local Demo Stack
    stack_id: udp-local-v0.2
    # `iceberg` (table format) belongs in the cart — udp-local-v0.2 is an
    # Iceberg lakehouse. It also keeps the stack's marriage vocabulary
    # complete so iceberg-format carts match here, not a Trino/BI sibling.
    components: [iceberg, iceberg-rest, spark-iceberg, minio, starrocks]

  production-lakehouse:
    name: Production Lakehouse
    stack_id: iceberg-nessie-trino-local-v0.1
    # Invariant: a recommended_set mirrors its certified lock's cart-facing
    # marriage. The iceberg-nessie-trino-local-v0.1 lock is Nessie + Trino +
    # StarRocks over Iceberg/MinIO (no Spark, no Airflow — those are optional
    # add-ons surfaced via templates, not part of the certified marriage).
    components: [iceberg, nessie, trino, minio, starrocks]

  udp-trino:
    name: UDP Trino Reference Stack
    stack_id: udp-trino-local-v0.1
    # Mirrors the udp-trino-local-v0.1 lock: Iceberg-REST + Trino + StarRocks
    # over MinIO. Trino is the query engine (no Spark in this variant).
    components: [iceberg, iceberg-rest, trino, minio, starrocks]

  startup-analytics:
    name: Startup Analytics
    stack_id: startup-analytics-local-v0.1
    components: [iceberg, iceberg-rest, spark-iceberg, minio, starrocks, superset]

  ai-ml-research:
    name: AI / ML Research
    stack_id: ai-ml-research-local-v0.1
    components: [iceberg, iceberg-rest, spark-iceberg, minio, trino, jupyter, starrocks]

  healthcare-lakehouse:
    name: Healthcare Lakehouse
    stack_id: enterprise-hadoop-v1.0
    components: [hdfs, hive-metastore, hadoop-yarn, spark-hudi, trino, ranger-admin]

  fintech-compliance:
    name: Fintech Compliance
    stack_id: fintech-compliance-local-v0.1
    components: [iceberg, iceberg-rest, spark-iceberg, minio, trino, openlineage, starrocks]

  streaming-lakehouse:
    name: Streaming Lakehouse
    stack_id: streaming-local-v1.0
    components: [iceberg-rest, spark-iceberg, minio, kafka, flink, iceberg, starrocks]

  # ── Enterprise On-Prem (8th card) — full Hadoop datalake.
  enterprise-onprem:
    name: Enterprise On-Prem Datalake
    stack_id: enterprise-hadoop-v1.0
    components: [hdfs, hive-metastore, spark-hudi, starrocks, trino, airflow, hadoop-yarn]
  enterprise-hadoop-docker-recommended:
    name: Enterprise Hadoop Docker (alias)
    stack_id: enterprise-hadoop-v1.0
    components: [hdfs, hive-metastore, spark-hudi, starrocks, trino, airflow, hadoop-yarn]

  # ── Non-Iceberg table formats, wired to their existing certified stacks so
  # the wizard recognises them as certified (not "experimental") and can install
  # them. Components mirror each stack's manifest (mysql-hms is an internal HMS
  # sidecar, not a user-facing catalog id, so it's omitted from the cart). These
  # HMS stacks have no StarRocks serving engine — they serve via Trino/Spark —
  # which is why `serving` is an optional category.
  delta-lakehouse:
    name: Delta Lakehouse
    stack_id: delta-hms-spark-trino-local-v0.1
    components: [delta, hive-metastore, spark-delta, trino, minio]

  hudi-lakehouse:
    name: Hudi Lakehouse
    stack_id: hudi-hms-spark-local-v0.1
    components: [hudi, hive-metastore, spark-hudi, minio]

  # Iceberg + Polaris (RBAC + credential-vending catalog) on Spark. Mirrors the
  # lock's cart-facing vocab: `iceberg` (format), `spark-iceberg` and `starrocks`
  # aliases, plus polaris/minio. postgres-polaris is the internal Polaris backing
  # (like mysql-hms for the HMS stacks) so it's omitted from the cart surface.
  iceberg-polaris:
    name: Iceberg + Polaris Lakehouse
    stack_id: iceberg-polaris-spark-local-v0.1
    components: [iceberg, polaris, spark-iceberg, minio, starrocks]

  # ── Legacy alias (kept so older references don't break).
  udp-recommended:
    name: UDP Reference Stack
    stack_id: udp-local-v0.2
    components: [iceberg, iceberg-rest, spark-iceberg, minio, starrocks]

# ============================================================
