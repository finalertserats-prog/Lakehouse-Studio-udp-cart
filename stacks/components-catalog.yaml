  - id: fintech_compliance
    label: Fintech Compliance
    icon: building
    elevator_pitch: Open-format lakehouse with audit-trail framing — PCI/SOX validation pending.
    persona: BFSI data platform / compliance-conscious fintech
    intended_for: ["regulated analytics", "audit-trail-first deployments"]
    anti_use_cases: ["raw cardholder-data storage without tokenization upstream"]
    recommended_set: udp-recommended
    readiness: pilot
    hero_use_cases: ["Snapshot-based audit history (Iceberg)", "Self-hosted analytics — no third-party data plane"]
    pending_components:
      - { name: "Nessie (branching catalog)", role: catalog, eta: v0.5, reason: "Point-in-time audit + rollback semantics" }
      - { name: "WORM bucket policy", role: object_storage, eta: v0.5, reason: "Immutable audit logs" }
