<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="StarRocks">
  <title>StarRocks</title>
  <defs>
    <linearGradient id="sr-bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a1f3c"/>
      <stop offset="100%" stop-color="#143a72"/>
    </linearGradient>
    <linearGradient id="sr-star" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#3aa0ff"/>
      <stop offset="100%" stop-color="#7be0ff"/>
    </linearGradient>
  </defs>
  <rect width="64" height="64" rx="10" fill="url(#sr-bg)"/>
  <!-- 5-pointed star -->
  <polygon points="32,12 36.6,25.5 50.8,25.5 39.4,33.8 43.9,47.3 32,39 20.1,47.3 24.6,33.8 13.2,25.5 27.4,25.5"
           fill="url(#sr-star)" stroke="#bfe6ff" stroke-width="0.8"/>
  <!-- orbiting dot, hinting "Rocks" speed -->
  <circle cx="52" cy="50" r="2.4" fill="#7be0ff"/>
  <circle cx="46" cy="54" r="1.4" fill="#7be0ff" opacity="0.7"/>
  <circle cx="40" cy="56" r="1" fill="#7be0ff" opacity="0.5"/>
</svg>
