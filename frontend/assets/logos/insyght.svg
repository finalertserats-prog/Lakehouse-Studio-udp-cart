<svg width="120" height="36" viewBox="0 0 120 36" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Insyght (placeholder mark)">
  <!--
    PLACEHOLDER mark for Insyght destinations. Original geometric design:
    speech bubble (conversation) + 3 vertical bars (chart). Two-tone blue.
    NOT a derivative of the official Insyght brand mark. See README.md
    in this directory for context.
  -->
  <defs>
    <linearGradient id="insyghtBubble" x1="0" y1="0" x2="32" y2="32" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#1F4E8C"/>
      <stop offset="1" stop-color="#2A6BBD"/>
    </linearGradient>
  </defs>

  <!-- Speech bubble: rounded square + small tail -->
  <path d="M5 4
           H29 A4 4 0 0 1 33 8
           V24 A4 4 0 0 1 29 28
           H14 L8 33 V28
           A4 4 0 0 1 4 24 V8
           A4 4 0 0 1 5 4 Z"
        fill="url(#insyghtBubble)"/>

  <!-- Three vertical chart bars inside the bubble (ascending: short, mid, tall) -->
  <rect x="10" y="18" width="4" height="6"  rx="1" fill="#4ECAEB"/>
  <rect x="16" y="14" width="4" height="10" rx="1" fill="#4ECAEB"/>
  <rect x="22" y="10" width="4" height="14" rx="1" fill="#4ECAEB"/>

  <!-- Wordmark -->
  <text x="44" y="23"
        font-family="Inter, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif"
        font-size="17" font-weight="600" fill="#E5EEFB"
        letter-spacing="0.2">Insyght</text>
</svg>
